      ctx.fillStyle = '#ffd54f';
      ctx.fillText(s.text, sx + 14, sy - 54);
      ctx.textAlign = 'left';
    }

}

function drawFlag() {
  if (!flagObj) return;
  const sx = flagObj.x - camera.x;
  const sy = flagObj.y - camera.y;

  // Pole with contour and gradient
  ctx.fillStyle = '#616161';
  drawRoundRect(sx + 12, sy - 51, 7, TILE * 3 + 52, 3);
  ctx.fill();
  const poleGrad = ctx.createLinearGradient(sx + 13, sy - 50, sx + 18, sy - 50);
  poleGrad.addColorStop(0, '#f5f5f5');
  poleGrad.addColorStop(0.3, '#e0e0e0');
  poleGrad.addColorStop(1, '#9e9e9e');
  ctx.fillStyle = poleGrad;
  drawRoundRect(sx + 13, sy - 50, 5, TILE * 3 + 50, 2);
  ctx.fill();
  // Pole specular
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(sx + 14, sy - 48, 1.5, TILE * 3 + 46);

  // Ball on top with contour
  ctx.fillStyle = flagObj.reached ? '#f57f17' : '#757575';
  drawCircle(sx + 15.5, sy - 52, 6);
  ctx.fill();
  ctx.fillStyle = flagObj.reached ? '#ffd54f' : '#e0e0e0';
  drawCircle(sx + 15.5, sy - 52, 5);
  ctx.fill();
  // Ball highlight
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  drawCircle(sx + 14, sy - 53.5, 2);
  ctx.fill();

  // Flag cloth with wave and contour
  const flagColor = flagObj.reached ? '#ffd54f' : '#ef5350';
  const flagOutline = flagObj.reached ? '#c6a700' : '#b71c1c';
  const wave = Math.sin(levelTimer * 0.06) * 4;
  // Flag outline
  ctx.fillStyle = flagOutline;
  ctx.beginPath();
  ctx.moveTo(sx + 17, sy - 46);
  ctx.quadraticCurveTo(sx + 38 + wave, sy - 41 + wave * 0.5, sx + 57, sy - 35 + wave);
  ctx.quadraticCurveTo(sx + 38 + wave * 0.7, sy - 27, sx + 17, sy - 19);
  ctx.closePath();
  ctx.fill();
  // Flag fill
  ctx.fillStyle = flagColor;
  ctx.beginPath();
  ctx.moveTo(sx + 18, sy - 45);
  ctx.quadraticCurveTo(sx + 38 + wave, sy - 40 + wave * 0.5, sx + 55, sy - 35 + wave);
  ctx.quadraticCurveTo(sx + 38 + wave * 0.7, sy - 28, sx + 18, sy - 20);
  ctx.closePath();
  ctx.fill();
  // Flag highlight stripe
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.moveTo(sx + 18, sy - 44);
  ctx.quadraticCurveTo(sx + 38 + wave, sy - 40 + wave * 0.5, sx + 50, sy - 37 + wave);
  ctx.quadraticCurveTo(sx + 38 + wave * 0.7, sy - 35, sx + 18, sy - 37);
  ctx.closePath();
  ctx.fill();

  // Text on flag with outline
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.font = 'bold 9px monospace';
  const flagText = currentLevel === 5 ? 'TENURE!' : 'NEXT';
  ctx.strokeText(flagText, sx + 24, sy - 30);
  ctx.fillStyle = '#fff';
  ctx.fillText(flagText, sx + 24, sy - 30);

  // Sparkles when reached
  if (flagObj.reached) {
    for (let i = 0; i < 5; i++) {
      const angle = levelTimer * 0.08 + i * Math.PI * 2 / 5;
      const sparkX = sx + 35 + Math.cos(angle) * 20;
      const sparkY = sy - 32 + Math.sin(angle) * 12;
      ctx.fillStyle = '#ffd54f';
      drawStar(sparkX, sparkY, 4, 3, 1.5);
      ctx.fill();
    }
  }
}

function drawTrainingTasks() {
  const panelW = 260;
  const panelH = 20 + trainingTasks.length * 18;

  const panelY = 50;

  // Panel background
  ctx.fillStyle = 'rgba(10,10,30,0.85)';
  drawRoundRect(panelX, panelY, panelW, panelH, 8);
  ctx.fill();
  ctx.strokeStyle = '#ffd54f';
  ctx.lineWidth = 1.5;
  drawRoundRect(panelX, panelY, panelW, panelH, 8);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('TRAINING TASKS', panelX + 10, panelY + 14);

  // Tasks
  for (let i = 0; i < trainingTasks.length; i++) {
    const task = trainingTasks[i];
    const ty = panelY + 30 + i * 18;
    const isCurrent = i === trainingTaskIndex && !trainingCompleted;

    if (task.done) {
      ctx.fillStyle = '#66bb6a';
      ctx.font = '10px monospace';
      ctx.fillText('\u2713 ' + task.text, panelX + 10, ty);
    } else if (isCurrent) {
      const blink = Math.sin(Date.now() * 0.005) > 0;
      ctx.fillStyle = blink ? '#fff' : '#ffd54f';
      ctx.font = 'bold 10px monospace';
      ctx.fillText('\u25B6 ' + task.text, panelX + 10, ty);
    } else {
      ctx.fillStyle = '#546e7a';
      ctx.font = '10px monospace';
      ctx.fillText('  ' + task.text, panelX + 10, ty);
    }
  }

  if (trainingCompleted) {
    ctx.fillStyle = '#ffd54f';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TRAINING COMPLETE! Press ESC for menu', GAME_W / 2, GAME_H - 30);

  }

      ctx.fillText(`[${keyName(keyBindings.p1_potion[0])}]`, potHudX + Math.min(stats.potions, 8) * 12 + 4, potHudY + 8);
    }
  }

  // Level name (right side)
  ctx.fillStyle = '#b0bec5';

  ctx.fillStyle = '#78909c';
  ctx.fillText(`Time: ${Math.floor(levelTimer / 60)}s`, GAME_W - 14, 34);
  ctx.textAlign = 'left';
}

// ============================================================

// ============================================================
function generateLevel(levelIdx) {
  const lvl = LEVELS[levelIdx];
  const w = lvl.width;
  const h = lvl.height;
  const tiles = [];
  const entities = [];

  for (let y = 0; y < h; y++) {
    tiles[y] = [];
    for (let x = 0; x < w; x++) {
      tiles[y][x] = 0;
    }
  }

  const groundY = h - 2;

  for (let x = 0; x < w; x++) {
    tiles[groundY][x] = 1;
    tiles[groundY + 1][x] = 1;
  }

  entities.push({ type: 'player', x: 2, y: groundY - 2 });
  entities.push({ type: 'flag', x: w - 4, y: groundY - 3 });

  // Pits (scaled for longer levels)
  const pitCount = Math.round((3 + levelIdx * 2) * (w / 100));
  const pitPositions = [];
  for (let i = 0; i < pitCount; i++) {
    const px = 12 + Math.floor(Math.random() * (w - 25));
    let tooClose = false;
    for (const pp of pitPositions) {
      if (Math.abs(pp - px) < 8) tooClose = true;
    }
    if (tooClose) continue;
    pitPositions.push(px);
    const pitWidth = 3 + Math.floor(Math.random() * 2);
    for (let dx = 0; dx < pitWidth; dx++) {
      if (px + dx < w - 5) {
        tiles[groundY][px + dx] = 0;
        tiles[groundY + 1][px + dx] = 0;
      }
    }
    if (Math.random() < 0.6) {
      entities.push({ type: 'sign', x: px - 1, y: groundY - 1,
        text: ['Exit to Industry', 'Quit Academia?', 'Alt-Ac Career', 'Data Science Bootcamp', 'LinkedIn Awaits'][Math.floor(Math.random() * 5)] });
    }
  }

  // Platforms (scaled for longer levels)
  const platCount = Math.round((8 + levelIdx * 4) * (w / 100));
  for (let i = 0; i < platCount; i++) {
    const px = 5 + Math.floor(Math.random() * (w - 10));
    const py = groundY - 3 - Math.floor(Math.random() * 5);
    const pw = 3 + Math.floor(Math.random() * 4);
    for (let dx = 0; dx < pw; dx++) {
      if (px + dx < w && py >= 0) {
        tiles[py][px + dx] = 2;
      }
    }
    if (Math.random() < 0.7) {
      const collectTypes = ['publication', 'grant', 'citation', 'coffee', 'heart', 'flame', 'potion'];
      //                                  pub   grant  cite  coffee heart flame potion
      const weights = levelIdx === 0 ? [0.25, 0.12, 0.42, 0.08, 0.02, 0.065, 0.015] :
                      levelIdx === 1 ? [0.20, 0.19, 0.34, 0.10, 0.03, 0.09, 0.02] :
                      [0.18, 0.27, 0.23, 0.10, 0.03, 0.12, 0.04];
      let r = Math.random(), cumul = 0, cType = 'publication';
      for (let ci = 0; ci < collectTypes.length; ci++) {
        cumul += weights[ci];
        if (r < cumul) { cType = collectTypes[ci]; break; }
      }
      entities.push({ type: cType, x: px + Math.floor(pw / 2), y: py - 1 });
    }
  }

  // Ground collectibles (scaled for longer levels)
  for (let i = 0; i < Math.round((10 + levelIdx * 3) * (w / 100)); i++) {
    const cx = 5 + Math.floor(Math.random() * (w - 10));
    if (tiles[groundY][cx] === 1) {
      const collectTypes = ['publication', 'grant', 'citation', 'publication', 'grant', 'citation', 'citation', 'citation', 'grant', 'publication'];
      const gType = Math.random() < 0.03 ? 'potion' : collectTypes[Math.floor(Math.random() * collectTypes.length)];
      entities.push({ type: gType, x: cx, y: groundY - 1 });
    }
  }

  // Enemies
  const enemyTypes = [
    ['reviewer2', 'imposter'],
    ['reviewer2', 'imposter', 'bureaucrat', 'predatory_journal'],
    ['reviewer2', 'committee', 'bureaucrat', 'bureaucrat', 'reviewer2', 'committee', 'imposter', 'rival', 'predatory_journal'],  // Job Market
    ['reviewer2', 'bureaucrat', 'teaching', 'teaching', 'reviewer2', 'bureaucrat', 'imposter', 'rival', 'predatory_journal'],
    ['bureaucrat', 'teaching', 'committee', 'committee', 'bureaucrat', 'teaching', 'reviewer2', 'rival', 'predatory_journal'],
    ['reviewer2', 'bureaucrat', 'committee', 'bureaucrat', 'reviewer2', 'committee', 'teaching', 'rival', 'predatory_journal']
  ];

  // Collect platform info for enemy spawning
  const platforms = [];
  for (let row = 0; row < groundY; row++) {
    let start = -1;
    for (let col = 0; col < w; col++) {
      if (tiles[row][col] === 2) {
        if (start === -1) start = col;
      } else {
        if (start !== -1) { platforms.push({ y: row, x1: start, x2: col - 1 }); start = -1; }
      }
    }
    if (start !== -1) platforms.push({ y: row, x1: start, x2: w - 1 });
  }

  const enemyCount = Math.round((5 + levelIdx * 3) * 1.3 * (w / 100) * DIFFICULTY_ENEMY_MULT[difficulty]);
  const platformEnemyCount = platforms.length > 0 ? Math.floor(enemyCount * 0.4) : 0;
  const groundEnemyCount = enemyCount - platformEnemyCount;

  // Track occupied positions to prevent enemies spawning on top of each other
  const occupiedPositions = []; // [{x, y}]
  const MIN_ENEMY_DISTANCE = 4; // minimum tiles apart

  function isPositionFree(ex, ey) {
    for (const pos of occupiedPositions) {
      if (Math.abs(pos.x - ex) < MIN_ENEMY_DISTANCE && Math.abs(pos.y - ey) < 2) return false;
    }
    return true;
  }

  for (let i = 0; i < groundEnemyCount; i++) {
    let ex, attempts = 0;
    do {
      ex = 10 + Math.floor(Math.random() * (w - 15));
      attempts++;
    } while (!isPositionFree(ex, groundY) && attempts < 20);
    if (attempts >= 20) continue; // skip if no free spot found
    if (tiles[groundY][ex] === 1) {
      const types = enemyTypes[levelIdx];
      const eType = types[Math.floor(Math.random() * types.length)];
      entities.push({ type: eType, x: ex, y: groundY - 1.5, patrolRange: 2 + Math.floor(Math.random() * 3) });
      occupiedPositions.push({ x: ex, y: groundY });
    }
  }

  for (let i = 0; i < platformEnemyCount; i++) {
    const plat = platforms[Math.floor(Math.random() * platforms.length)];
    const platWidth = plat.x2 - plat.x1 + 1;
    let ex, attempts = 0;
    do {
      ex = plat.x1 + Math.floor(Math.random() * platWidth);
      attempts++;
    } while (!isPositionFree(ex, plat.y) && attempts < 15);
    if (attempts >= 15) continue;
    const types = enemyTypes[levelIdx];
    const eType = types[Math.floor(Math.random() * types.length)];
    const patrol = Math.min(2 + Math.floor(Math.random() * 2), Math.floor(platWidth / 2));
    entities.push({ type: eType, x: ex, y: plat.y - 1.5, patrolRange: patrol });
    occupiedPositions.push({ x: ex, y: plat.y });
  }

  // Grad students (mentorable NPCs — rare and valuable)
  const gsCount = Math.max(1, Math.floor((1 + levelIdx) * 0.7));
  let gsPlaced = 0;
  for (const plat of platforms) {
    if (gsPlaced >= gsCount) break;
    const pw2 = plat.x2 - plat.x1 + 1;
    if (pw2 >= 4 && Math.random() < 0.22) {
      entities.push({ type: 'gradStudent', x: plat.x1 + 1, y: plat.y - 1.5, patrolRange: Math.min(3, Math.floor(pw2 / 2)) });
      gsPlaced++;
    }
  }
  // One on the ground if none placed yet
  if (gsPlaced === 0) {
    const gsx = 15 + Math.floor(Math.random() * (w - 30));
    if (tiles[groundY][gsx] === 1) {
      entities.push({ type: 'gradStudent', x: gsx, y: groundY - 1.5, patrolRange: 3 });
    }
  }

  // Emotional support pets (random placement, 0-3 per level, on ground or platforms)
  const petCount = Math.floor(Math.random() * 3) + 1; // 1-3 pets per level
  for (let i = 0; i < petCount; i++) {
    const petKind = Math.random() < 0.5 ? 'dog' : 'cat';
    let placed = false;
    // 40% chance to place on a platform if available
    if (Math.random() < 0.4 && platforms.length > 0) {
      const plat = platforms[Math.floor(Math.random() * platforms.length)];
      const pw3 = plat.x2 - plat.x1 + 1;
      if (pw3 >= 3) {
        entities.push({ type: 'pet', x: plat.x1 + Math.floor(pw3 / 2), y: plat.y - 1, petKind });
        placed = true;
      }
    }
    // Otherwise place on ground
    if (!placed) {
      let px;
      for (let attempt = 0; attempt < 20; attempt++) {
        px = 8 + Math.floor(Math.random() * (w - 16));
        if (tiles[groundY][px] === 1) {
          entities.push({ type: 'pet', x: px, y: groundY - 1, petKind });
          placed = true;
          break;
        }
      }
      // Fallback to platform if ground didn't work
      if (!placed && platforms.length > 0) {
        const plat = platforms[Math.floor(Math.random() * platforms.length)];
        const pw3 = plat.x2 - plat.x1 + 1;
        if (pw3 >= 3) {
          entities.push({ type: 'pet', x: plat.x1 + Math.floor(pw3 / 2), y: plat.y - 1, petKind });
        }
      }
    }
  }

  // Signs
  const signMsgs = [
    ['"Sleep is for the tenured"', '"Free food in seminar room"', '"Advisor meeting: cancelled (again)"', '"IRB approval pending since 2019"'],
    ['"Temporary position (5th year)"', '"Your PI took first authorship"', '"Visa renewal: pending"', '"Lab meeting at 7 AM Saturday"'],
    ['"200 applicants, 1 position"', '"Skype interview at 3 AM"', '"Fly-out cancelled (budget cuts)"', '"We went with an internal candidate"'],
    ['"Startup funds: depleted"', '"Service: mandatory. Credit: none."', '"Teach intro AND advanced"', '"REU students need mentoring"'],
    ['"Meeting about meeting schedule"', '"Form 27B/6 required"', '"Annual report due yesterday"', '"Diversity statement v12 needed"'],
    ['"Decision in 6-8 months"', '"External letters: still waiting"', '"H-index insufficient"', '"One more R&R should do it"']
  ];

  const signCount = Math.round(4 * (w / 100));
  for (let i = 0; i < signCount; i++) {
    const sx = 8 + Math.floor(i * (w - 10) / signCount);
    if (tiles[groundY][sx] === 1) {
      const msgs = signMsgs[levelIdx];
      entities.push({ type: 'sign', x: sx, y: groundY - 1, text: msgs[Math.floor(Math.random() * msgs.length)] });
    }
  }

  if (levelIdx === 5) {
    entities.push({ type: 'dean', x: w - 20, y: groundY - 2, patrolRange: 8, hp: 12 });
    // Place flame collectibles leading up to and near the dean
    for (let fi = 0; fi < 8; fi++) {
      const fx = w - 50 + fi * 5;
      entities.push({ type: 'flame', x: fx, y: groundY - 1 });
    }
    // Potion stash near boss arena
    for (let fi = 0; fi < 3; fi++) {
      entities.push({ type: 'potion', x: w - 45 + fi * 6, y: groundY - 1 });
    }
    // Boss arena platforms
    for (let fi = 0; fi < 4; fi++) {
      const px = w - 40 + fi * 8;
      const py = groundY - 4 - (fi % 2) * 3;
      if (py >= 0 && px < w) {
        for (let dx = 0; dx < 4; dx++) {
          if (px + dx < w) tiles[py][px + dx] = 2;
        }
        entities.push({ type: 'flame', x: px + 1, y: py - 1 });
      }
    }
  }

  return { tiles, entities, width: w, height: h };
}

function generateTrainingLevel() {
  const w = 120;
  const h = 15;
  const tiles = [];
  const entities = [];

  for (let y = 0; y < h; y++) {
    tiles[y] = [];
    for (let x = 0; x < w; x++) tiles[y][x] = 0;
  }

  const groundY = h - 2;
  for (let x = 0; x < w; x++) {
    tiles[groundY][x] = 1;
    tiles[groundY + 1][x] = 1;
  }

  entities.push({ type: 'player', x: 2, y: groundY - 2 });

  // Section 1 (x: 0-20): Open flat ground - learn movement
  entities.push({ type: 'sign', x: 4, y: groundY - 1, text: '"Use arrow keys to move!"' });

  // Section 2 (x: 20-40): Platforms - learn jumping
  for (let px = 22; px < 38; px += 5) {
    const py = groundY - 3 - (px % 2);
    for (let dx = 0; dx < 3; dx++) tiles[py][px + dx] = 2;
    entities.push({ type: 'citation', x: px + 1, y: py - 1 });
  }
  entities.push({ type: 'sign', x: 20, y: groundY - 1, text: '"Jump with Up/Space!"' });

  // Section 3 (x: 40-55): Small pit - learn crossing gaps
  for (let dx = 0; dx < 3; dx++) {
    tiles[groundY][43 + dx] = 0;
    tiles[groundY + 1][43 + dx] = 0;
  }
  entities.push({ type: 'sign', x: 40, y: groundY - 1, text: '"Jump over the pit!"' });
  entities.push({ type: 'publication', x: 44, y: groundY - 3 });

  // Section 4 (x: 55-75): Stomping - a single slow reviewer2
  entities.push({ type: 'reviewer2', x: 63, y: groundY - 1.5, patrolRange: 2 });
  entities.push({ type: 'sign', x: 57, y: groundY - 1, text: '"Jump ON enemies to defeat them!"' });

  // Section 5 (x: 75-95): Double jump area with high platforms
  const highPlat1Y = groundY - 5;
  for (let dx = 0; dx < 4; dx++) tiles[highPlat1Y][80 + dx] = 2;
  entities.push({ type: 'grant', x: 82, y: highPlat1Y - 1 });
  const highPlat2Y = groundY - 7;
  for (let dx = 0; dx < 3; dx++) tiles[highPlat2Y][86 + dx] = 2;
  entities.push({ type: 'coffee', x: 87, y: highPlat2Y - 1 });
  entities.push({ type: 'sign', x: 77, y: groundY - 1, text: '"Double-jump in mid-air!"' });

  // Emotional support pet to collect
  entities.push({ type: 'pet', x: 70, y: groundY - 1, petKind: Math.random() < 0.5 ? 'dog' : 'cat' });
  entities.push({ type: 'sign', x: 68, y: groundY - 1, text: '"Collect a pet for emotional support!"' });

  // Section 6 (x: 95-115): Collectibles and a predatory journal
  entities.push({ type: 'predatory_journal', x: 100, y: groundY - 1.5, patrolRange: 0 });
  entities.push({ type: 'sign', x: 96, y: groundY - 1, text: '"Beware predatory journals!"' });
  entities.push({ type: 'publication', x: 103, y: groundY - 1 });
  entities.push({ type: 'flame', x: 106, y: groundY - 1 });
  entities.push({ type: 'sign', x: 108, y: groundY - 1, text: '"Pick up flames, press . to fire!"' });

  // Flag
  entities.push({ type: 'flag', x: w - 4, y: groundY - 3 });

  return { tiles, entities, width: w, height: h };
}

      }
      case 'predatory_journal': {
        const pjVariant = Math.random() < 0.5 ? 'eater' : 'shooter';
        enemies.push({
          type: 'predatory_journal', x: wx, y: wy, w: 32, h: 40,
          vx: 0, vy: 0, startX: wx, patrolRange: 0,
          alive: true, frame: 0, frameTimer: 0,
          pipeTimer: 0, pipeState: 'hidden',
          pipeY: wy, basePipeY: wy + 40,
          shootTimer: 0, variant: pjVariant,
          appearance: {}
        });
        break;
      }
      case 'dean':
        enemies.push({
          type: 'dean', x: wx, y: wy - TILE, w: 48, h: 56,
          vx: 1.5, startX: wx, patrolRange: (ent.patrolRange || 4) * TILE,
          alive: true, hp: ent.hp || 12, maxHp: ent.hp || 12,
          frame: 0, frameTimer: 0, attackTimer: 0,
          phase: 1, phaseTimer: 0, slamCooldown: 0,
          appearance: randomAppearance()
        });
        break;
      case 'gradStudent': {
        const gsNames = ['1st Year', '2nd Year', '3rd Year', 'ABD', 'Postdoc', 'Lab Rat', 'TA'];
        gradStudents.push({
          x: wx, y: wy, w: 24, h: 28, vx: 0.8, vy: 0,
          startX: wx, patrolRange: (ent.patrolRange || 3) * TILE,
          onGround: false, mentee: null, hp: 2,
          frame: 0, frameTimer: 0,
          pencilCooldown: 0, panicked: false, panicTimer: 0, spent: false,
          gsLabel: gsNames[Math.floor(Math.random() * gsNames.length)],
          appearance: randomAppearance()
        });
        break;
      }
      case 'pet': {
        pets.push({
          x: wx, y: wy, w: 20, h: 18, vx: 0, vy: 0,
          onGround: false, facingRight: true,
          frame: 0, frameTimer: 0,
          kind: ent.petKind || (Math.random() < 0.5 ? 'dog' : 'cat'),
          collected: false, owner: null,
          bobOffset: Math.random() * Math.PI * 2,
          trail: [],
          tailWag: 0,
        });
        break;
      }
      case 'sign':
        signs.push({ x: wx, y: wy, text: ent.text });
        break;
    }
  }

  // Player 2
  if (twoPlayerMode && player) {
    player2 = {
      x: player.x + 30, y: player.y, vx: 0, vy: 0,
      w: 26, h: 32,
      onGround: false, facingRight: true,
      frame: 0, frameTimer: 0,
      powered: false, powerTimer: 0,
      invincible: false, invTimer: 0,
      dead: false, isPlayer: true,
      hasDoubleJumped: false,
      jumpBuffer: 0, coyoteTime: 0, wasOnGround: false,
      hasFlame: false, flameTimer: 0, fireCooldown: 0,
      mentoring: null, mentoringTimer: 0, headbutting: false
    };
  } else {
    player2 = null;
  }
  if (player) { player.isPlayer = true; player.mentoring = null; player.mentoringTimer = 0; player.headbutting = false; }

  camera.x = 0;
  camera.y = 0;
  levelTimer = 0;
  gameState = 'levelIntro';
  introTimer = 180;
}

// ============================================================
// COLLISION
// ============================================================
function getTile(tx, ty) {
  if (tx < 0 || tx >= level.width || ty < 0 || ty >= level.height) return 0;
  return level.tiles[ty][tx];
}
function isSolid(tx, ty) { return getTile(tx, ty) === 1; }
function isPlatform(tx, ty) { return getTile(tx, ty) === 2; }
function rectCollide(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// PHYSICS
// ============================================================
function moveEntity(ent, gravity) {
  ent.x += ent.vx;
  const left = Math.floor(ent.x / TILE);
  const right = Math.floor((ent.x + ent.w - 1) / TILE);
  const top = Math.floor(ent.y / TILE);
  const bottom = Math.floor((ent.y + ent.h - 1) / TILE);

  for (let ty = top; ty <= bottom; ty++) {
    for (let tx = left; tx <= right; tx++) {
      if (isSolid(tx, ty)) {
        if (ent.vx > 0) ent.x = tx * TILE - ent.w;
        else if (ent.vx < 0) ent.x = (tx + 1) * TILE;
        if (ent.isPlayer) ent.vx = 0;
        else ent.vx *= -1;
      }
    }
  }

  ent.vy += gravity;
  if (ent.vy > 12) ent.vy = 12;
  ent.y += ent.vy;
  ent.onGround = false;

  const left2 = Math.floor(ent.x / TILE);
  const right2 = Math.floor((ent.x + ent.w - 1) / TILE);
  const top2 = Math.floor(ent.y / TILE);
  const bottom2 = Math.floor((ent.y + ent.h - 1) / TILE);

  for (let ty = top2; ty <= bottom2; ty++) {
    for (let tx = left2; tx <= right2; tx++) {
      if (isSolid(tx, ty)) {
        if (ent.vy > 0) {
          ent.y = ty * TILE - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        } else if (ent.vy < 0) {
          ent.y = (ty + 1) * TILE;
          ent.vy = 0;
        }
      }
      if (isPlatform(tx, ty) && ent.vy >= 0) {
        const platTop = ty * TILE;
        const entBottom = ent.y + ent.h;
        const prevBottom = entBottom - ent.vy;
        if (prevBottom <= platTop + 2 && entBottom >= platTop) {
          ent.y = platTop - ent.h;
          ent.vy = 0;
          ent.onGround = true;
        }
      }
    }
  }

  if (ent.y > level.height * TILE) return 'fell';
  return null;
}

// ============================================================
// PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5 - 2,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 3,
      type: Math.random() < 0.3 ? 'star' : 'circle'
    });
  }
}

function spawnFloatingText(x, y, text, color) {
  floatingTexts.push({ x, y, text, color, life: 60, vy: -1.5, scale: 1.5 });
}

function showMessage(text) {
  messageQueue.push(text);
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  if (!currentMessage && messageQueue.length > 0) {
    currentMessage = messageQueue.shift();
    messageTimer = 180;
  }
  if (currentMessage) {
    messageTimer--;
    if (messageTimer <= 0) currentMessage = null;
  }

  // Music toggle (M works in any game state except paused — handled separately there)
  if (justPressed['KeyM'] && gameState !== 'paused') {
    musicVolume = musicVolume > 0 ? 0 : 0.15;
    if (musicVolume === 0) { bgMusic.pause(); }
    else { bgMusic.volume = musicVolume; prevMusicKey = ''; }
  }
  // SFX toggle (S works during gameplay)
  if (justPressed['KeyS'] && gameState === 'playing') {
    sfxVolume = sfxVolume > 0 ? 0 : 0.25;
  }

  // Pause toggle
  if (gameState === 'playing' && justPressed['Escape']) {
    gameState = 'paused';
    SFX.pause();
    for (const key in justPressed) delete justPressed[key];
    return;
  }
  if (gameState === 'paused') {
    if (justPressed['Escape'] || justPressed['Space']) {
      gameState = 'playing';
    }
    if (justPressed['KeyX']) {
      gameState = 'menu';
      trainingMode = false;
    }
    if (justPressed['KeyM']) {
      musicVolume = musicVolume > 0 ? 0 : 0.15;
      if (musicVolume === 0) { bgMusic.pause(); }
      else { bgMusic.volume = musicVolume; prevMusicKey = ''; }
    }
    if (justPressed['KeyS']) {
      sfxVolume = sfxVolume > 0 ? 0 : 0.25;
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'levelIntro') {
    introTimer--;
    if (introTimer <= 0 || keys['Space'] || keys['Enter']) {
      gameState = 'playing';
      keys['Space'] = false;
      keys['Enter'] = false;
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'dead') {
    deathTimer--;
    const deathLives = twoPlayerMode ? p1Stats.lives + p2Stats.lives : stats.lives;
    if (deathLives > 0) {
      // Auto-dismiss after timer for setbacks
      if (deathTimer <= 0) {
        initLevel(currentLevel);
        gameState = 'levelIntro';
        introTimer = 120;
      }
    } else {
      // Game over: wait for keypress (after a brief delay)
      if (deathTimer <= 0 && (justPressed['Space'] || justPressed['Enter'])) {
        gameState = 'menu';
      }
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'jobMarketCheck') {
    if (jobMarketPassed !== null) {
      winTimer--;
      if (winTimer <= 0) {
        if (jobMarketPassed) {
          jobMarketPassed = null;
          initLevel(3); // advance to Assistant Prof
        } else {
          jobMarketPassed = null;
          initLevel(1); // back to Postdoc
        }
      }
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'levelComplete') {
    winTimer--;
    if (winTimer <= 0) {
      if (currentLevel < LEVELS.length - 1) {
        initLevel(currentLevel + 1);
      } else {
        gameState = 'gameWin';
        winTimer = 600;
        submitScore();
        fetchLeaderboard();
      }
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'gameWin') {
    winTimer--;
    // Wait for keypress (after a brief delay to prevent accidental skip)
    if (winTimer <= 0 && (justPressed['Space'] || justPressed['Enter'])) {
      gameState = 'menu';
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'enterName' || gameState === 'showLeaderboard') {
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState === 'menu') {
    if (customizing) {
      if (justPressed['ArrowUp'] || justPressed['KeyW']) {
        customCategory = (customCategory - 1 + CUSTOM_CATEGORIES.length) % CUSTOM_CATEGORIES.length;
      }
      if (justPressed['ArrowDown'] || justPressed['KeyS']) {
        customCategory = (customCategory + 1) % CUSTOM_CATEGORIES.length;
      }
      if (justPressed['ArrowLeft'] || justPressed['KeyA']) {
        const key = CUSTOM_KEYS[customCategory];
        const len = CUSTOM_ARRAYS[customCategory].length;
        customIndices[key] = (customIndices[key] - 1 + len) % len;
        applyCustomAppearance();
      }
      if (justPressed['ArrowRight'] || justPressed['KeyD']) {
        const key = CUSTOM_KEYS[customCategory];
        const len = CUSTOM_ARRAYS[customCategory].length;
        customIndices[key] = (customIndices[key] + 1) % len;
        applyCustomAppearance();
      }
      if (justPressed['KeyR']) {
        randomizeCustomIndices();
      }
      if (justPressed['Space'] || justPressed['Enter']) {
        customizing = false;
        startGame();
      }
      if (justPressed['Escape']) {
        customizing = false;
      }
    } else if (keyConfigActive) {
      if (keyConfigWaiting) {
        // Waiting for a new key press to bind
        for (const code in justPressed) {
          if (code === 'Escape') {
            keyConfigWaiting = false;
            break;
          }
          const action = BINDABLE_ACTIONS[keyConfigIndex];
          keyBindings[action] = [code];
          keyConfigWaiting = false;
          break;
        }
      } else {
        if (justPressed['ArrowUp'] || justPressed['KeyW']) {
          keyConfigIndex = (keyConfigIndex - 1 + BINDABLE_ACTIONS.length) % BINDABLE_ACTIONS.length;
        }
        if (justPressed['ArrowDown'] || justPressed['KeyS']) {
          keyConfigIndex = (keyConfigIndex + 1) % BINDABLE_ACTIONS.length;
        }
        if (justPressed['Enter'] || justPressed['Space']) {
          keyConfigWaiting = true;
        }
        if (justPressed['Escape']) {
          keyConfigActive = false;
        }
      }
    } else {
      if (justPressed['Space']) {
        SFX.menuStart();
        startGame();
      }
      if (justPressed['KeyC']) {
        customizing = true;
        customCategory = 0;
      }
      if (justPressed['KeyL']) {
        gameState = 'showLeaderboard';
        fetchLeaderboard();
      }
      if (justPressed['KeyK']) {
        keyConfigActive = true;
        keyConfigIndex = 0;
        keyConfigWaiting = false;
      }
      if (justPressed['Digit2']) {
        twoPlayerMode = !twoPlayerMode;
        if (twoPlayerMode) player2Appearance = randomAppearance();
        SFX.menuToggle();
      }
      if (justPressed['KeyT']) {
        SFX.menuStart();
        initTrainingLevel();
        for (const key in justPressed) delete justPressed[key];
        return;
      }
      if (justPressed['KeyD']) {
        const idx = DIFFICULTY_ORDER.indexOf(difficulty);
        difficulty = DIFFICULTY_ORDER[(idx + 1) % DIFFICULTY_ORDER.length];
        SFX.menuToggle();
      }
      if (justPressed['KeyM']) {
        musicVolume = musicVolume > 0 ? 0 : 0.15;
        if (musicVolume === 0) { bgMusic.pause(); }
        else { bgMusic.volume = musicVolume; prevMusicKey = ''; }
        SFX.menuToggle();
      }
    }
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  if (gameState !== 'playing') {
    for (const key in justPressed) delete justPressed[key];
    return;
  }

  levelTimer++;

  // Training task progress
  if (trainingMode && !trainingCompleted && trainingTasks.length > 0) {
    if (trainingTaskIndex < trainingTasks.length) {
      const task = trainingTasks[trainingTaskIndex];
      if (!task.done && task.check()) {
        task.done = true;
        spawnFloatingText(player.x, player.y - 20, 'Task Complete!', '#66bb6a');
        SFX.collectPub();
        trainingTaskIndex++;
        if (trainingTaskIndex >= trainingTasks.length) {
          trainingCompleted = true;
          showMessage('Training complete! You\'re ready for academia!');
        }
      }
    }
  }

  // --- Helper: update one player ---
  function updatePlayer(pl, prefix) {
    if (!pl || pl.dead) return;
    const mentoringGS = pl.mentoring;
    const speedMul = mentoringGS ? 1.5 : 1;
    const speed = (pl.powered ? 5 : 3.5) * speedMul;
    if (isAction(prefix + '_left')) {
      pl.vx = -speed;
      pl.facingRight = false;
    } else if (isAction(prefix + '_right')) {
      pl.vx = speed;
      pl.facingRight = true;
    } else {
      pl.vx *= 0.7;
      if (Math.abs(pl.vx) < 0.3) pl.vx = 0;
    }
    if (pl.onGround) { pl.coyoteTime = 8; pl.wasOnGround = true; }
    else { if (pl.coyoteTime > 0) pl.coyoteTime--; }
    const jp = isActionJP(prefix + '_jump');
    if (jp) pl.jumpBuffer = 8;
    if (pl.jumpBuffer > 0) pl.jumpBuffer--;
    const wj = pl.jumpBuffer > 0;
    const cgj = pl.onGround || pl.coyoteTime > 0;
    const jumpPower = mentoringGS ? (pl.powered ? -15 : -13) : (pl.powered ? -13 : -11);
    if (wj && cgj) {
      pl.vy = jumpPower;
      pl.onGround = false; pl.coyoteTime = 0; pl.jumpBuffer = 0;
      pl.hasDoubleJumped = false; pl.wasOnGround = false;
      if (mentoringGS) { mentoringGS.vy = jumpPower; mentoringGS.onGround = false; }
      spawnParticles(pl.x + pl.w / 2, pl.y + pl.h, 'rgba(180,180,180,0.6)', 4);
      SFX.jump();
    } else if (jp && !cgj && !pl.hasDoubleJumped) {
      pl.vy = pl.powered ? -11 : -9;
      pl.hasDoubleJumped = true; pl.jumpBuffer = 0;
      spawnParticles(pl.x + pl.w / 2, pl.y + pl.h, '#aaa', 6);
      SFX.doubleJump();
    }
    if (Math.abs(pl.vx) > 0.5) {
      pl.frameTimer++;
      if (pl.frameTimer > 8) { pl.frame = (pl.frame + 1) % 4; pl.frameTimer = 0; }
    }
    if (pl.powered) { pl.powerTimer--; if (pl.powerTimer <= 0) pl.powered = false; }
    if (pl.invincible) { pl.invTimer--; if (pl.invTimer <= 0) pl.invincible = false; }
    if (pl.hasFlame) { pl.flameTimer--; if (pl.flameTimer <= 0) pl.hasFlame = false; }
    if (pl.fireCooldown > 0) pl.fireCooldown--;
    // Fireball
    if (pl.hasFlame && isActionJP(prefix + '_fire') && pl.fireCooldown <= 0) {
      pl.fireCooldown = 20;
      const dir = pl.facingRight ? 1 : -1;
      fireballs.push({
        x: pl.x + (dir > 0 ? pl.w : -8), y: pl.y + pl.h / 2 - 4,
        vx: dir * 7, vy: 0, w: 12, h: 12, life: 120, bounces: 0, owner: pl
      });
      spawnParticles(pl.x + pl.w / 2, pl.y + pl.h / 2, '#ff5722', 4);
      SFX.fireball();
    }
    // Pencil shooting while mentoring grad student
    if (mentoringGS && isActionJP(prefix + '_fire') && mentoringGS.pencilCooldown <= 0) {
      mentoringGS.pencilCooldown = 25;
      const dir = pl.facingRight ? 1 : -1;
      fireballs.push({
        x: mentoringGS.x + (dir > 0 ? mentoringGS.w : -6), y: mentoringGS.y + 8,
        vx: dir * 8, vy: -1.5, w: 10, h: 4, life: 90, bounces: 0, isPencil: true, owner: pl
      });
      spawnParticles(mentoringGS.x + mentoringGS.w / 2, mentoringGS.y + 10, '#ffd54f', 3);
      SFX.pencil();
    }
    // Mentor's Wrath magic (Golden Axe style — uses ALL stacked potions)
    const plSt = twoPlayerMode ? statsFor(pl) : stats;
    if (isActionJP(prefix + '_potion') && plSt.potions > 0 && !magicActive) {
      const potionsUsed = plSt.potions;
      plSt.potions = 0;
      magicLevel = Math.min(potionsUsed, 4); // 1-4 levels
      magicActive = true;
      magicDuration = 60 + magicLevel * 40; // longer for higher level
      magicTimer = 0;
      magicDamageDealt = false;
      magicCasterX = pl.x + pl.w / 2;
      magicCasterY = pl.y;
      magicCasterPlayer = pl;
      plSt.score += potionsUsed * 100;
      // Generate fire column positions across the screen
      magicColumns = [];
      const colCount = 3 + magicLevel * 3; // 6, 9, 12, 15 columns
      for (let i = 0; i < colCount; i++) {
        magicColumns.push({
          screenX: (i + 0.5) * (GAME_W / colCount),
          delay: Math.floor(i * (15 / magicLevel)) + Math.floor(Math.random() * 8),
          height: 0,
          maxHeight: GAME_H * (0.5 + magicLevel * 0.12) + Math.random() * 40,
          width: 20 + magicLevel * 6 + Math.random() * 10,
        });
      }
      const wrathNames = [
        "MENTOR'S WRATH!",
        "MENTOR'S FURY!",
        "MENTOR'S INFERNO!",
        "MENTOR'S APOCALYPSE!"
      ];
      spawnFloatingText(pl.x, pl.y - 30, wrathNames[magicLevel - 1], '#ff5722');
      showMessage(magicLevel >= 3 ? 'Your mentor rains fire upon academia!' : "Mentor's Wrath unleashed!");
      SFX.wrathActivate();
    }
    // Mentoring: steer grad student and snap to it
    if (pl.mentoring) {
      const gs = pl.mentoring;
      // Mentoring timer (15 seconds = 900 frames)
      pl.mentoringTimer--;
      if (pl.mentoringTimer <= 0) {
        // Time's up — dismount, grad student runs off
        pl.mentoring = null; gs.mentee = null;
        pl.vy = -4;
        pl.headbutting = false;
        gs.spent = true;
        gs.panicked = true;
        gs.panicTimer = 180;
        gs.vx = (pl.facingRight ? -3.5 : 3.5);
        gs.vy = -4;
        spawnFloatingText(gs.x, gs.y - 10, 'Gotta go!', '#ff9800');
        showMessage('Grad student defended their thesis and left!');
      } else {
        // Headbutt mode: jump + arrow while mentoring
        const pressingArrow = isAction(prefix + '_left') || isAction(prefix + '_right');
        if (isActionJP(prefix + '_jump') && pressingArrow) {
          pl.headbutting = true;
          spawnFloatingText(gs.x, gs.y - 10, 'HEAD BUTT!', '#ff5722');
          SFX.headbutt();
        }
        // Headbutt mode lasts until the player stops pressing arrow keys
        if (pl.headbutting && !pressingArrow) {
          pl.headbutting = false;
        }
        if (Math.abs(pl.vx) > 0.5) {
          gs.vx = pl.vx * (pl.headbutting ? 1.0 : 0.6); // faster when headbutting
          gs.facingRight = pl.vx > 0;
        }
        pl.x = gs.x + (gs.w - pl.w) / 2;
        pl.y = gs.y - pl.h;
        pl.vy = gs.vy;
        pl.onGround = gs.onGround;
        if (gs.pencilCooldown > 0) gs.pencilCooldown--;
      }
    }
    // Physics
    if (!pl.mentoring) {
      const result = moveEntity(pl, 0.5);
      if (result === 'fell') {
        if (pl === player) { playerDie('Fell into industry...'); }
        else { p2Die('Player 2 fell!'); }
        return;
      }
    }
  }

  // Tab to swap controls between players
  if (twoPlayerMode && justPressed['Tab']) {
    swappedControls = !swappedControls;
    showMessage(swappedControls ? 'Controls swapped! P1 keys -> P2, P2 keys -> P1' : 'Controls restored to default');
  }

  const p1Prefix = swappedControls ? 'p2' : 'p1';
  const p2Prefix = swappedControls ? 'p1' : 'p2';
  updatePlayer(player, p1Prefix);
  if (gameState !== 'playing') { for (const key in justPressed) delete justPressed[key]; return; }
  updatePlayer(player2, p2Prefix);
  if (gameState !== 'playing') { for (const key in justPressed) delete justPressed[key]; return; }

  // In two-player mode, death is final — no respawn

  // Camera (smooth) — follow midpoint if two players
  let camFocusX, camFocusY;
  if (player.dead && player2 && !player2.dead) {
    camFocusX = player2.x; camFocusY = player2.y;
  } else if (player2 && !player2.dead && !player.dead) {
    camFocusX = (player.x + player2.x) / 2;
    camFocusY = (player.y + player2.y) / 2;
  } else {
    camFocusX = player.x; camFocusY = player.y;
  }
  const targetCamX = camFocusX - GAME_W / 2 + player.w / 2;
  const targetCamY = camFocusY - GAME_H / 2;
  camera.x += (targetCamX - camera.x) * 0.1;
  camera.y += (targetCamY - camera.y) * 0.05;
  camera.x = Math.max(0, Math.min(level.width * TILE - GAME_W, camera.x));
  camera.y = Math.max(0, Math.min(level.height * TILE - GAME_H, camera.y));

  // In two-player mode, clamp both players to stay within camera viewport
  if (twoPlayerMode) {
    const screenLeft = camera.x;
    const screenRight = camera.x + GAME_W;
    for (const pl of [player, player2]) {
      if (!pl || pl.dead) continue;
      if (pl.x < screenLeft) { pl.x = screenLeft; pl.vx = Math.max(0, pl.vx); }
      if (pl.x + pl.w > screenRight) { pl.x = screenRight - pl.w; pl.vx = Math.min(0, pl.vx); }
    }
  }

  // Grad students update
  for (const gs of gradStudents) {
    // Panic behavior: run away fast, then disappear
    if (gs.panicked) {
      gs.panicTimer--;
      gs.x += gs.vx;
      gs.vy = (gs.vy || 0) + 0.5;
      if (gs.vy > 12) gs.vy = 12;
      gs.y += gs.vy;
      gs.onGround = false;
      const gLeft = Math.floor(gs.x / TILE);
      const gRight = Math.floor((gs.x + gs.w - 1) / TILE);
      const gBot = Math.floor((gs.y + gs.h) / TILE);
      for (let tx = gLeft; tx <= gRight; tx++) {
        if (isSolid(tx, gBot) || isPlatform(tx, gBot)) {
          gs.y = gBot * TILE - gs.h;
          gs.vy = 0;
          gs.onGround = true;
        }
      }
      if (gs.panicTimer <= 0) {
        gradStudents = gradStudents.filter(g => g !== gs);
      }
      continue;
    }

    gs.x += gs.vx;
    if (!gs.mentee && Math.abs(gs.x - gs.startX) > gs.patrolRange) gs.vx *= -1;
    gs.vy = (gs.vy || 0) + 0.5;
    if (gs.vy > 12) gs.vy = 12;
    gs.y += gs.vy;
    gs.onGround = false;
    const gLeft = Math.floor(gs.x / TILE);
    const gRight = Math.floor((gs.x + gs.w - 1) / TILE);
    const gBot = Math.floor((gs.y + gs.h) / TILE);
    for (let tx = gLeft; tx <= gRight; tx++) {
      if (isSolid(tx, gBot) || isPlatform(tx, gBot)) {
        gs.y = gBot * TILE - gs.h;
        gs.vy = 0;
        gs.onGround = true;
      }
    }
    // Check if grad student fell off the map (kills riding player too)
    if (gs.y > level.height * TILE) {
      if (gs.mentee) {

        rider.mentoring = null;
        rider.headbutting = false;

    }

    gs.frameTimer++;
    if (gs.frameTimer > 10) { gs.frame = (gs.frame + 1) % 2; gs.frameTimer = 0; }

    if (gs.mentee && gs.mentee.headbutting && Math.abs(gs.vx) > 1.5) {

    for (const pl of [player, player2]) {

        SFX.mentorStart();
      }
    }
  }

  // Collectibles — check both players
  function collectItem(c, cy, pl) {
    if (!pl || pl.dead) return false;
    if (!rectCollide(pl, { x: c.x, y: cy, w: c.w, h: c.h })) return false;
    c.collected = true;
    const st = twoPlayerMode ? statsFor(pl) : stats;
    const plLabel = twoPlayerMode ? (pl === player2 ? 'P2 ' : 'P1 ') : '';
    switch (c.type) {
      case 'publication':
        st.publications++; st.score += 100;

        SFX.collectGrant();

      case 'flame':
        pl.hasFlame = true; pl.flameTimer = 900; st.score += 250;
        spawnParticles(c.x + 12, cy + 12, '#ff5722', 20);
        spawnFloatingText(c.x, cy, plLabel + 'FLAME!', '#ff5722');
        const fireKey = pl === player2 ? keyBindings.p2_fire[0] : keyBindings.p1_fire[0];
        showMessage(`${plLabel}New Contribution Flame! Press ${keyName(fireKey)} to throw fireballs!`);
        SFX.collectFlame();
        break;
      case 'potion':
        st.potions++; st.score += 150;
        spawnParticles(c.x + 12, cy + 12, '#9c27b0', 12);
        spawnFloatingText(c.x, cy, plLabel + '+1 Potion!', '#ce93d8');
        const potKey = pl === player2 ? keyBindings.p2_potion[0] : keyBindings.p1_potion[0];
        showMessage(`${plLabel}Mentor's Wrath potion! [${keyName(potKey)}]`);
        SFX.collectPotion();
        break;
    }
    return true;
  }
  for (const c of collectibles) {
    if (c.collected) continue;
    c.bobOffset += 0.05;
    const cy = c.y + Math.sin(c.bobOffset) * 4;
    if (!collectItem(c, cy, player)) collectItem(c, cy, player2);
  }

  // Emotional support pets
  const PET_FOLLOW_DIST = 28;
  const PET_TRAIL_LENGTH = 15;
  for (const pet of pets) {
    pet.tailWag += 0.15;
    if (!pet.collected) {
      // Scared pets run away and eventually disappear
      if (pet.scared) {
        pet.scaredTimer--;
        pet.x += pet.vx;
        pet.vy += 0.5;
        if (pet.vy > 12) pet.vy = 12;
        pet.y += pet.vy;
        // Ground collision (so they run along the ground)
        const petBottom = Math.floor((pet.y + pet.h) / TILE);
        const petLeft = Math.floor(pet.x / TILE);
        const petRight = Math.floor((pet.x + pet.w - 1) / TILE);
        for (let tx = petLeft; tx <= petRight; tx++) {
          if (isSolid(tx, petBottom) || isPlatform(tx, petBottom)) {

            pet.vy = 0;

        }
        pet.facingRight = pet.vx > 0;
        pet.frameTimer++;
        if (pet.frameTimer > 6) { pet.frame = (pet.frame + 1) % 4; pet.frameTimer = 0; }
        if (pet.scaredTimer <= 0 || pet.y > level.height * TILE) {

      // Uncollected: bob in place, check for player pickup
      pet.bobOffset += 0.05;
      // Apply gravity
      pet.vy += 0.5;
      if (pet.vy > 12) pet.vy = 12;
      pet.y += pet.vy;
      // Ground collision
      const petBottom = Math.floor((pet.y + pet.h) / TILE);
      const petLeft = Math.floor(pet.x / TILE);
      const petRight = Math.floor((pet.x + pet.w - 1) / TILE);
      for (let tx = petLeft; tx <= petRight; tx++) {
        if (isSolid(tx, petBottom)) {

          pet.vy = 0;

        if (isPlatform(tx, petBottom) && pet.vy >= 0) {
          const platTop = petBottom * TILE;

      // Check collection by player
      for (const pl of [player, player2]) {

        if (rectCollide(pl, pet)) {

          // Fill trail with current player position
          for (let i = 0; i < PET_TRAIL_LENGTH; i++) {

    } else {
      // Following — chain pets so they form a train (each follows the one ahead)
      const owner = pet.owner;
      if (owner && !owner.dead) {
        // Determine who this pet follows: the owner, or the previous collected pet
        const collectedPets = pets.filter(p => p.collected && p.owner === owner);
        const myIndex = collectedPets.indexOf(pet);
        let leader;
        if (myIndex <= 0) {
          leader = owner; // First pet follows the player
        } else {
          leader = collectedPets[myIndex - 1]; // Follow the previous pet
        }
        // Push current leader position to trail
        pet.trail.push({ x: leader.x, y: leader.y });
        if (pet.trail.length > PET_TRAIL_LENGTH) pet.trail.shift();
        // Follow the oldest trail position (delayed follow)
        const target = pet.trail[0];
        const dx = target.x - pet.x;
        const dy = target.y - pet.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > PET_FOLLOW_DIST) {
          // Move towards target smoothly
          pet.vx = dx * 0.15;
          pet.vy = dy * 0.15;
          pet.x += pet.vx;
          pet.y += pet.vy;
        } else {
          pet.vx *= 0.8;
          pet.vy *= 0.8;
          pet.x += pet.vx;
          pet.y += pet.vy;
        }
        // Face same direction as leader
        pet.facingRight = leader.facingRight;
        // Animate walking
        if (Math.abs(pet.vx) > 0.3) {
          pet.frameTimer++;
          if (pet.frameTimer > 10) { pet.frame = (pet.frame + 1) % 4; pet.frameTimer = 0; }
        }
      }
    }
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (Math.abs(e.x - e.startX) > e.patrolRange) e.vx *= -1;

    e.frameTimer++;
    if (e.frameTimer > 12) { e.frame = (e.frame + 1) % 2; e.frameTimer = 0; }

    // Rival charging and shooting behavior
    if (e.type === 'rival' && e.alive) {
      e.chargeTimer = (e.chargeTimer || 0) + 1;
      e.shootTimer = (e.shootTimer || 0) + 1;
      const closestP = [player, player2].filter(p => p && !p.dead).sort((a,b) => Math.abs(a.x - e.x) - Math.abs(b.x - e.x))[0];
      // Charging behavior
      if (closestP && Math.abs(closestP.x - e.x) < TILE * 5 && e.chargeTimer > 120) {
        e.charging = true;
        e.vx = closestP.x < e.x ? -3.5 : 3.5;
        if (e.chargeTimer > 160) { e.charging = false; e.chargeTimer = 0; e.vx = e.vx > 0 ? 0.7 : -0.7; }
      } else {
        e.charging = false;
      }
      // Shooting: rivals throw critique papers at the player
      if (closestP && Math.abs(closestP.x - e.x) < TILE * 8 && e.shootTimer > 160) {
        e.shootTimer = 0;
        const dir = closestP.x < e.x ? -1 : 1;
        enemies.push({
          type: 'critique', x: e.x + e.w / 2, y: e.y + 12,
          w: 14, h: 10, vx: dir * 3.5, vy: -1.5,
          startX: e.x, patrolRange: 300, alive: true,
          frame: 0, frameTimer: 0, isProjectile: true
        });
        spawnFloatingText(e.x, e.y - 5, 'Peer Review!', e.rivalColor || '#ff9800');
      }
    }

    // Dean boss — multi-phase attack patterns
    if (e.type === 'dean' && e.alive) {
      // Update phase based on HP
      const hpPct = e.hp / e.maxHp;
      e.phase = hpPct > 0.66 ? 1 : hpPct > 0.33 ? 2 : 3;
      e.attackTimer++;
      const attackRate = e.phase === 1 ? 100 : e.phase === 2 ? 70 : 45;
      if (e.attackTimer > attackRate) {
        e.attackTimer = 0;
        const closestP = [player, player2].filter(p => p && !p.dead).sort((a,b) => Math.abs(a.x - e.x) - Math.abs(b.x - e.x))[0] || player;
        if (e.phase === 1) {
          // Single rejection letter
          enemies.push({
            type: 'rejection', x: e.x + e.w / 2, y: e.y + 10,
            w: 20, h: 14, vx: closestP.x < e.x ? -4 : 4, vy: -2,
            startX: e.x, patrolRange: 400, alive: true,
            frame: 0, frameTimer: 0, isProjectile: true
          });
        } else if (e.phase === 2) {
          // Spread of 3 rejection letters
          for (let si = -1; si <= 1; si++) {
            enemies.push({
              type: 'rejection', x: e.x + e.w / 2, y: e.y + 10,
              w: 20, h: 14, vx: (closestP.x < e.x ? -4 : 4) + si * 1.5, vy: -3 + Math.abs(si),
              startX: e.x, patrolRange: 400, alive: true,
              frame: 0, frameTimer: 0, isProjectile: true
            });
          }
        } else {
          // Phase 3: fan of 5 + speed boost
          for (let si = -2; si <= 2; si++) {
            enemies.push({
              type: 'rejection', x: e.x + e.w / 2, y: e.y + 10,
              w: 20, h: 14, vx: (closestP.x < e.x ? -5 : 5) + si * 1.2, vy: -4 + Math.abs(si) * 0.8,
              startX: e.x, patrolRange: 500, alive: true,
              frame: 0, frameTimer: 0, isProjectile: true
            });
          }
          // Phase 3 boss moves faster
          e.vx = e.vx > 0 ? 3 : -3;
        }
      }
      // Phase transitions
      if (e.phaseTimer) {
        e.phaseTimer--;
        if (e.phaseTimer === 0) showMessage(e.phase === 2 ? 'The Dean grows angry!' : 'FINAL PHASE! The Dean is furious!');
      }
    }

    // Predatory Journal — Piranha Plant behavior
    if (e.type === 'predatory_journal' && e.alive) {
      e.pipeTimer++;
      const cycleDuration = 240; // full cycle
      const riseTime = 40;
      const exposeTime = 120;
      const sinkTime = 40;
      const phase = e.pipeTimer % cycleDuration;

      if (phase < riseTime) {
        // Rising out of pipe
        e.pipeState = 'rising';
        const progress = phase / riseTime;
        e.y = e.basePipeY - e.h * progress;
      } else if (phase < riseTime + exposeTime) {
        // Fully exposed - dangerous
        e.pipeState = 'exposed';
        e.y = e.basePipeY - e.h;

        // Shooter variant fires spam emails
        if (e.variant === 'shooter') {
          e.shootTimer++;
          if (e.shootTimer > 80) {
            e.shootTimer = 0;
            const closestP = [player, player2].filter(p => p && !p.dead).sort((a,b) => Math.abs(a.x - e.x) - Math.abs(b.x - e.x))[0];
            if (closestP && Math.abs(closestP.x - e.x) < TILE * 10) {
              const dir = closestP.x < e.x ? -1 : 1;
              const dx = closestP.x - e.x;
              const dy = closestP.y - e.y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 1;
              enemies.push({

            }
          }
        }
      } else if (phase < riseTime + exposeTime + sinkTime) {

        e.pipeState = 'sinking';
        const progress = (phase - riseTime - exposeTime) / sinkTime;
        e.y = e.basePipeY - e.h * (1 - progress);
      } else {
        // Hidden
        e.pipeState = 'hidden';
        e.y = e.basePipeY;
      }

      // Don't patrol - stay in place
      e.vx = 0;
    }

    if (e.isProjectile) {
      e.vy = (e.vy || 0) + 0.15;
      e.y += e.vy;
      if (e.y > level.height * TILE) e.alive = false;

    // Check collision with both players
    for (const pl of [player, player2]) {

        if (pl.mentoring && !pl.headbutting) {

        } else if (pl.mentoring && pl.headbutting) {

          pl.invincible = true; pl.invTimer = 90;

        } else if (sacrificePet(pl)) {
          // pet absorbed the hit
        } else {
          if (pl === player) playerDie('Eaten by a predatory journal! Only fire can destroy them!');
          else { p2Die('P2: Eaten by a predatory journal! Only fire can destroy them!'); }
        }
        continue;
      }
      if (pl.vy > 0 && pl.y + pl.h - 8 < e.y + e.h / 2 && !e.isProjectile) {
        pl.vy = -8;
        SFX.stomp();
        if (e.hp !== undefined) {
          // HP-based enemy (dean, rival)

          if (e.hp <= 0) {
            e.alive = false;
            plSt2.score += e.type === 'dean' ? 5000 : 500;

            if (e.type === 'dean') {
              spawnFloatingText(e.x, e.y, 'TENURE GRANTED!', '#ffd54f');

              gameState = 'levelComplete'; winTimer = 180;
              if (flagObj) flagObj.reached = true;
              SFX.bossDefeat();
            } else {
              spawnFloatingText(e.x, e.y, 'Rival defeated!', '#ff9800');
              showMessage('Rival researcher out-published!');
              SFX.enemyDefeat();
            }
          } else {
            if (e.type === 'dean') {
              const prevPhase = e.phase;
              e.phase = (e.hp / e.maxHp) > 0.66 ? 1 : (e.hp / e.maxHp) > 0.33 ? 2 : 3;
              if (e.phase !== prevPhase) e.phaseTimer = 60;
              showMessage(`Dean HP: ${e.hp}/${e.maxHp} - Keep going!`);

              showMessage(`Rival HP: ${e.hp}/${e.maxHp}`);

            'reviewer2': 'Reviewer 2 defeated! Major revisions avoided!',
            'bureaucrat': 'Bureaucrat squashed! Form denied!',
            'imposter': 'Imposter syndrome banished!',
            'teaching': 'Teaching load lightened!',
            'committee': 'Committee meeting cancelled!',

          };

      } else {

          gs.panicked = true;
          gs.panicTimer = 180;
          gs.vx = (gs.x < e.x ? -4 : 4); // run away from enemy
          gs.vy = -5; // small panic jump
          spawnParticles(gs.x + gs.w / 2, gs.y + gs.h / 2, '#ffeb3b', 10);
          spawnFloatingText(gs.x, gs.y - 10, 'AAAH!', '#ef5350');
          showMessage('Grad student escaped in panic!');
        } else if (pl.mentoring && pl.headbutting) {
          // Headbutting — player is protected, enemy takes damage instead
          continue;
        } else if (pl.powered) {
          pl.powered = false;
          pl.invincible = true;
          pl.invTimer = 90;
          showMessage('Lost your coffee buzz!');
          SFX.lostCoffee();
        } else if (sacrificePet(pl)) {
          // A pet absorbed the hit — player is safe
        } else {
          if (pl === player) playerDie(getDeathMessage(e.type));
          else { p2Die('P2: ' + getDeathMessage(e.type)); }
        }
      }
    }
  }

  enemies = enemies.filter(e => e.alive || !e.isProjectile);

  // Mentor's Wrath magic animation update
  if (magicActive) {
    magicTimer++;
    // Screen shake intensity scales with magic level
    const shakeIntensity = magicLevel * 2 * Math.max(0, 1 - magicTimer / magicDuration);
    screenShake.x = (Math.random() - 0.5) * shakeIntensity;
    screenShake.y = (Math.random() - 0.5) * shakeIntensity;
    // Grow fire columns
    for (const col of magicColumns) {
      if (magicTimer > col.delay) {
        const growProgress = Math.min(1, (magicTimer - col.delay) / 20);
        col.height = col.maxHeight * growProgress;
      }
    }
    // Deal damage at the peak moment (40% through animation)
    const damageMoment = Math.floor(magicDuration * 0.4);
    if (magicTimer >= damageMoment && !magicDamageDealt) {
      magicDamageDealt = true;
      const magicSt = twoPlayerMode && magicCasterPlayer ? statsFor(magicCasterPlayer) : stats;
      const dmg = magicLevel * 2; // 2, 4, 6, 8 damage
      for (const e of enemies) {
        if (!e.alive) continue;
        const esx = e.x - camera.x;
        if (esx > -80 && esx < GAME_W + 80) {
          if (e.hp !== undefined) {
            e.hp -= dmg;
            spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff5722', 12 + magicLevel * 3);
            spawnFloatingText(e.x, e.y, `-${dmg} HP`, '#ff5722');
            if (e.hp <= 0) {
              e.alive = false;
              const pts = e.type === 'dean' ? 5000 : 500;
              magicSt.score += pts;
              spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ffd54f', 25);
              spawnFloatingText(e.x, e.y - 10, `+${pts}`, '#ffd54f');
              if (e.type === 'dean') {
                spawnFloatingText(e.x, e.y, 'TENURE GRANTED!', '#ffd54f');
                showMessage('The Dean has been vanquished!');
                gameState = 'levelComplete'; winTimer = 180;
                if (flagObj) flagObj.reached = true;
              } else {
                SFX.enemyDefeat();
              }
            }
          } else {
            e.alive = false;
            magicSt.score += 200;
            spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff5722', 15);
            spawnFloatingText(e.x, e.y, '+200 BURNED!', '#ff5722');
            SFX.enemyDefeat();
          }
        }
      }
    }
    // Spawn fire particles throughout the animation
    if (magicTimer % 3 === 0) {
      for (const col of magicColumns) {
        if (magicTimer > col.delay && col.height > 10) {
          const wx = col.screenX + camera.x;
          const wy = GAME_H - col.height + camera.y + Math.random() * col.height * 0.5;
          spawnParticles(wx, wy, Math.random() < 0.5 ? '#ff5722' : '#ffd54f', 2);
        }
      }
    }
    if (magicTimer >= magicDuration) {
      magicActive = false;
      screenShake.x = 0;
      screenShake.y = 0;
    }
  }

  // Fireballs
  for (const fb of fireballs) {
    fb.x += fb.vx;
    fb.vy += fb.isPencil ? 0.08 : 0.25;
    fb.y += fb.vy;
    fb.life--;

    const fbTileX = Math.floor((fb.x + fb.w / 2) / TILE);
    const fbTileY = Math.floor((fb.y + fb.h) / TILE);
    if (isSolid(fbTileX, fbTileY) || isPlatform(fbTileX, fbTileY)) {
      if (fb.isPencil) {
        fb.life = 0; // pencils stick into walls
        spawnParticles(fb.x, fb.y, '#ffd54f', 4);
      } else {
        fb.vy = -5; fb.bounces++;
        if (fb.bounces > 3) fb.life = 0;
      }
    }
    if (isSolid(Math.floor(fb.x / TILE), Math.floor((fb.y + fb.h / 2) / TILE)) ||
        isSolid(Math.floor((fb.x + fb.w) / TILE), Math.floor((fb.y + fb.h / 2) / TILE))) {
      fb.life = 0;
      spawnParticles(fb.x, fb.y, '#ff5722', 6);
    }

    const fbSt = twoPlayerMode && fb.owner ? statsFor(fb.owner) : stats;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (rectCollide(fb, e)) {
        fb.life = 0;
        spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ff5722', 12);
        SFX.hit();
        if (e.hp !== undefined) {
          e.hp--;
          spawnFloatingText(e.x, e.y, `HP: ${e.hp}/${e.maxHp}`, '#ef5350');
          if (e.hp <= 0) {
            e.alive = false;
            fbSt.score += e.type === 'dean' ? 5000 : 500;
            spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#ffd54f', 30);
            if (e.type === 'dean') {
              spawnFloatingText(e.x, e.y, 'TENURE GRANTED!', '#ffd54f');
              showMessage('You defeated the Dean! Tenure is yours!');
              gameState = 'levelComplete'; winTimer = 180;
              if (flagObj) flagObj.reached = true;
              SFX.bossDefeat();
            } else {
              spawnFloatingText(e.x, e.y, 'Rival down!', '#ff9800');
              SFX.enemyDefeat();
            }
          }
        } else {
          e.alive = false;
          fbSt.score += 200;
          spawnFloatingText(e.x, e.y, '+200', '#ff5722');
          SFX.enemyDefeat();
        }
      }
    }

    if (fb.y > level.height * TILE) fb.life = 0;
  }
  fireballs = fireballs.filter(fb => fb.life > 0);

  // Flag — either player can reach it
  if (flagObj && !flagObj.reached) {
    for (const pl of [player, player2]) {
      if (!pl || pl.dead) continue;
      if (rectCollide(pl, flagObj)) {
        flagObj.reached = true;
        (twoPlayerMode ? statsFor(pl) : stats).score += 1000;
        spawnParticles(flagObj.x + 16, flagObj.y + 16, '#ffd54f', 30);
        SFX.levelComplete();
        if (trainingMode) {
          trainingCompleted = true;
          showMessage('Training complete! Press ESC to return to menu.');
        } else if (currentLevel === 2) {
          gameState = 'jobMarketCheck';
          checkJobMarket();
        } else {
          gameState = 'levelComplete'; winTimer = 180;
          const completeMsgs = [
            'Qualifying exam passed! On to the postdoc!',
            'Postdoc complete! Time for the job market!',
            '',
            'Third-year review passed! Keep going!',
            'Survived committee hell! Almost there!',
            'TENURE GRANTED! YOU WIN!'
          ];
          showMessage(completeMsgs[currentLevel]);
        }
        break;
      }
    }
  }

  // Signs proximity (both players)
  for (const s of signs) {
    let minDist = Math.abs(player.x - s.x) + Math.abs(player.y - s.y);
    if (player2 && !player2.dead) {
      minDist = Math.min(minDist, Math.abs(player2.x - s.x) + Math.abs(player2.y - s.y));
    }
    s.showText = minDist < TILE * 2.5;
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  // Floating texts
  for (const ft of floatingTexts) {
    ft.y += ft.vy;
    ft.life--;
    ft.scale = Math.max(1, ft.scale - 0.02);
  }
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);

  for (const key in justPressed) delete justPressed[key];
}

// Try to sacrifice a pet to absorb a hit. Returns true if a pet was sacrificed.
function sacrificePet(pl) {
  const ownedPets = pets.filter(p => p.collected && p.owner === pl);
  if (ownedPets.length === 0) return false;
  // Release the last pet in the chain
  const pet = ownedPets[ownedPets.length - 1];
  pet.collected = false;
  pet.owner = null;
  pet.trail = [];
  pet.scared = true;
  pet.scaredTimer = 180; // 3 seconds then disappears
  // Make the pet run away in panic
  pet.vx = (Math.random() < 0.5 ? -4 : 4);
  pet.vy = -5;
  pet.onGround = false;
  const petName = pet.kind === 'dog' ? 'Dog' : 'Cat';
  spawnParticles(pet.x + pet.w / 2, pet.y + pet.h / 2, pet.kind === 'dog' ? '#c8a26a' : '#9e9e9e', 12);
  spawnFloatingText(pet.x, pet.y - 10, petName + ' scared off!', '#ff80ab');
  showMessage('Your emotional support ' + petName.toLowerCase() + ' ran away in fright!');
  SFX.hit();
  // Give the player invincibility frames
  pl.invincible = true;
  pl.invTimer = 90;
  pl.vy = -6;
  return true;
}

function playerDie(msg) {
  if (trainingMode) {
    // In training mode, just respawn immediately
    showMessage('Oops! Try again! (No penalty in training)');
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ef5350', 10);
    SFX.die();
    player.x = 2 * TILE;
    player.y = (level.height - 4) * TILE;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    player.invincible = true;
    player.invTimer = 60;
    player.powered = false;
    player.mentoring = null;
    player.headbutting = false;
    return;
  }
  player.dead = true;
  const st = twoPlayerMode ? p1Stats : stats;
  st.lives--;
  showMessage(msg || 'Career over!');
  spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ef5350', 20);
  SFX.die();
  if (twoPlayerMode) {
    // In two-player mode, death is final
    if (player2 && !player2.dead) {
      showMessage('P1 is out! P2 continues alone.');
    } else {
      // Both players dead — game over
      gameState = 'dead';
      deathTimer = 120;
      submitScore();
      fetchLeaderboard();
    }
  } else {
    gameState = 'dead';
    deathTimer = 120;
    if (st.lives <= 0) {
      submitScore();
      fetchLeaderboard();
    }
  }
}

function p2Die(msg) {
  player2.dead = true;
  p2Stats.lives--;
  showMessage(msg);
  spawnParticles(player2.x + player2.w / 2, player2.y + player2.h / 2, '#ef5350', 20);
  SFX.die();
  if (!player.dead) {
    // P2 is out, P1 continues alone
    showMessage('P2 is out! P1 continues alone.');
  } else {
    // Both players dead — game over
    gameState = 'dead';
    deathTimer = 120;
    submitScore();
    fetchLeaderboard();
  }
}

function getDeathMessage(enemyType) {
  const msgs = {
    'reviewer2': 'Reviewer 2 says: "Reject with prejudice"',
    'bureaucrat': 'Buried under paperwork! Career paused.',
    'imposter': 'Imposter syndrome wins... you never belonged.',
    'teaching': 'Teaching overload! No time for research!',
    'committee': 'Endless meetings consumed your soul!',
    'dean': 'The Dean denied your tenure case!',
    'rejection': 'Hit by a rejection letter!',
    'rival': 'Scooped by a rival researcher!',
    'predatory_journal': 'Eaten by a predatory journal! Your h-index plummets!',
    'spam_email': 'Hit by a spam call for papers!'
  };
  return msgs[enemyType] || 'Academic career interrupted!';
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);

  if (gameState === 'menu') { drawMenu(); return; }
  if (gameState === 'enterName') { drawNameInput(); return; }
  if (gameState === 'gameWin') { drawWinScreen(); return; }
  if (gameState === 'showLeaderboard') {
    drawLeaderboardOverlay();
    if (keys['Space'] || keys['Escape']) { gameState = 'menu'; keys['Space'] = false; keys['Escape'] = false; }
    return;
  }

  const ci = currentLevel;

  // Screen shake
  ctx.save();
  if (magicActive) {
    ctx.translate(screenShake.x, screenShake.y);
  }

  // Background
  drawBackground(ci);

  // Ambient light layer (subtle atmospheric depth)
  const ambientGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  ambientGrad.addColorStop(0, 'rgba(255,255,255,0.02)');
  ambientGrad.addColorStop(0.4, 'rgba(255,255,255,0)');
  ambientGrad.addColorStop(0.8, 'rgba(0,0,0,0.03)');
  ambientGrad.addColorStop(1, 'rgba(0,0,0,0.08)');
  ctx.fillStyle = ambientGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Floating petals & sparkles (behind tiles)
  updateAndDrawPetals();

  // Tiles
  drawTiles();

  // Signs
  drawSigns();

  // Collectibles
  for (const c of collectibles) {
    if (c.collected) continue;
    const sx = c.x - camera.x;
    const sy = c.y - camera.y + Math.sin(c.bobOffset) * 4;
    drawCollectible(c.type, sx, sy, c.w, c.h);
  }

  // Grad students
  for (const gs of gradStudents) {
    drawGradStudent(gs, gs.x - camera.x, gs.y - camera.y);
  }

  // Emotional support pets
  for (const pet of pets) {
    drawPet(pet, pet.x - camera.x, pet.y - camera.y);
  }

  // Enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    drawEnemy(e, e.x - camera.x, e.y - camera.y);
  }

  // Fireballs and pencils (enhanced with trails and glow)
  for (const fb of fireballs) {
    const fbsx = fb.x - camera.x;
    const fbsy = fb.y - camera.y;

    if (fb.isPencil) {
      // Draw pencil projectile
      ctx.save();
      ctx.translate(fbsx + fb.w / 2, fbsy + fb.h / 2);
      ctx.rotate(Math.atan2(fb.vy, fb.vx));
      // Pencil body (yellow)
      ctx.fillStyle = '#ffd54f';
      ctx.fillRect(-6, -2, 12, 4);
      // Pencil tip (dark)
      ctx.fillStyle = '#5d4037';
      ctx.beginPath();
      ctx.moveTo(6, -2); ctx.lineTo(9, 0); ctx.lineTo(6, 2);
      ctx.fill();
      // Eraser (pink)
      ctx.fillStyle = '#f48fb1';
      ctx.fillRect(-8, -2, 2, 4);
      // Metal band
      ctx.fillStyle = '#bdbdbd';
      ctx.fillRect(-6, -2, 1.5, 4);
      ctx.restore();
      // Small trail
      const dir = fb.vx > 0 ? -1 : 1;
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = '#ffd54f';
      drawCircle(fbsx + fb.w / 2 + dir * 8, fbsy + fb.h / 2, 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else {
      // Original fireball rendering
      const rot = levelTimer * 0.3;

      // Outer glow halo
      const haloGrad = ctx.createRadialGradient(fbsx + fb.w / 2, fbsy + fb.h / 2, 2, fbsx + fb.w / 2, fbsy + fb.h / 2, 18);
      haloGrad.addColorStop(0, 'rgba(255,152,0,0.3)');
      haloGrad.addColorStop(0.5, 'rgba(255,87,34,0.1)');
      haloGrad.addColorStop(1, 'rgba(255,87,34,0)');
      ctx.fillStyle = haloGrad;
      drawCircle(fbsx + fb.w / 2, fbsy + fb.h / 2, 18);
      ctx.fill();

      // Trail particles (behind)
      const dir = fb.vx > 0 ? -1 : 1;
      for (let ti = 0; ti < 4; ti++) {
        const trailAlpha = 0.4 - ti * 0.1;
        ctx.globalAlpha = trailAlpha;
        ctx.fillStyle = ti < 2 ? '#ff9800' : '#ff5722';
        drawCircle(fbsx + fb.w / 2 + dir * (ti * 4 + 3), fbsy + fb.h / 2 + Math.sin(levelTimer * 0.5 + ti) * 2, 3 - ti * 0.5);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.save();
      ctx.translate(fbsx + fb.w / 2, fbsy + fb.h / 2);
      ctx.rotate(rot);
      // Fireball glow
      ctx.shadowColor = '#ff5722';
      ctx.shadowBlur = 12;
      const fbGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 7);
      fbGrad.addColorStop(0, '#ffffff');
      fbGrad.addColorStop(0.2, '#fff9c4');
      fbGrad.addColorStop(0.5, '#ff9800');
      fbGrad.addColorStop(1, '#ff5722');
      ctx.fillStyle = fbGrad;
      drawCircle(0, 0, 7);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Inner bright core
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      drawCircle(0, 0, 2.5);
      ctx.fill();
      ctx.restore();
    }
  }

  // Player 1
  if (player && !player.dead) {
    const sx = player.x - camera.x;
    const sy = player.y - camera.y;
    if (player.invincible && Math.floor(player.invTimer / 3) % 2 === 0) {
      // blink
    } else {
      drawPlayer(sx, sy, player.w, player.h, player.frame, player.facingRight, player.powered, player.dead);
    }
    // P1 label in two-player mode
    if (twoPlayerMode) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('P1', sx + player.w / 2, sy - 12);
      ctx.textAlign = 'left';
    }
  }

  // Player 2
  if (player2 && !player2.dead) {
    const sx2 = player2.x - camera.x;
    const sy2 = player2.y - camera.y;
    if (player2.invincible && Math.floor(player2.invTimer / 3) % 2 === 0) {
      // blink
    } else {
      const savedApp = playerAppearance;
      playerAppearance = player2Appearance;
      drawPlayer(sx2, sy2, player2.w, player2.h, player2.frame, player2.facingRight, player2.powered, player2.dead);
      playerAppearance = savedApp;
    }
    ctx.fillStyle = '#42a5f5';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('P2', sx2 + player2.w / 2, sy2 - 12);
    ctx.textAlign = 'left';
  }

  // Flag
  drawFlag();

  // Particles (with glow and trails)
  for (const p of particles) {
    const alpha = p.life / (p.maxLife || 50);
    const px = p.x - camera.x;
    const py = p.y - camera.y;
    // Particle glow halo
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      drawCircle(px, py, p.size * 2);
      ctx.fill();
    } else {
      drawCircle(px, py, p.size * alpha * 2);
      ctx.fill();
    }
    // Particle core
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'star') {
      drawStar(px, py, 4, p.size, p.size * 0.4);
      ctx.fill();
      // White center
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      drawCircle(px, py, p.size * 0.3);
      ctx.fill();
    } else {
      drawCircle(px, py, p.size * alpha);
      ctx.fill();
      // Bright core
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      drawCircle(px, py, p.size * alpha * 0.4);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // Floating texts (with outline for readability)
  for (const ft of floatingTexts) {
    const alpha = ft.life / 60;
    ctx.globalAlpha = alpha;
    const fontSize = Math.round(12 * ft.scale);
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textAlign = 'center';
    const ftx = ft.x - camera.x + 12;
    const fty = ft.y - camera.y;
    // Text outline
    ctx.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    ctx.strokeText(ft.text, ftx, fty);
    // Text fill
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, ftx, fty);
    // Text glow
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 6;
    ctx.fillText(ft.text, ftx, fty);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;

  // Mentor's Wrath magic overlay
  if (magicActive) drawMentorsWrath();

  // Restore screen shake transform before HUD/overlays
  ctx.restore();

  // Cinematic vignette (stronger, more professional)
  const vigGrad = ctx.createRadialGradient(GAME_W / 2, GAME_H / 2, GAME_W * 0.3, GAME_W / 2, GAME_H / 2, GAME_W * 0.65);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vigGrad.addColorStop(0.7, 'rgba(0,0,0,0.05)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.22)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Subtle scanline effect (CRT/retro touch - lightweight)
  ctx.globalAlpha = 0.025;
  ctx.fillStyle = '#000';
  for (let sl = 0; sl < GAME_H; sl += 4) {
    ctx.fillRect(0, sl, GAME_W, 1);
  }
  ctx.globalAlpha = 1;

  // Chromatic aberration hint on edges (very subtle)
  ctx.globalAlpha = 0.02;
  ctx.globalCompositeOperation = 'screen';
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(0, 0, 3, GAME_H);
  ctx.fillStyle = '#0000ff';
  ctx.fillRect(GAME_W - 3, 0, 3, GAME_H);
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;

  // HUD
  drawHUD();

  // Training tasks overlay
  if (trainingMode && trainingTasks.length > 0) {
    drawTrainingTasks();
  }

  // Overlays
  if (gameState === 'paused') drawPauseScreen();
  if (gameState === 'levelIntro') drawLevelIntro();
  if (gameState === 'dead') drawDeathScreen();
  if (gameState === 'levelComplete') drawLevelComplete();
  if (gameState === 'jobMarketCheck') drawJobMarketResult();

  // Message popup (polished)
  if (currentMessage) {
    const alpha = messageTimer > 160 ? (180 - messageTimer) / 20 : messageTimer < 20 ? messageTimer / 20 : 1;
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 12px monospace';

    const tw = ctx.measureText(currentMessage).width + 50;
    const mx = GAME_W / 2 - tw / 2;
    const my = GAME_H - 78;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    drawRoundRect(mx + 2, my + 3, tw, 36, 12);
    ctx.fill();

    // Background gradient
    const msgGrad = ctx.createLinearGradient(mx, my, mx, my + 36);
    msgGrad.addColorStop(0, 'rgba(25,20,50,0.95)');
    msgGrad.addColorStop(1, 'rgba(15,12,35,0.95)');
    ctx.fillStyle = msgGrad;
    drawRoundRect(mx, my, tw, 36, 12);
    ctx.fill();

    // Top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    drawRoundRect(mx + 3, my + 1, tw - 6, 14, 10);
    ctx.fill();

    // Animated border glow
    const borderAlpha = 0.3 + Math.sin(levelTimer * 0.1) * 0.15;
    ctx.strokeStyle = `rgba(255,213,79,${borderAlpha})`;
    ctx.lineWidth = 1.5;
    drawRoundRect(mx, my, tw, 36, 12);
    ctx.stroke();

    // Corner accent dots
    ctx.fillStyle = `rgba(255,213,79,${borderAlpha * 0.7})`;
    drawCircle(mx + 8, my + 18, 2);
    ctx.fill();
    drawCircle(mx + tw - 8, my + 18, 2);
    ctx.fill();

    // Text with outline
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.textAlign = 'center';
    ctx.strokeText(currentMessage, GAME_W / 2, GAME_H - 55);
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(currentMessage, GAME_W / 2, GAME_H - 55);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}
