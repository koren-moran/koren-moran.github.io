// ============================================================
// MENTOR'S WRATH DRAWING (Golden Axe-style fire magic)
// ============================================================
function drawMentorsWrath() {
  const progress = magicTimer / magicDuration;
  const fadeIn = Math.min(1, magicTimer / 15);
  const fadeOut = magicTimer > magicDuration - 20 ? (magicDuration - magicTimer) / 20 : 1;
  const alpha = fadeIn * fadeOut;

  // Phase 1: Screen darkens + caster glows (first 20%)
  // Phase 2: Fire columns erupt from ground (20-60%)
  // Phase 3: Peak — screen flash + damage (40%)
  // Phase 4: Columns recede, embers drift (60-100%)

  // Dark overlay — dramatic dimming
  ctx.fillStyle = `rgba(20,0,0,${0.3 * alpha})`;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Bottom heat haze
  const hazeGrad = ctx.createLinearGradient(0, GAME_H * 0.5, 0, GAME_H);
  hazeGrad.addColorStop(0, 'rgba(255,87,34,0)');
  hazeGrad.addColorStop(0.5, `rgba(255,87,34,${0.08 * alpha * magicLevel})`);
  hazeGrad.addColorStop(1, `rgba(255,152,0,${0.15 * alpha * magicLevel})`);
  ctx.fillStyle = hazeGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Caster aura (player glow)
  const casterSX = magicCasterX - camera.x;
  const casterSY = magicCasterY - camera.y;
  if (progress < 0.5) {
    const auraSize = 30 + magicLevel * 15 + Math.sin(magicTimer * 0.3) * 10;
    const auraGrad = ctx.createRadialGradient(casterSX, casterSY + 16, 5, casterSX, casterSY + 16, auraSize);
    auraGrad.addColorStop(0, `rgba(255,152,0,${0.5 * alpha})`);
    auraGrad.addColorStop(0.4, `rgba(255,87,34,${0.3 * alpha})`);
    auraGrad.addColorStop(1, 'rgba(255,87,34,0)');
    ctx.fillStyle = auraGrad;
    drawCircle(casterSX, casterSY + 16, auraSize);
    ctx.fill();
  }

  // Fire columns erupting from the ground
  for (const col of magicColumns) {
    if (magicTimer <= col.delay) continue;
    const colAge = magicTimer - col.delay;
    const colFade = colAge > magicDuration * 0.6 ? Math.max(0, 1 - (colAge - magicDuration * 0.6) / (magicDuration * 0.3)) : 1;
    if (colFade <= 0) continue;

    const baseY = GAME_H;
    const h = col.height * colFade;
    const w = col.width;
    const cx = col.screenX;

    // Column glow (wide, soft)
    ctx.save();
    ctx.globalAlpha = 0.3 * colFade * alpha;
    const glowGrad = ctx.createRadialGradient(cx, baseY - h * 0.4, 5, cx, baseY - h * 0.3, w * 2);
    glowGrad.addColorStop(0, `rgba(255,200,50,0.6)`);
    glowGrad.addColorStop(0.5, `rgba(255,87,34,0.2)`);
    glowGrad.addColorStop(1, 'rgba(255,87,34,0)');
    ctx.fillStyle = glowGrad;
    drawCircle(cx, baseY - h * 0.3, w * 2);
    ctx.fill();
    ctx.restore();

    // Main fire column (gradient from white-hot base to orange tip)
    ctx.save();
    ctx.globalAlpha = colFade * alpha;

    const colGrad = ctx.createLinearGradient(cx, baseY, cx, baseY - h);
    colGrad.addColorStop(0, '#fff9c4');
    colGrad.addColorStop(0.1, '#ffeb3b');
    colGrad.addColorStop(0.3, '#ff9800');
    colGrad.addColorStop(0.6, '#ff5722');
    colGrad.addColorStop(0.85, '#d84315');
    colGrad.addColorStop(1, 'rgba(183,28,28,0)');
    ctx.fillStyle = colGrad;

    // Wavy fire shape
    ctx.beginPath();
    const waveT = magicTimer * 0.15 + col.screenX * 0.1;
    const halfW = w / 2;
    ctx.moveTo(cx - halfW, baseY);
    // Left edge going up with flickering
    for (let fy = 0; fy <= h; fy += 5) {
      const waveX = Math.sin(waveT + fy * 0.08) * (halfW * 0.3) + Math.sin(waveT * 1.7 + fy * 0.12) * (halfW * 0.15);
      const taper = 1 - (fy / h) * 0.7; // narrow toward top
      ctx.lineTo(cx - halfW * taper + waveX, baseY - fy);
    }
    // Top flicker tip
    const tipWave = Math.sin(waveT * 2.3) * (halfW * 0.4);
    ctx.lineTo(cx + tipWave, baseY - h - 5 - Math.random() * 8);
    // Right edge going down
    for (let fy = h; fy >= 0; fy -= 5) {
      const waveX = Math.sin(waveT + fy * 0.08 + 2) * (halfW * 0.25) + Math.sin(waveT * 1.3 + fy * 0.1) * (halfW * 0.15);
      const taper = 1 - (fy / h) * 0.7;
      ctx.lineTo(cx + halfW * taper + waveX, baseY - fy);
    }
    ctx.closePath();
    ctx.fill();

    // Inner bright core (white-hot center)
    const coreGrad = ctx.createLinearGradient(cx, baseY, cx, baseY - h * 0.7);
    coreGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
    coreGrad.addColorStop(0.3, 'rgba(255,255,200,0.3)');
    coreGrad.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    const coreW = halfW * 0.35;
    ctx.moveTo(cx - coreW, baseY);
    ctx.quadraticCurveTo(cx - coreW + Math.sin(waveT * 1.5) * 3, baseY - h * 0.35, cx, baseY - h * 0.65);
    ctx.quadraticCurveTo(cx + coreW + Math.sin(waveT * 1.8) * 3, baseY - h * 0.35, cx + coreW, baseY);
    ctx.closePath();
    ctx.fill();

    // Embers rising from each column
    if (magicLevel >= 2) {
      for (let ei = 0; ei < magicLevel; ei++) {
        const emberY = baseY - h * 0.3 - (colAge * 1.5 + ei * 20) % (h + 30);
        const emberX = cx + Math.sin(colAge * 0.1 + ei * 3) * halfW;
        if (emberY > baseY - h - 30 && emberY < baseY) {
          const eAlpha = Math.max(0, 1 - Math.abs(emberY - (baseY - h * 0.5)) / (h * 0.5));
          ctx.fillStyle = `rgba(255,200,50,${eAlpha * 0.8})`;
          drawCircle(emberX, emberY, 1.5 + Math.random());
          ctx.fill();
        }
      }
    }

    ctx.restore();
  }

  // Ground fire line (connects all columns at base)
  if (progress > 0.15 && progress < 0.85) {
    const lineAlpha = alpha * (progress < 0.3 ? (progress - 0.15) / 0.15 : progress > 0.7 ? (0.85 - progress) / 0.15 : 1);
    const lineGrad = ctx.createLinearGradient(0, GAME_H - 15, 0, GAME_H);
    lineGrad.addColorStop(0, `rgba(255,152,0,${lineAlpha * 0.6})`);
    lineGrad.addColorStop(0.5, `rgba(255,87,34,${lineAlpha * 0.8})`);
    lineGrad.addColorStop(1, `rgba(255,235,59,${lineAlpha})`);
    ctx.fillStyle = lineGrad;
    ctx.fillRect(0, GAME_H - 12 - magicLevel * 2, GAME_W, 12 + magicLevel * 2);
  }

  // Screen flash at damage moment
  if (Math.abs(magicTimer - magicDuration * 0.4) < 5) {
    const flashAlpha = (1 - Math.abs(magicTimer - magicDuration * 0.4) / 5) * 0.4 * magicLevel / 4;
    ctx.fillStyle = `rgba(255,255,200,${flashAlpha})`;
    ctx.fillRect(0, 0, GAME_W, GAME_H);
  }

  // Title text at start of magic
  if (progress < 0.35) {
    const textAlpha = progress < 0.05 ? progress / 0.05 : progress > 0.25 ? (0.35 - progress) / 0.1 : 1;
    ctx.save();
    ctx.globalAlpha = textAlpha;
    ctx.textAlign = 'center';

    // Title with glow and outline
    const titleSize = 18 + magicLevel * 4;
    ctx.font = `bold ${titleSize}px monospace`;

    // Shadow/glow behind text
    ctx.shadowColor = '#ff5722';
    ctx.shadowBlur = 20 + magicLevel * 5;

    // Text outline
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 3;
    ctx.lineJoin = 'round';
    const wrathNames = ["MENTOR'S WRATH", "MENTOR'S FURY", "MENTOR'S INFERNO", "MENTOR'S APOCALYPSE"];
    const title = wrathNames[magicLevel - 1];
    ctx.strokeText(title, GAME_W / 2, GAME_H * 0.3);
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(title, GAME_W / 2, GAME_H * 0.3);

    // Subtitle
    ctx.shadowBlur = 0;
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = '#ff9800';
    const subtitles = [
      '"Your methods section is inadequate"',
      '"This lacks theoretical contribution"',
      '"Reject: insufficient novelty"',
      '"REVISE AND RESUBMIT... TO OBLIVION"'
    ];
    ctx.fillText(subtitles[magicLevel - 1], GAME_W / 2, GAME_H * 0.3 + titleSize + 5);

    ctx.textAlign = 'left';
    ctx.restore();
  }

  // Level 3-4: floating burning papers (rejection letters raining down)
  if (magicLevel >= 3 && progress > 0.2 && progress < 0.8) {
    const paperAlpha = alpha * 0.7;
    ctx.save();
    ctx.globalAlpha = paperAlpha;
    for (let pi = 0; pi < magicLevel * 3; pi++) {
      const paperX = (Math.sin(magicTimer * 0.05 + pi * 2.7) * 0.5 + 0.5) * GAME_W;
      const paperY = ((magicTimer * 1.5 + pi * 80) % (GAME_H + 40)) - 20;
      const paperRot = magicTimer * 0.03 + pi * 1.1;
      ctx.save();
      ctx.translate(paperX, paperY);
      ctx.rotate(paperRot);
      // Burning paper
      ctx.fillStyle = '#fff';
      drawRoundRect(-6, -4, 12, 8, 1);
      ctx.fill();
      ctx.fillStyle = '#d84315';
      ctx.font = 'bold 5px monospace';
      ctx.fillText('REJ', -5, 2);
      // Fire edge
      ctx.fillStyle = 'rgba(255,152,0,0.7)';
      ctx.beginPath();
      ctx.moveTo(4, -4);
      ctx.lineTo(6, -6 + Math.sin(magicTimer * 0.3 + pi) * 2);
      ctx.lineTo(8, -3);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // Level 4: anime-style radial burst lines
  if (magicLevel >= 4 && progress > 0.35 && progress < 0.5) {
    const burstAlpha = (1 - Math.abs(progress - 0.425) / 0.075) * 0.15;
    ctx.save();
    ctx.globalAlpha = burstAlpha;
    ctx.strokeStyle = '#ffd54f';
    ctx.lineWidth = 2;
    for (let ri = 0; ri < 24; ri++) {
      const angle = ri * Math.PI / 12 + magicTimer * 0.02;
      ctx.beginPath();
      ctx.moveTo(GAME_W / 2 + Math.cos(angle) * 50, GAME_H / 2 + Math.sin(angle) * 30);
      ctx.lineTo(GAME_W / 2 + Math.cos(angle) * 500, GAME_H / 2 + Math.sin(angle) * 300);
      ctx.stroke();
    }
    ctx.restore();
  }
}

async function fetchLeaderboard() {
  try {
    const res = await fetch(LEADERBOARD_URL);
    leaderboardData = await res.json();
  } catch (e) {
    leaderboardData = [];
  }
}

async function fetchRank(score) {
  try {
    const res = await fetch(`${LEADERBOARD_URL}/rank?score=${score}`);
    const data = await res.json();
    return data.rank;
  } catch (e) {
    return 1; // if server is down, let them pass
  }
}

async function submitScore() {
  try {
    const st = twoPlayerMode ? combinedStats() : stats;
    const res = await fetch(LEADERBOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: playerName || 'Anonymous',
        score: st.score,
        publications: st.publications,
        grants: st.grants,
        citations: st.citations,
        hIndex: st.hIndex,
      }),
    });
    const data = await res.json();
    leaderboardRank = data.rank;
  } catch (e) {
    leaderboardRank = null;
  }
}

async function checkJobMarket() {
  const t = JOB_MARKET_THRESHOLDS;
  const st = twoPlayerMode ? combinedStats() : stats;
  const failReasons = [];

  if (st.publications < t.publications) failReasons.push(`Pubs: ${st.publications}/${t.publications}`);
  if (st.grants < t.grants) failReasons.push(`Grants: ${st.grants}/${t.grants}`);
  if (st.citations < t.citations) failReasons.push(`Cites: ${st.citations}/${t.citations}`);
  if (st.hIndex < t.hIndex) failReasons.push(`h-index: ${st.hIndex}/${t.hIndex}`);
  if (st.mentored < t.mentored) failReasons.push(`Students: ${st.mentored}/${t.mentored}`);

  // Check leaderboard rank
  const rank = await fetchRank(st.score);
  leaderboardRank = rank;
  if (rank > t.leaderboardRank) failReasons.push(`Rank: #${rank} (need top ${t.leaderboardRank})`);

  if (failReasons.length === 0) {
    jobMarketPassed = true;
    jobMarketFailReason = '';
  } else {
    jobMarketPassed = false;
    jobMarketFailReason = failReasons.join('  |  ');
  }
  // Submit score regardless
  await submitScore();
  await fetchLeaderboard();

  winTimer = 300;
}

// Name input handling
let nameChars = [];
function handleNameInput(e) {
  if (!nameInputActive) return;
  if (e.key === 'Enter' && nameChars.length > 0) {
    playerName = nameChars.join('');
    nameInputActive = false;
    window.removeEventListener('keydown', handleNameInput);
    startGameAfterName();
    return;
  }
  if (e.key === 'Backspace') {
    nameChars.pop();
    return;
  }
  if (e.key.length === 1 && nameChars.length < 15) {
    nameChars.push(e.key);
  }
}

    ctx.fillText(`Back to Postdoc #${postdocCount + 1}...`, GAME_W / 2, 310);

    ctx.fillStyle = '#78909c';
    ctx.font = '10px monospace';
    ctx.fillText('Collect more pubs, grants, and citations!', GAME_W / 2, 340);
  }

  ctx.textAlign = 'left';
}

function drawLeaderboardOverlay() {
  ctx.fillStyle = 'rgba(15,10,26,0.95)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('LEADERBOARD', GAME_W / 2, 40);

  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#78909c';
    ctx.font = '12px monospace';
    ctx.fillText('No scores yet. Be the first!', GAME_W / 2, GAME_H / 2);
  } else {
    // Header
    ctx.fillStyle = '#b0bec5';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('#', 100, 70);
    ctx.fillText('NAME', 130, 70);
    ctx.fillText('SCORE', 320, 70);
    ctx.fillText('PUBS', 410, 70);
    ctx.fillText('GRANTS', 470, 70);
    ctx.fillText('h-idx', 540, 70);
    ctx.fillText('CITES', 600, 70);

    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(90, 75);
    ctx.lineTo(670, 75);
    ctx.stroke();

    const maxShow = Math.min(leaderboardData.length, 15);
    for (let i = 0; i < maxShow; i++) {
      const e = leaderboardData[i];
      const y = 92 + i * 22;
      const isMe = e.name === playerName && i === (leaderboardRank ? leaderboardRank - 1 : -1);

      if (isMe) {
        ctx.fillStyle = 'rgba(255,213,79,0.15)';
        ctx.fillRect(85, y - 12, 590, 20);
      }

      ctx.fillStyle = i < 3 ? '#ffd54f' : '#b0bec5';
      ctx.font = i < 3 ? 'bold 10px monospace' : '10px monospace';
      ctx.fillText(`${e.rank || i + 1}`, 100, y);
      ctx.fillStyle = isMe ? '#ffd54f' : '#fff';
      ctx.fillText(e.name, 130, y);
      ctx.fillStyle = '#ffa726';
      ctx.fillText(`${e.score}`, 320, y);
      ctx.fillStyle = '#fff';
      ctx.fillText(`${e.publications}`, 410, y);
      ctx.fillStyle = '#66bb6a';
      ctx.fillText(`${e.grants}`, 470, y);
      ctx.fillStyle = '#ffd54f';
      ctx.fillText(`${e.hIndex}`, 540, y);
      ctx.fillStyle = '#4fc3f7';
      ctx.fillText(`${e.citations}`, 600, y);
    }
  }

  ctx.textAlign = 'center';
  const blink = Math.sin(Date.now() * 0.005) > 0;
  if (blink) {
    ctx.fillStyle = '#78909c';
    ctx.font = '11px monospace';
    ctx.fillText(isTouchDevice ? 'Tap BACK to return' : 'Press SPACE to continue', GAME_W / 2, GAME_H - 30);
  }
  ctx.textAlign = 'left';
}

// Draw a compact leaderboard table at a given position
function drawMiniLeaderboard(startX, startY, maxRows) {
  const lbW = 360;
  // Panel background
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  drawRoundRect(startX - 10, startY - 18, lbW + 20, maxRows * 16 + 34, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,213,79,0.2)';
  ctx.lineWidth = 1;
  drawRoundRect(startX - 10, startY - 18, lbW + 20, maxRows * 16 + 34, 6);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEADERBOARD', startX + lbW / 2, startY - 4);
  ctx.textAlign = 'left';

  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#78909c';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No scores yet', startX + lbW / 2, startY + 20);
    ctx.textAlign = 'left';
    return;
  }

  // Header
  ctx.fillStyle = '#78909c';
  ctx.font = '8px monospace';
  ctx.fillText('#', startX, startY + 12);
  ctx.fillText('NAME', startX + 20, startY + 12);
  ctx.fillText('SCORE', startX + 150, startY + 12);
  ctx.fillText('PUBS', startX + 210, startY + 12);
  ctx.fillText('h', startX + 255, startY + 12);
  ctx.fillText('GRANTS', startX + 280, startY + 12);

  const rows = Math.min(leaderboardData.length, maxRows);
  for (let i = 0; i < rows; i++) {
    const e = leaderboardData[i];
    const rowY = startY + 26 + i * 16;
    const isMe = playerName && e.name === playerName;

    if (isMe) {
      ctx.fillStyle = 'rgba(255,213,79,0.1)';
      ctx.fillRect(startX - 5, rowY - 10, lbW + 10, 15);
    }

    ctx.font = i < 3 ? 'bold 9px monospace' : '9px monospace';
    ctx.fillStyle = i < 3 ? '#ffd54f' : '#b0bec5';
    ctx.fillText(`${e.rank || i + 1}`, startX, rowY);
    ctx.fillStyle = isMe ? '#ffd54f' : '#fff';
    ctx.fillText(e.name.slice(0, 12), startX + 20, rowY);
    ctx.fillStyle = '#ffa726';
    ctx.fillText(`${e.score}`, startX + 150, rowY);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${e.publications}`, startX + 210, rowY);
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(`${e.hIndex}`, startX + 255, rowY);
    ctx.fillStyle = '#66bb6a';
    ctx.fillText(`${e.grants}`, startX + 280, rowY);
  }
}

function startGame() {
  p1Stats = newStats();
  p2Stats = newStats();
  stats = p1Stats;
  postdocCount = 0;
  jobMarketPassed = null;
  swappedControls = false;
  // playerAppearance is already set by customization or random default

  // Start name input
  gameState = 'enterName';
  nameInputActive = true;
  nameChars = playerName ? playerName.split('') : [];
  window.addEventListener('keydown', handleNameInput);

  // On mobile, focus hidden input to bring up soft keyboard
  if (isTouchDevice) {
    const mobileInput = document.getElementById('mobileNameInput');
    mobileInput.value = nameChars.join('');
    mobileInput.focus();
    mobileInput.oninput = () => {
      nameChars = mobileInput.value.slice(0, 15).split('');
    };
    mobileInput.onkeydown = (e) => {
      if (e.key === 'Enter' && nameChars.length > 0) {
        playerName = nameChars.join('');
        nameInputActive = false;
        mobileInput.blur();
        mobileInput.oninput = null;
        mobileInput.onkeydown = null;
        window.removeEventListener('keydown', handleNameInput);
        startGameAfterName();
      }
    };
  }
}

function startGameAfterName() {
  fetchLeaderboard();
  initLevel(0);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  update();
  draw();
  drawTouchControls();
  updateMusic();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
