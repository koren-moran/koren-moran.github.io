      ctx.shadowBlur = 0;

      // Robe contour
      ctx.fillStyle = '#0e000a';
      drawRoundRect(x + 3, dy + 18, e.w - 6, e.h - 19, 9);
      ctx.fill();
      // Robe with rich radial gradient
      const robeGrad = ctx.createRadialGradient(x + e.w / 2, dy + 28, 4, x + e.w / 2, dy + 38, 30);
      robeGrad.addColorStop(0, '#c2185b');
      robeGrad.addColorStop(0.4, '#ad1457');
      robeGrad.addColorStop(0.7, '#880e4f');
      robeGrad.addColorStop(1, '#3c0020');
      ctx.fillStyle = robeGrad;
      drawRoundRect(x + 4, dy + 19, e.w - 8, e.h - 21, 8);
      ctx.fill();
      // Robe rim light
      ctx.fillStyle = 'rgba(255,255,255,0.06)';
      drawRoundRect(x + 6, dy + 20, e.w - 12, 6, 5);
      ctx.fill();

      // Gold trim with glow
      ctx.shadowColor = '#ffd54f';
      ctx.shadowBlur = 5;
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 1.8;
      drawRoundRect(x + 4, dy + 19, e.w - 8, e.h - 21, 8);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Gold epaulettes with gradient
      for (const epX of [x + 8, x + e.w - 8]) {
        const epGrad = ctx.createRadialGradient(epX, dy + 21, 0, epX, dy + 21, 4.5);
        epGrad.addColorStop(0, '#fff9c4');
        epGrad.addColorStop(0.4, '#ffd54f');
        epGrad.addColorStop(1, '#c17900');
        ctx.fillStyle = epGrad;
        drawCircle(epX, dy + 21, 4.5);
        ctx.fill();
        // Epaulette contour
        ctx.strokeStyle = '#a06800';
        ctx.lineWidth = 0.8;
        drawCircle(epX, dy + 21, 4.5);
        ctx.stroke();
      }

      // Gold chain across chest
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + 8, dy + 25);
      ctx.quadraticCurveTo(x + e.w / 2, dy + 30, x + e.w - 8, dy + 25);
      ctx.stroke();
      // Chain pendant
      ctx.fillStyle = '#ffd54f';
      drawCircle(x + e.w / 2, dy + 29, 2.5);
      ctx.fill();
      ctx.fillStyle = '#c17900';
      drawCircle(x + e.w / 2, dy + 29, 1.5);
      ctx.fill();

      // Side hair (distinguished silver/gray)
      ctx.fillStyle = da.hair;
      drawRoundRect(x + 8, dy + 6, 6, 16, 3); ctx.fill();
      drawRoundRect(x + e.w - 14, dy + 6, 6, 16, 3); ctx.fill();
      drawRoundRect(x + 10, dy - 3, e.w - 20, 7, 5); ctx.fill();

      // Head contour
      ctx.fillStyle = darkenColor(da.skin.shadow, 60);
      drawRoundRect(x + 9, dy, e.w - 18, 24, 12);
      ctx.fill();
      // Head with rich radial gradient
      const headGrad2 = ctx.createRadialGradient(x + e.w / 2, dy + 8, 2, x + e.w / 2, dy + 12, 14);
      headGrad2.addColorStop(0, lightenColor(da.skin.base, 10));
      headGrad2.addColorStop(0.6, da.skin.base);
      headGrad2.addColorStop(1, da.skin.shadow);
      ctx.fillStyle = headGrad2;
      drawRoundRect(x + 10, dy + 1, e.w - 20, 22, 11);
      ctx.fill();

      // Anime eyes (large, piercing, with gradient iris)
      for (const dex of [x + e.w / 2 - 6, x + e.w / 2 + 5]) {
        // Sclera
        ctx.fillStyle = '#fff';
        drawEllipse(dex, dy + 10, 5.5, 5);
        ctx.fill();
        // Gradient iris (deep purple to crimson based on phase)
        const diGrad = ctx.createRadialGradient(dex, dy + 10.5, 0.5, dex, dy + 10.5, 3.5);
        if (e.phase >= 3) {
          diGrad.addColorStop(0, '#ff5252');
          diGrad.addColorStop(0.6, '#c62828');
          diGrad.addColorStop(1, '#7f0000');
        } else if (e.phase >= 2) {
          diGrad.addColorStop(0, '#ff7043');
          diGrad.addColorStop(0.6, '#bf360c');
          diGrad.addColorStop(1, '#7f0000');
        } else {
          diGrad.addColorStop(0, '#ce93d8');
          diGrad.addColorStop(0.6, '#6a1b9a');
          diGrad.addColorStop(1, '#1a0533');
        }
        ctx.fillStyle = diGrad;
        drawCircle(dex, dy + 10.5, 3.2);
        ctx.fill();
        // Pupil
        ctx.fillStyle = '#0a0010';
        drawCircle(dex + 0.3, dy + 10.8, 1.5);
        ctx.fill();
        // Large highlight top-left
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        drawCircle(dex - 1.5, dy + 9, 1.4);
        ctx.fill();
        // Small highlight bottom-right
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        drawCircle(dex + 1.5, dy + 12, 0.7);
        ctx.fill();
      }

      // Sharp manga eyebrows
      ctx.strokeStyle = '#1a0533';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(x + e.w / 2 - 12, dy + 3); ctx.lineTo(x + e.w / 2 - 3, dy + 6); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x + e.w / 2 + 14, dy + 3); ctx.lineTo(x + e.w / 2 + 2, dy + 6); ctx.stroke();
      ctx.lineCap = 'butt';

      // Monocle (refined with contour and glint)
      ctx.strokeStyle = '#c17900';
      ctx.lineWidth = 1.8;
      drawCircle(x + e.w / 2 + 5, dy + 10, 6);
      ctx.stroke();
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 1.2;
      drawCircle(x + e.w / 2 + 5, dy + 10, 5.5);
      ctx.stroke();
      // Monocle chain
      ctx.strokeStyle = '#ffd54f';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(x + e.w / 2 + 5, dy + 15.5);
      ctx.quadraticCurveTo(x + e.w / 2 + 8, dy + 20, x + e.w / 2 + 5, dy + 25);
      ctx.stroke();
      // Monocle glint
      ctx.fillStyle = 'rgba(255,255,220,0.45)';
      drawCircle(x + e.w / 2 + 3, dy + 8.5, 1.5);
      ctx.fill();

      // Stern frown
      ctx.strokeStyle = '#2a0020';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + e.w / 2 - 7, dy + 18);
      ctx.quadraticCurveTo(x + e.w / 2, dy + 15.5, x + e.w / 2 + 7, dy + 18);
      ctx.stroke();

      // Blush (subtle, even bosses get the anime treatment)
      ctx.fillStyle = 'rgba(200,100,120,0.15)';
      drawEllipse(x + e.w / 2 - 12, dy + 14, 3, 1.5); ctx.fill();
      drawEllipse(x + e.w / 2 + 10, dy + 14, 3, 1.5); ctx.fill();

      // HP bar with contour and gradient
      ctx.fillStyle = '#0a0010';
      drawRoundRect(x - 3, dy - 13, e.w + 6, 10, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      drawRoundRect(x - 2, dy - 12, e.w + 4, 8, 4);
      ctx.fill();
      const dHpFrac = e.hp / e.maxHp;
      const dHpGrad = ctx.createLinearGradient(x, 0, x + e.w * dHpFrac, 0);
      if (dHpFrac > 0.5) { dHpGrad.addColorStop(0, '#81c784'); dHpGrad.addColorStop(1, '#43a047'); }
      else if (dHpFrac > 0.15) { dHpGrad.addColorStop(0, '#ffcc80'); dHpGrad.addColorStop(1, '#fb8c00'); }
      else { dHpGrad.addColorStop(0, '#ff8a80'); dHpGrad.addColorStop(1, '#d32f2f'); }
      ctx.fillStyle = dHpGrad;
      drawRoundRect(x, dy - 10, e.w * dHpFrac, 4, 2);
      ctx.fill();
      // HP shine
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      drawRoundRect(x + 1, dy - 10, e.w * dHpFrac - 2, 2, 1);
      ctx.fill();

      // Boss label
      ctx.fillStyle = '#ffd54f';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('THE DEAN', x + e.w / 2, dy - 15);
      ctx.textAlign = 'left';
      break;
    }

    case 'predatory_journal': {
      // Filing cabinet trap — manuscript creature pops from drawer, anime style
      const cabW = 36;
      const cabH = 34;
      const cabX = x + e.w / 2 - cabW / 2;
      const cabBaseY = y + e.h;
      const isShooter = e.variant === 'shooter';

      // === FILING CABINET (always visible) ===
      // Cabinet contour
      ctx.fillStyle = '#2a2420';
      drawRoundRect(cabX - 1, cabBaseY - cabH - 1, cabW + 2, cabH + 10, 4);
      ctx.fill();
      // Cabinet body — smooth radial gradient
      const cabGrad = ctx.createRadialGradient(cabX + cabW / 2, cabBaseY - cabH / 2, 4, cabX + cabW / 2, cabBaseY - cabH / 2, cabW);
      cabGrad.addColorStop(0, '#d6ccbd');
      cabGrad.addColorStop(0.5, '#c4b9aa');
      cabGrad.addColorStop(1, '#8d8272');
      ctx.fillStyle = cabGrad;
      drawRoundRect(cabX, cabBaseY - cabH, cabW, cabH + 8, 3);
      ctx.fill();
      // Rim light
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      drawRoundRect(cabX + 1, cabBaseY - cabH, cabW - 2, 3, 2);
      ctx.fill();

      // Drawer grooves
      ctx.strokeStyle = 'rgba(90,80,70,0.4)';
      ctx.lineWidth = 0.8;
      for (let di = 0; di < 3; di++) {
        const lineY = cabBaseY - cabH + 7 + di * 9;
        ctx.beginPath(); ctx.moveTo(cabX + 3, lineY); ctx.lineTo(cabX + cabW - 3, lineY); ctx.stroke();
      }

      // Handle — gradient metallic
      const hY = cabBaseY - cabH + 14;
      ctx.fillStyle = '#3e3632';
      drawRoundRect(cabX + cabW / 2 - 6, hY - 1, 12, 6, 2); ctx.fill();
      const hGrad = ctx.createLinearGradient(0, hY, 0, hY + 4);
      hGrad.addColorStop(0, '#b8ad9e'); hGrad.addColorStop(0.5, '#d6ccbd'); hGrad.addColorStop(1, '#9e9688');
      ctx.fillStyle = hGrad;
      drawRoundRect(cabX + cabW / 2 - 5, hY, 10, 4, 1.5); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      drawRoundRect(cabX + cabW / 2 - 4, hY, 8, 1.5, 1); ctx.fill();

      // Label slot
      ctx.fillStyle = '#ede5d8';
      drawRoundRect(cabX + cabW / 2 - 7, cabBaseY - cabH + 23, 14, 6, 1.5); ctx.fill();
      ctx.strokeStyle = '#9e9688'; ctx.lineWidth = 0.6;
      drawRoundRect(cabX + cabW / 2 - 7, cabBaseY - cabH + 23, 14, 6, 1.5); ctx.stroke();

      // Drawer lip contour
      ctx.fillStyle = '#2a2420';
      drawRoundRect(cabX - 3, cabBaseY - cabH - 4, cabW + 6, 8, 3); ctx.fill();
      // Drawer lip surface with gradient
      const lipGrad = ctx.createRadialGradient(cabX + cabW / 2, cabBaseY - cabH - 1, 2, cabX + cabW / 2, cabBaseY - cabH - 1, cabW / 2 + 4);
      lipGrad.addColorStop(0, '#d6ccbd'); lipGrad.addColorStop(1, '#8d8272');
      ctx.fillStyle = lipGrad;
      drawRoundRect(cabX - 2, cabBaseY - cabH - 3, cabW + 4, 6, 2.5); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(cabX, cabBaseY - cabH - 3, cabW, 1.5);
      // Dark drawer gap
      ctx.fillStyle = '#100e0a';
      drawRoundRect(cabX + 2, cabBaseY - cabH + 2, cabW - 4, 3, 1); ctx.fill();

      // === MANUSCRIPT CREATURE (only when not hidden) ===
      if (e.pipeState !== 'hidden') {
        const headH = e.h;

        // Danger glow behind creature
        ctx.shadowColor = isShooter ? '#ff8f00' : '#c62828';
        ctx.shadowBlur = 8;
        const dangerGrad = ctx.createRadialGradient(x + e.w / 2, dy + headH / 2, 3, x + e.w / 2, dy + headH / 2, 22);
        dangerGrad.addColorStop(0, isShooter ? 'rgba(255,143,0,0.15)' : 'rgba(198,40,40,0.15)');
        dangerGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = dangerGrad;
        drawCircle(x + e.w / 2, dy + headH / 2, 22); ctx.fill();
        ctx.shadowBlur = 0;

        // Body contour
        ctx.fillStyle = isShooter ? '#5a3000' : '#4a1010';
        drawRoundRect(x, dy, e.w, headH - 4, 12); ctx.fill();
        // Body — smooth radial gradient (parchment creature)
        const bodyGrad = ctx.createRadialGradient(x + e.w / 2, dy + 10, 3, x + e.w / 2, dy + headH / 2, 22);
        bodyGrad.addColorStop(0, isShooter ? '#fff8e1' : '#fff3e0');
        bodyGrad.addColorStop(0.4, isShooter ? '#ffe0b2' : '#ffccbc');
        bodyGrad.addColorStop(0.8, isShooter ? '#ffb74d' : '#ef9a9a');
        bodyGrad.addColorStop(1, isShooter ? '#e65100' : '#c62828');
        ctx.fillStyle = bodyGrad;
        drawRoundRect(x + 1, dy + 1, e.w - 2, headH - 6, 11); ctx.fill();
        // Rim light
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        drawRoundRect(x + 3, dy + 2, e.w - 6, 6, 6); ctx.fill();

        // Paper texture lines (faint)
        ctx.strokeStyle = 'rgba(100,80,60,0.1)';
        ctx.lineWidth = 0.5;
        for (let li = 0; li < 5; li++) {
          const ly = dy + 7 + li * 5;
          ctx.beginPath(); ctx.moveTo(x + 6, ly); ctx.lineTo(x + e.w - 6, ly); ctx.stroke();
        }

        // Spine line on left
        ctx.fillStyle = isShooter ? '#bf5b00' : '#8d2020';
        drawRoundRect(x + 1, dy + 3, 3, headH - 10, 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.fillRect(x + 2, dy + 4, 1, headH - 12);

        // Pages edge on right
        for (let pi = 0; pi < 3; pi++) {
          ctx.fillStyle = `rgba(245,240,224,${0.6 - pi * 0.15})`;
          ctx.fillRect(x + e.w - 3 + pi, dy + 4 + pi, 1, headH - 12 - pi * 2);
        }

        // "ACCEPTED!" stamp (tilted)
        ctx.save();
        ctx.translate(x + e.w / 2, dy + 6);
        ctx.rotate(-0.12);
        ctx.strokeStyle = 'rgba(198,40,40,0.7)'; ctx.lineWidth = 1.2;
        drawRoundRect(-9, -3.5, 18, 8, 1.5); ctx.stroke();
        ctx.fillStyle = '#c62828'; ctx.font = 'bold 5px monospace'; ctx.textAlign = 'center';
        ctx.fillText('ACCEPTED', 0, 2); ctx.textAlign = 'left';
        ctx.restore();

        // Anime eyes — large, with coin-gold gradient iris
        for (const ex2 of [x + 9, x + e.w - 11]) {
          // Eye contour
          ctx.fillStyle = '#1a1000';
          drawEllipse(ex2, dy + 17, 6, 5.5); ctx.fill();
          // White sclera
          ctx.fillStyle = '#fff';
          drawEllipse(ex2, dy + 17, 5.5, 5); ctx.fill();
          // Gold gradient iris
          const iGrad = ctx.createRadialGradient(ex2, dy + 17.5, 0.5, ex2, dy + 17.5, 3.5);
          iGrad.addColorStop(0, '#fff9c4');
          iGrad.addColorStop(0.3, '#ffd54f');
          iGrad.addColorStop(0.7, '#f9a825');
          iGrad.addColorStop(1, isShooter ? '#e65100' : '#c62828');
          ctx.fillStyle = iGrad;
          drawCircle(ex2 + 0.3, dy + 17.5, 3); ctx.fill();
          // $ pupil
          ctx.fillStyle = '#1a0a00';
          ctx.font = 'bold 4px monospace'; ctx.textAlign = 'center';
          ctx.fillText('$', ex2 + 0.3, dy + 19); ctx.textAlign = 'left';
          // Large highlight top-left
          ctx.fillStyle = 'rgba(255,255,255,0.9)';
          drawCircle(ex2 - 1.5, dy + 15.5, 1.5); ctx.fill();
          // Small highlight bottom-right
          ctx.fillStyle = 'rgba(255,255,255,0.45)';
          drawCircle(ex2 + 1.8, dy + 19, 0.7); ctx.fill();
        }

        // Manga eyebrows
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x + 3, dy + 11); ctx.lineTo(x + 13, dy + 14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x + e.w - 3, dy + 11); ctx.lineTo(x + e.w - 13, dy + 14); ctx.stroke();
        ctx.lineCap = 'butt';

        // Chomping mouth
        const mouthOpen = Math.abs(Math.sin(levelTimer * 0.08)) * 5;
        const mY = dy + 26;
        // Mouth interior
        ctx.fillStyle = '#1a0500';
        ctx.beginPath();
        ctx.moveTo(x + 6, mY);
        ctx.quadraticCurveTo(x + e.w / 2, mY - mouthOpen - 2, x + e.w - 6, mY);
        ctx.quadraticCurveTo(x + e.w / 2, mY + mouthOpen + 2, x + 6, mY);
        ctx.fill();
        // Tongue
        if (mouthOpen > 2) {
          const tGrad = ctx.createRadialGradient(x + e.w / 2, mY + mouthOpen * 0.3, 0, x + e.w / 2, mY + mouthOpen * 0.3, 4);
          tGrad.addColorStop(0, '#ef5350'); tGrad.addColorStop(1, '#b71c1c');
          ctx.fillStyle = tGrad;
          drawEllipse(x + e.w / 2, mY + mouthOpen * 0.3, 4, mouthOpen * 0.4); ctx.fill();
        }
        // Teeth
        ctx.fillStyle = '#fff';
        for (let ti = 0; ti < 4; ti++) {
          const tx2 = x + 8 + ti * 5;
          ctx.beginPath(); ctx.moveTo(tx2, mY - mouthOpen * 0.3 - 1); ctx.lineTo(tx2 + 2, mY + mouthOpen * 0.15); ctx.lineTo(tx2 + 4, mY - mouthOpen * 0.3 - 1); ctx.fill();
        }
        for (let ti = 0; ti < 3; ti++) {
          const tx2 = x + 10 + ti * 5;
          ctx.beginPath(); ctx.moveTo(tx2, mY + mouthOpen * 0.3 + 1); ctx.lineTo(tx2 + 2, mY - mouthOpen * 0.15); ctx.lineTo(tx2 + 4, mY + mouthOpen * 0.3 + 1); ctx.fill();
        }

        // Blush marks
        ctx.fillStyle = isShooter ? 'rgba(255,160,80,0.25)' : 'rgba(255,100,100,0.25)';
        drawEllipse(x + 3, dy + 20, 3, 1.5); ctx.fill();
        drawEllipse(x + e.w - 3, dy + 20, 3, 1.5); ctx.fill();

        // Gold badge (bottom right)
        ctx.save();
        ctx.translate(x + e.w - 4, dy + headH - 10);
        ctx.rotate(0.2);
        ctx.fillStyle = '#5d4037'; drawCircle(0, 0, 5.5); ctx.fill();
        const badgeGrad = ctx.createRadialGradient(0, -1, 0, 0, 0, 5);
        badgeGrad.addColorStop(0, '#fff9c4'); badgeGrad.addColorStop(0.5, '#ffd54f'); badgeGrad.addColorStop(1, '#c17900');
        ctx.fillStyle = badgeGrad; drawCircle(0, 0, 5); ctx.fill();
        ctx.strokeStyle = '#a06800'; ctx.lineWidth = 0.6; drawCircle(0, 0, 3.5); ctx.stroke();
        ctx.fillStyle = '#5d4037'; ctx.font = 'bold 4px monospace'; ctx.textAlign = 'center';
        ctx.fillText('IF', 0, 1.5); ctx.textAlign = 'left';
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; drawCircle(-1.5, -1.5, 1.2); ctx.fill();
        ctx.restore();

        // Shooter glow
        if (isShooter && e.shootTimer > 60) {
          const shGrad = ctx.createRadialGradient(x + e.w / 2, dy + 4, 0, x + e.w / 2, dy + 4, 12);
          shGrad.addColorStop(0, `rgba(255,140,0,${0.35 + Math.sin(levelTimer * 0.3) * 0.15})`);
          shGrad.addColorStop(1, 'rgba(255,140,0,0)');
          ctx.fillStyle = shGrad; drawCircle(x + e.w / 2, dy + 4, 12); ctx.fill();
        }

        // Label
        ctx.fillStyle = isShooter ? '#ff9800' : '#ef5350';
        ctx.font = 'bold 6px monospace'; ctx.textAlign = 'center';
        ctx.fillText(isShooter ? 'SPAM JOURNAL' : 'PREDATORY', x + e.w / 2, dy - 3);
        ctx.textAlign = 'left';
      }
      break;
    }

    case 'spam_email': {
      // Invoice projectile — spinning, with glow trail
      const srot = Math.atan2(e.vy || 0, e.vx || 1);
      // Trail glow
      const tdir = e.vx > 0 ? -1 : 1;
      for (let ti = 0; ti < 4; ti++) {
        ctx.globalAlpha = 0.3 - ti * 0.07;
        ctx.fillStyle = ti < 2 ? '#ffd54f' : '#ffb74d';
        drawCircle(x + e.w / 2 + tdir * (ti * 4 + 5), dy + e.h / 2 + Math.sin(levelTimer * 0.4 + ti) * 2, 2.5 - ti * 0.5);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.save();
      ctx.translate(x + e.w / 2, dy + e.h / 2);
      ctx.rotate(srot * 0.3 + levelTimer * 0.12);
      // Contour
      ctx.fillStyle = '#3e3020';
      drawRoundRect(-e.w / 2 - 1, -e.h / 2 - 1, e.w + 2, e.h + 2, 2.5); ctx.fill();
      // Paper body with gradient
      const spGrad = ctx.createLinearGradient(-e.w / 2, -e.h / 2, e.w / 2, e.h / 2);
      spGrad.addColorStop(0, '#fff8e1'); spGrad.addColorStop(1, '#ffe0b2');
      ctx.fillStyle = spGrad;
      drawRoundRect(-e.w / 2, -e.h / 2, e.w, e.h, 2); ctx.fill();
      // Red header
      ctx.fillStyle = '#c62828';
      drawRoundRect(-e.w / 2 + 1, -e.h / 2 + 1, e.w - 2, 3, 1); ctx.fill();
      // $ sign
      ctx.fillStyle = '#bf360c';
      ctx.font = 'bold 7px monospace'; ctx.textAlign = 'center';
      ctx.fillText('$', 0, 4); ctx.textAlign = 'left';
      ctx.restore();
      break;
    }

    case 'rejection': {
      // Flying paper
      const rot = Math.atan2(e.vy || 0, e.vx || 1);
      ctx.save();
      ctx.translate(x + e.w / 2, dy + e.h / 2);
      ctx.rotate(rot * 0.3 + Math.sin(levelTimer * 0.2) * 0.2);
      // Paper contour
      ctx.fillStyle = '#90a4ae';
      drawRoundRect(-e.w / 2 - 1, -e.h / 2 - 1, e.w + 2, e.h + 2, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      drawRoundRect(-e.w / 2, -e.h / 2, e.w, e.h, 2);
      ctx.fill();
      ctx.fillStyle = '#c62828';
      ctx.font = 'bold 7px monospace';
      ctx.fillText('REJ', -8, 3);
      // Red stamp
      ctx.strokeStyle = '#c62828';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(-6, -4, 12, 8);
      ctx.restore();
      break;
    }

    case 'critique': {
      // Rival's thrown critique paper — spinning red-marked manuscript
      const crot = Math.atan2(e.vy || 0, e.vx || 1);
      ctx.save();
      ctx.translate(x + e.w / 2, dy + e.h / 2);
      ctx.rotate(crot * 0.3 + levelTimer * 0.15);
      // Paper contour
      ctx.fillStyle = '#90a4ae';
      drawRoundRect(-e.w / 2 - 1, -e.h / 2 - 1, e.w + 2, e.h + 2, 3);
      ctx.fill();
      ctx.fillStyle = '#fffde7';
      drawRoundRect(-e.w / 2, -e.h / 2, e.w, e.h, 2);
      ctx.fill();
      // Red strikethrough marks
      ctx.strokeStyle = '#c62828';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-5, -2); ctx.lineTo(5, -2);
      ctx.moveTo(-4, 1); ctx.lineTo(4, 1);
      ctx.stroke();
      // Red "X" mark
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-3, -3); ctx.lineTo(3, 3);
      ctx.moveTo(3, -3); ctx.lineTo(-3, 3);
      ctx.stroke();
      ctx.restore();
      break;
    }
  }

  ctx.restore();
}

// ============================================================
// GRAD STUDENT DRAWING (mentorable NPC)
// ============================================================
function drawPet(pet, x, y) {
  const bob = pet.collected ? 0 : Math.sin(pet.bobOffset) * 3;
  const dy = y + bob;

  ctx.save();
  if (!pet.facingRight) {
    ctx.translate(x + pet.w, 0);
    ctx.scale(-1, 1);
    x = 0;
  }

  const cx = x + pet.w / 2;
  const cy2 = dy + pet.h / 2;

  // Soft shadow
  const shadowGrad = ctx.createRadialGradient(cx, dy + pet.h + 1, 1, cx, dy + pet.h + 1, pet.w * 0.5);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0.25)');
  shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  drawEllipse(cx, dy + pet.h + 1, pet.w * 0.45, 4);
  ctx.fill();

  // Uncollected glow aura (pulsing pink heart-like glow)
  if (!pet.collected) {
    ctx.globalAlpha = 0.25 + Math.sin(levelTimer * 0.08) * 0.1;
    const auraGrad = ctx.createRadialGradient(cx, cy2, 2, cx, cy2, 18);
    auraGrad.addColorStop(0, 'rgba(255,128,171,0.4)');
    auraGrad.addColorStop(0.6, 'rgba(255,128,171,0.1)');
    auraGrad.addColorStop(1, 'rgba(255,128,171,0)');
    ctx.fillStyle = auraGrad;
    drawCircle(cx, cy2, 18);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  if (pet.kind === 'dog') {
    // === ANIME DOG ===
    const furMain = '#d4a35a';
    const furLight = '#e8c88a';
    const furDark = '#a07830';
    const belly = '#f5e6cc';
    const nose = '#3e2723';

    // Body contour
    ctx.fillStyle = furDark;
    drawRoundRect(x + 2, dy + 7, pet.w - 4, pet.h - 8, 5);
    ctx.fill();

    // Body with radial gradient
    const bodyGrad = ctx.createRadialGradient(cx - 2, cy2 + 1, 2, cx, cy2 + 2, 14);
    bodyGrad.addColorStop(0, furLight);
    bodyGrad.addColorStop(0.7, furMain);
    bodyGrad.addColorStop(1, furDark);
    ctx.fillStyle = bodyGrad;
    drawRoundRect(x + 3, dy + 8, pet.w - 6, pet.h - 9, 4);
    ctx.fill();

    // Belly patch
    ctx.fillStyle = belly;
    drawEllipse(cx, dy + pet.h - 5, 5, 3);
    ctx.fill();

    // Rim light
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    drawRoundRect(x + 4, dy + 8, 3, pet.h - 12, 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Legs (little stubs, walking animation)
    const legOffset = pet.collected ? Math.sin(pet.frame * Math.PI / 2) * 2 : 0;
    ctx.fillStyle = furDark;
    // Front legs
    drawRoundRect(x + 4, dy + pet.h - 5 + legOffset, 3, 5, 1.5);
    ctx.fill();
    drawRoundRect(x + 8, dy + pet.h - 5 - legOffset, 3, 5, 1.5);
    ctx.fill();
    // Back legs
    drawRoundRect(x + pet.w - 11, dy + pet.h - 5 - legOffset, 3, 5, 1.5);
    ctx.fill();
    drawRoundRect(x + pet.w - 7, dy + pet.h - 5 + legOffset, 3, 5, 1.5);
    ctx.fill();

    // Paws
    ctx.fillStyle = belly;
    drawCircle(x + 5.5, dy + pet.h + legOffset, 1.5);
    ctx.fill();
    drawCircle(x + 9.5, dy + pet.h - legOffset, 1.5);
    ctx.fill();
    drawCircle(x + pet.w - 9.5, dy + pet.h - legOffset, 1.5);
    ctx.fill();
    drawCircle(x + pet.w - 5.5, dy + pet.h + legOffset, 1.5);
    ctx.fill();

    // Head contour
    ctx.fillStyle = furDark;
    drawCircle(cx + 3, dy + 6, 7.5);
    ctx.fill();

    // Head fill
    const headGrad = ctx.createRadialGradient(cx + 2, dy + 4, 1, cx + 3, dy + 6, 8);
    headGrad.addColorStop(0, furLight);
    headGrad.addColorStop(0.6, furMain);
    headGrad.addColorStop(1, furDark);
    ctx.fillStyle = headGrad;
    drawCircle(cx + 3, dy + 6, 6.5);
    ctx.fill();

    // Ears (floppy, cute)
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(cx - 2, dy + 1, 3, 5, -0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(cx - 2, dy + 1, 2, 4, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Inner ear pink
    ctx.fillStyle = '#f8bbd0';
    ctx.beginPath();
    ctx.ellipse(cx - 2, dy + 1.5, 1, 2.5, -0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.ellipse(cx + 8, dy + 1, 3, 5, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(cx + 8, dy + 1, 2, 4, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f8bbd0';
    ctx.beginPath();
    ctx.ellipse(cx + 8, dy + 1.5, 1, 2.5, 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes — anime style (large, gradient iris, dual highlights)
    const eyeY = dy + 5;
    for (let ei = 0; ei < 2; ei++) {
      const ex = cx + (ei === 0 ? 0 : 6);
      // White
      ctx.fillStyle = '#fff';
      drawEllipse(ex, eyeY, 3, 2.8);
      ctx.fill();
      // Iris gradient
      const irisGrad = ctx.createRadialGradient(ex, eyeY, 0.5, ex, eyeY, 2.5);
      irisGrad.addColorStop(0, '#5d4037');
      irisGrad.addColorStop(0.7, '#3e2723');
      irisGrad.addColorStop(1, '#1b0000');
      ctx.fillStyle = irisGrad;
      drawEllipse(ex, eyeY, 2.2, 2.2);
      ctx.fill();
      // Pupil
      ctx.fillStyle = '#000';
      drawCircle(ex, eyeY + 0.3, 1);
      ctx.fill();
      // Highlights
      ctx.fillStyle = '#fff';
      drawCircle(ex - 0.8, eyeY - 0.8, 0.8);
      ctx.fill();
      ctx.globalAlpha = 0.6;
      drawCircle(ex + 0.5, eyeY + 0.8, 0.4);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Nose
    ctx.fillStyle = nose;
    drawCircle(cx + 6, dy + 7.5, 1.2);
    ctx.fill();
    // Nose shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    drawCircle(cx + 5.7, dy + 7, 0.5);
    ctx.fill();

    // Mouth (little smile)
    ctx.strokeStyle = furDark;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(cx + 5, dy + 9, 2, 0.1, Math.PI - 0.1);
    ctx.stroke();

    // Blush marks
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#f48fb1';
    drawEllipse(cx - 1.5, dy + 8, 1.8, 1);
    ctx.fill();
    drawEllipse(cx + 7.5, dy + 8, 1.8, 1);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Tail (wagging)
    const tailAngle = Math.sin(pet.tailWag * (pet.collected ? 3 : 1)) * 0.6;
    ctx.save();
    ctx.translate(x + 1, dy + 10);
    ctx.rotate(-0.8 + tailAngle);
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.ellipse(0, -4, 2, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = furDark;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.restore();

    // Tongue (when collected, happy!)
    if (pet.collected && Math.sin(levelTimer * 0.1) > 0) {
      ctx.fillStyle = '#ef5350';
      ctx.beginPath();
      ctx.ellipse(cx + 6, dy + 10.5, 1.2, 2, 0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c62828';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }

  } else {
    // === ANIME CAT ===
    const furMain = '#9e9e9e';
    const furLight = '#bdbdbd';
    const furDark = '#616161';
    const belly = '#e0e0e0';
    const nose = '#f48fb1';

    // Body contour
    ctx.fillStyle = furDark;
    drawRoundRect(x + 2, dy + 7, pet.w - 4, pet.h - 8, 5);
    ctx.fill();

    // Body with radial gradient
    const bodyGrad = ctx.createRadialGradient(cx - 2, cy2 + 1, 2, cx, cy2 + 2, 14);
    bodyGrad.addColorStop(0, furLight);
    bodyGrad.addColorStop(0.7, furMain);
    bodyGrad.addColorStop(1, furDark);
    ctx.fillStyle = bodyGrad;
    drawRoundRect(x + 3, dy + 8, pet.w - 6, pet.h - 9, 4);
    ctx.fill();

    // Belly patch
    ctx.fillStyle = belly;
    drawEllipse(cx, dy + pet.h - 5, 5, 3);
    ctx.fill();

    // Rim light
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#fff';
    drawRoundRect(x + 4, dy + 8, 3, pet.h - 12, 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Legs
    const legOffset = pet.collected ? Math.sin(pet.frame * Math.PI / 2) * 2 : 0;
    ctx.fillStyle = furDark;
    drawRoundRect(x + 4, dy + pet.h - 5 + legOffset, 3, 5, 1.5);
    ctx.fill();
    drawRoundRect(x + 8, dy + pet.h - 5 - legOffset, 3, 5, 1.5);
    ctx.fill();
    drawRoundRect(x + pet.w - 11, dy + pet.h - 5 - legOffset, 3, 5, 1.5);
    ctx.fill();
    drawRoundRect(x + pet.w - 7, dy + pet.h - 5 + legOffset, 3, 5, 1.5);
    ctx.fill();

    // Paws
    ctx.fillStyle = belly;
    drawCircle(x + 5.5, dy + pet.h + legOffset, 1.5);
    ctx.fill();
    drawCircle(x + 9.5, dy + pet.h - legOffset, 1.5);
    ctx.fill();
    drawCircle(x + pet.w - 9.5, dy + pet.h - legOffset, 1.5);
    ctx.fill();
    drawCircle(x + pet.w - 5.5, dy + pet.h + legOffset, 1.5);
    ctx.fill();

    // Head contour
    ctx.fillStyle = furDark;
    drawCircle(cx + 3, dy + 6, 7.5);
    ctx.fill();

    // Head fill
    const headGrad = ctx.createRadialGradient(cx + 2, dy + 4, 1, cx + 3, dy + 6, 8);
    headGrad.addColorStop(0, furLight);
    headGrad.addColorStop(0.6, furMain);
    headGrad.addColorStop(1, furDark);
    ctx.fillStyle = headGrad;
    drawCircle(cx + 3, dy + 6, 6.5);
    ctx.fill();

    // Ears (pointy cat ears with inner pink)
    // Left ear
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(cx - 2, dy + 2);
    ctx.lineTo(cx - 5, dy - 5);
    ctx.lineTo(cx + 1, dy + 1);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(cx - 2, dy + 1.5);
    ctx.lineTo(cx - 4.5, dy - 4);
    ctx.lineTo(cx + 0.5, dy + 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f8bbd0';
    ctx.beginPath();
    ctx.moveTo(cx - 2, dy + 0.5);
    ctx.lineTo(cx - 3.5, dy - 2.5);
    ctx.lineTo(cx + 0, dy);
    ctx.closePath();
    ctx.fill();

    // Right ear
    ctx.fillStyle = furDark;
    ctx.beginPath();
    ctx.moveTo(cx + 8, dy + 2);
    ctx.lineTo(cx + 11, dy - 5);
    ctx.lineTo(cx + 5, dy + 1);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = furMain;
    ctx.beginPath();
    ctx.moveTo(cx + 8, dy + 1.5);
    ctx.lineTo(cx + 10.5, dy - 4);
    ctx.lineTo(cx + 5.5, dy + 0.5);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#f8bbd0';
    ctx.beginPath();
    ctx.moveTo(cx + 8, dy + 0.5);
    ctx.lineTo(cx + 9.5, dy - 2.5);
    ctx.lineTo(cx + 6, dy);
    ctx.closePath();
    ctx.fill();

    // Eyes — anime style (large, green gradient iris)
    const eyeY = dy + 5;
    for (let ei = 0; ei < 2; ei++) {
      const ex = cx + (ei === 0 ? 0 : 6);
      // White
      ctx.fillStyle = '#fff';
      drawEllipse(ex, eyeY, 3, 3);
      ctx.fill();
      // Iris gradient (cat green)
      const irisGrad = ctx.createRadialGradient(ex, eyeY, 0.5, ex, eyeY, 2.5);
      irisGrad.addColorStop(0, '#66bb6a');
      irisGrad.addColorStop(0.6, '#2e7d32');
      irisGrad.addColorStop(1, '#1b5e20');
      ctx.fillStyle = irisGrad;
      drawEllipse(ex, eyeY, 2.3, 2.5);
      ctx.fill();
      // Cat slit pupil
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(ex, eyeY + 0.2, 0.6, 1.8, 0, 0, Math.PI * 2);
      ctx.fill();
      // Highlights
      ctx.fillStyle = '#fff';
      drawCircle(ex - 0.8, eyeY - 0.8, 0.8);
      ctx.fill();
      ctx.globalAlpha = 0.6;
      drawCircle(ex + 0.5, eyeY + 0.8, 0.4);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Nose (pink triangle)
    ctx.fillStyle = nose;
    ctx.beginPath();
    ctx.moveTo(cx + 3, dy + 7);
    ctx.lineTo(cx + 2, dy + 8.2);
    ctx.lineTo(cx + 4, dy + 8.2);
    ctx.closePath();
    ctx.fill();
    // Nose shine
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    drawCircle(cx + 2.8, dy + 7.2, 0.4);
    ctx.fill();

    // Mouth (cat W shape)
    ctx.strokeStyle = furDark;
    ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(cx + 1, dy + 9);
    ctx.lineTo(cx + 3, dy + 8.3);
    ctx.lineTo(cx + 5, dy + 9);
    ctx.stroke();

    // Whiskers
    ctx.strokeStyle = furDark;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.5;
    // Left whiskers
    ctx.beginPath(); ctx.moveTo(cx - 2, dy + 7.5); ctx.lineTo(cx - 7, dy + 6.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - 2, dy + 8.5); ctx.lineTo(cx - 7, dy + 8.5); ctx.stroke();
    // Right whiskers
    ctx.beginPath(); ctx.moveTo(cx + 8, dy + 7.5); ctx.lineTo(cx + 13, dy + 6.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 8, dy + 8.5); ctx.lineTo(cx + 13, dy + 8.5); ctx.stroke();
    ctx.globalAlpha = 1;

    // Blush marks
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#f48fb1';
    drawEllipse(cx - 1.5, dy + 8, 1.8, 1);
    ctx.fill();
    drawEllipse(cx + 7.5, dy + 8, 1.8, 1);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Tail (sinuous, cat-like)
    const tailWave = Math.sin(pet.tailWag * (pet.collected ? 2 : 0.5)) * 0.5;
    ctx.save();
    ctx.translate(x + 1, dy + 10);
    ctx.strokeStyle = furMain;
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(-3, -4 + tailWave * 3, -5, -8 + tailWave * 5, -3, -11 + tailWave * 3);
    ctx.stroke();
    ctx.strokeStyle = furDark;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Heart icon floating above uncollected pets
  if (!pet.collected) {
    const heartY = dy - 8 + Math.sin(levelTimer * 0.06) * 2;
    ctx.fillStyle = '#ff4081';
    ctx.globalAlpha = 0.7 + Math.sin(levelTimer * 0.1) * 0.2;
    ctx.beginPath();
    const hx = cx + 3;
    ctx.moveTo(hx, heartY + 2);
    ctx.bezierCurveTo(hx - 3, heartY - 1, hx - 5, heartY + 2, hx, heartY + 5);
    ctx.bezierCurveTo(hx + 5, heartY + 2, hx + 3, heartY - 1, hx, heartY + 2);
    ctx.fill();
    // Heart shine
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    drawCircle(hx - 1.5, heartY + 1, 1);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Small heart particles when following (occasionally)
  if (pet.collected && Math.random() < 0.02) {
    spawnParticles(pet.x + pet.w / 2, pet.y, '#ff80ab', 1);
  }

  ctx.restore();
}

function drawGradStudent(gs, x, y) {
  const bob = gs.panicked ? 0 : Math.sin(levelTimer * 0.05 + gs.startX * 0.1) * 1.5;
  const dy = y + bob;
  const facingLeft = gs.vx < 0;

  ctx.save();
  if (facingLeft) {
    ctx.translate(x + gs.w, 0);
    ctx.scale(-1, 1);
    x = 0;
  }

  const ga = gs.appearance || { skin: SKIN_TONES[0], hair: HAIR_COLORS[0], hoodie: HOODIE_COLORS[0] };
  const hoodieColor = ga.hoodie || HOODIE_COLORS[0];

  // Panic shake
  const panicShake = gs.panicked ? (Math.random() - 0.5) * 3 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  drawEllipse(x + gs.w / 2, y + gs.h + 2, gs.w / 2.5, 3);
  ctx.fill();

  // Charge aura when mentee is moving fast
  if (gs.mentee && Math.abs(gs.vx) > 2) {
    ctx.fillStyle = 'rgba(255,235,59,0.25)';
    drawCircle(x + gs.w / 2 + panicShake, dy + gs.h / 2, gs.w * 0.8);
    ctx.fill();
  }

  // Body contour
  ctx.fillStyle = darkenColor(hoodieColor.dark, 60);
  drawRoundRect(x + 1 + panicShake, dy + 9, gs.w - 2, gs.h - 10, 6);
  ctx.fill();
  // Body (hoodie with diverse colors)
  const bodyGrad = ctx.createLinearGradient(x, dy + 10, x + gs.w, dy + gs.h);
  bodyGrad.addColorStop(0, hoodieColor.main);
  bodyGrad.addColorStop(1, hoodieColor.dark);
  ctx.fillStyle = bodyGrad;
  drawRoundRect(x + 2 + panicShake, dy + 10, gs.w - 4, gs.h - 12, 5);
  ctx.fill();

  // Hoodie highlight
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  drawRoundRect(x + 4 + panicShake, dy + 11, gs.w - 8, 4, 3);
  ctx.fill();

  // Backpack contour
  ctx.fillStyle = '#bf360c';
  drawRoundRect(x - 3 + panicShake, dy + 13, 8, 12, 4);
  ctx.fill();
  // Backpack (cute detail)
  ctx.fillStyle = '#ff7043';
  drawRoundRect(x - 2 + panicShake, dy + 14, 6, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#bf360c';
  ctx.fillRect(x - 1 + panicShake, dy + 17, 4, 1);

  // Hair — diverse styles (drawn behind head, must extend beyond head bounds)
  ctx.fillStyle = ga.hair;
  if (ga.hairStyle === 'long' || ga.hairStyle === 'bob') {
    drawRoundRect(x + 1 + panicShake, dy - 7, gs.w - 2, 8, 4);
    ctx.fill();
    // Side hair past head
    drawRoundRect(x - 1 + panicShake, dy, 4, 12, 2);
    ctx.fill();
    drawRoundRect(x + gs.w - 3 + panicShake, dy, 4, 12, 2);
    ctx.fill();
  } else if (ga.hairStyle === 'bun') {
    drawRoundRect(x + 2 + panicShake, dy - 6, gs.w - 4, 6, 4);
    ctx.fill();
    drawCircle(x + gs.w / 2 + panicShake, dy - 9, 5);
    ctx.fill();
  } else if (ga.hairStyle === 'afro') {
    drawCircle(x + gs.w / 2 + panicShake, dy + 2, 14);
    ctx.fill();
  } else if (ga.hairStyle === 'curly') {
    for (let ci = 0; ci < 4; ci++) {
      drawCircle(x + 4 + ci * 5 + panicShake, dy - 5, 4.5);
      ctx.fill();
    }
  } else if (ga.hairStyle === 'mohawk') {
    drawRoundRect(x + gs.w / 2 - 3 + panicShake, dy - 11, 6, 10, 3);
    ctx.fill();
  } else if (ga.hairStyle === 'messy') {
    drawRoundRect(x + 2 + panicShake, dy - 7, gs.w - 4, 8, 4);
    ctx.fill();
    ctx.fillRect(x + 3 + panicShake, dy - 9, 3, 4);
    ctx.fillRect(x + gs.w / 2 - 1 + panicShake, dy - 10, 3, 5);
    ctx.fillRect(x + gs.w - 6 + panicShake, dy - 8, 3, 3);
  } else {
    // short/default
    drawRoundRect(x + 2 + panicShake, dy - 6, gs.w - 4, 7, 4);
    ctx.fill();
  }

  // Head contour (drawn on top of hair)
  ctx.fillStyle = darkenColor(ga.skin.shadow, 60);
  drawRoundRect(x + 2 + panicShake, dy - 3, gs.w - 4, 16, 7);
  ctx.fill();
  // Head
  const headGrad = ctx.createRadialGradient(x + gs.w / 2, dy + 5, 2, x + gs.w / 2, dy + 7, 9);
  headGrad.addColorStop(0, ga.skin.base);
  headGrad.addColorStop(1, ga.skin.shadow);
  ctx.fillStyle = headGrad;
  drawRoundRect(x + 3 + panicShake, dy - 2, gs.w - 6, 14, 6);
  ctx.fill();

  // Glasses (if any)
  if (ga.glasses === 'round') {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.8;
    drawCircle(x + 7 + panicShake, dy + 5, 3);
    ctx.stroke();
    drawCircle(x + gs.w - 9 + panicShake, dy + 5, 3);
    ctx.stroke();
  } else if (ga.glasses === 'rectangular') {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.8;
    ctx.strokeRect(x + 4 + panicShake, dy + 3, 5, 4);
    ctx.strokeRect(x + gs.w - 11 + panicShake, dy + 3, 5, 4);
  }

  // Earrings accessory
  if (ga.accessory === 'earrings') {
    ctx.fillStyle = '#ffd54f';
    drawCircle(x + 3 + panicShake, dy + 8, 1.5);
    ctx.fill();
    drawCircle(x + gs.w - 3 + panicShake, dy + 8, 1.5);
    ctx.fill();
  }

  // Eyes — panicked = wide & scared, normal = friendly
  if (gs.panicked) {
    for (const gex of [x + 7 + panicShake, x + gs.w - 9 + panicShake]) {
      ctx.fillStyle = '#fff';
      drawEllipse(gex, dy + 5, 4, 3.5);
      ctx.fill();
      ctx.fillStyle = '#333';
      drawCircle(gex, dy + 5.5, 1.5);
      ctx.fill();
    }
  } else {
    for (const gex of [x + 7, x + gs.w - 9]) {
      ctx.fillStyle = '#fff';
      drawEllipse(gex, dy + 5, 3.5, 3);
      ctx.fill();
      ctx.fillStyle = hoodieColor.main;
      drawCircle(gex, dy + 5.5, 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      drawCircle(gex, dy + 5.5, 1);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      drawCircle(gex - 0.7, dy + 4.5, 0.8);
      ctx.fill();
    }
  }
  // Fem: eyelash flicks
  if (ga.gender === 'fem') {
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    const ps = gs.panicked ? panicShake : 0;
    for (const gex of [x + 7 + ps, x + gs.w - 9 + ps]) {
      ctx.beginPath();
      ctx.moveTo(gex + 3, dy + 3);
      ctx.lineTo(gex + 4.5, dy + 1.5);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  }

  // Mouth — panicked = open scream, normal = happy
  ctx.strokeStyle = ga.gender === 'fem' ? '#c0392b' : '#5d4037';
  ctx.lineWidth = 1;
  if (gs.panicked) {
    ctx.fillStyle = ga.gender === 'fem' ? '#c0392b' : '#5d4037';
    drawEllipse(x + gs.w / 2 + panicShake, dy + 9, 2.5, 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(x + gs.w / 2, dy + 8, 2.5, 0.1, Math.PI - 0.1);
    ctx.stroke();
    // Fem: subtle lip color
    if (ga.gender === 'fem') {
      ctx.fillStyle = 'rgba(192,57,43,0.2)';
      drawEllipse(x + gs.w / 2, dy + 9, 2.5, 1.5);
      ctx.fill();
    }
  }

  // Coffee cup in hand (not when panicked — dropped it!)
  if (!gs.panicked) {
    // Cup contour
    ctx.fillStyle = '#90a4ae';
    drawRoundRect(x + gs.w - 2, dy + 15, 7, 8, 3);
    ctx.fill();
    ctx.fillStyle = '#fff';
    drawRoundRect(x + gs.w - 1, dy + 16, 5, 6, 2);
    ctx.fill();
    ctx.fillStyle = '#8d6e63';
    drawRoundRect(x + gs.w, dy + 17, 3, 4, 1);
    ctx.fill();
  }

  // "MENTOR ME" indicator when player is nearby
  if (!gs.panicked && !gs.spent) {
    const p1Dist = player ? Math.abs(player.x - gs.x) + Math.abs(player.y - gs.y) : 999;
    const p2Dist = player2 ? Math.abs(player2.x - gs.x) + Math.abs(player2.y - gs.y) : 999;
    if (Math.min(p1Dist, p2Dist) < TILE * 3 && !gs.mentee) {
      ctx.fillStyle = 'rgba(102,187,106,0.7)';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      const arrowBob = Math.sin(levelTimer * 0.15) * 3;
      ctx.fillText('\u25BC MENTOR' + (gs.gsLabel ? ' (' + gs.gsLabel + ')' : ''), x + gs.w / 2, dy - 8 + arrowBob);
      ctx.textAlign = 'left';
    }
  } else {
    // Panic sweat drops
    ctx.fillStyle = 'rgba(100,181,246,0.7)';
    const sweatBob = Math.sin(levelTimer * 0.3) * 2;
    drawCircle(x + gs.w + 2 + panicShake, dy + 2 + sweatBob, 1.5);
    ctx.fill();
    drawCircle(x - 2 + panicShake, dy + 4 + sweatBob, 1);
    ctx.fill();
  }

  // Shoes contour
  ctx.fillStyle = '#2a1a10';
  drawRoundRect(x + 1 + panicShake, dy + gs.h - 6, 9, 6, 3);
  ctx.fill();
  drawRoundRect(x + gs.w - 10 + panicShake, dy + gs.h - 6, 9, 6, 3);
  ctx.fill();
  // Shoes
  ctx.fillStyle = '#5d4037';
  drawRoundRect(x + 2 + panicShake, dy + gs.h - 5, 7, 4, 2);
  ctx.fill();
  drawRoundRect(x + gs.w - 9 + panicShake, dy + gs.h - 5, 7, 4, 2);
  ctx.fill();

  ctx.restore();
}

// ============================================================
// CUTE COLLECTIBLE DRAWING
// ============================================================
function drawCollectible(type, x, y, w, h) {
  const glow = 0.3 + Math.sin(levelTimer * 0.1) * 0.15;

  // Anime sparkle ring around all collectibles
  const cx0 = x + w / 2, cy0 = y + h / 2;
  for (let i = 0; i < 3; i++) {
    const angle = levelTimer * 0.06 + i * Math.PI * 2 / 3;
    const dist = 14 + Math.sin(levelTimer * 0.1 + i) * 2;
    const sx = cx0 + Math.cos(angle) * dist;
    const sy = cy0 + Math.sin(angle) * (dist * 0.6);
    const sparkAlpha = 0.5 + Math.sin(levelTimer * 0.12 + i * 2) * 0.3;
    ctx.fillStyle = `rgba(255,255,230,${sparkAlpha})`;
    drawStar(sx, sy, 4, 2.5, 1);
    ctx.fill();
  }

  switch (type) {
    case 'publication': {
      // Glowing paper/scroll with contour
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8 * glow * 2;

      // Paper contour
      ctx.fillStyle = '#90a4ae';
      drawRoundRect(x + 2, y, w - 4, h, 4);
      ctx.fill();
      // Paper fill
      const paperGrad = ctx.createLinearGradient(x + 3, y + 1, x + w - 3, y + h - 1);
      paperGrad.addColorStop(0, '#ffffff');
      paperGrad.addColorStop(1, '#eceff1');
      ctx.fillStyle = paperGrad;
      drawRoundRect(x + 3, y + 1, w - 6, h - 2, 3);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Corner fold
      ctx.fillStyle = '#cfd8dc';
      ctx.beginPath();
      ctx.moveTo(x + w - 7, y + 1);
      ctx.lineTo(x + w - 3, y + 5);
      ctx.lineTo(x + w - 7, y + 5);
      ctx.closePath();
      ctx.fill();

      // Lines of text
      ctx.fillStyle = '#78909c';
      for (let i = 0; i < 3; i++) {
        drawRoundRect(x + 6, y + 5 + i * 4, w - 12 - (i === 2 ? 4 : 0), 2, 1);
        ctx.fill();
      }

      // Star on paper with contour
      ctx.fillStyle = '#f57f17';
      drawStar(x + w / 2, y + h - 5, 4, 5, 2.5);
      ctx.fill();
      ctx.fillStyle = '#ffd54f';
      drawStar(x + w / 2, y + h - 5, 4, 4, 2);
      ctx.fill();
      // Star highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      drawStar(x + w / 2 - 0.5, y + h - 5.5, 4, 2, 1);
      ctx.fill();
      break;
    }

    case 'grant': {
      // Shiny money bag with contour
      ctx.shadowColor = '#ffd54f';
      ctx.shadowBlur = 10 * glow * 2;

      // Bag contour
      ctx.fillStyle = '#1b5e20';
      drawRoundRect(x + 2, y + 3, w - 4, h - 3, 7);
      ctx.fill();
      // Bag fill
      const grad = ctx.createRadialGradient(x + w / 2 - 2, y + h / 2 - 2, 2, x + w / 2, y + h / 2, 12);
      grad.addColorStop(0, '#81c784');
      grad.addColorStop(0.5, '#66bb6a');
      grad.addColorStop(1, '#2e7d32');
      ctx.fillStyle = grad;
      drawRoundRect(x + 3, y + 4, w - 6, h - 5, 6);
      ctx.fill();
      // Bag highlight
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      drawRoundRect(x + 5, y + 5, w - 12, 5, 4);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Bag top with contour
      ctx.fillStyle = '#1b5e20';
      drawEllipse(x + w / 2, y + 5, 7, 4);
      ctx.fill();
      ctx.fillStyle = '#43a047';
      drawEllipse(x + w / 2, y + 5, 6, 3);
      ctx.fill();

      // Dollar sign with outline
      ctx.fillStyle = '#1b5e20';
      ctx.font = 'bold 15px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('$', x + w / 2 + 0.5, y + h - 3.5);
      ctx.fillStyle = '#ffd54f';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('$', x + w / 2, y + h - 4);
      ctx.textAlign = 'left';

      // Multiple sparkles
      ctx.fillStyle = '#fff';
      drawStar(x + w - 4, y + 3, 4, 3, 1.5);
      ctx.fill();
      drawStar(x + 3, y + h - 4, 4, 2, 1);
      ctx.fill();
      break;
    }

    case 'citation': {
      // Glowing star with contour
      ctx.shadowColor = '#4fc3f7';
      ctx.shadowBlur = 12 * glow * 2;

      // Star contour
      ctx.fillStyle = '#01579b';
      drawStar(x + w / 2, y + h / 2, 5, 11.5, 5.5);
      ctx.fill();

      const grad = ctx.createRadialGradient(x + w / 2, y + h / 2, 2, x + w / 2, y + h / 2, 10);
      grad.addColorStop(0, '#e1f5fe');
      grad.addColorStop(0.5, '#4fc3f7');
      grad.addColorStop(1, '#0277bd');
      ctx.fillStyle = grad;
      drawStar(x + w / 2, y + h / 2, 5, 10, 5);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Inner star with glow
      ctx.fillStyle = '#e1f5fe';
      drawStar(x + w / 2, y + h / 2, 5, 5, 2.5);
      ctx.fill();
      ctx.fillStyle = '#fff';
      drawStar(x + w / 2, y + h / 2, 5, 3, 1.5);
      ctx.fill();
      break;
    }

    case 'coffee': {
      // Cute coffee cup with contour
      ctx.shadowColor = '#ff6f00';
      ctx.shadowBlur = 8 * glow * 2;

      // Cup contour
      ctx.fillStyle = '#3e2723';
      drawRoundRect(x + 3, y + 5, w - 6, h - 6, 5);
      ctx.fill();
      // Cup body
      const cupGrad = ctx.createLinearGradient(x + 4, y + 6, x + 4, y + h);
      cupGrad.addColorStop(0, '#a1887f');
      cupGrad.addColorStop(0.3, '#8d6e63');
      cupGrad.addColorStop(1, '#5d4037');
      ctx.fillStyle = cupGrad;
      drawRoundRect(x + 4, y + 6, w - 8, h - 8, 4);
      ctx.fill();
      // Cup highlight
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      drawRoundRect(x + 5, y + 7, 4, h - 12, 3);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Cup rim with contour
      ctx.fillStyle = '#795548';
      drawRoundRect(x + 2, y + 4, w - 4, 6, 3);
      ctx.fill();
      ctx.fillStyle = '#d7ccc8';
      drawRoundRect(x + 3, y + 5, w - 6, 4, 2);
      ctx.fill();
      // Rim highlight
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      drawRoundRect(x + 4, y + 5.5, w - 10, 1.5, 1);
      ctx.fill();

      // Coffee inside
      ctx.fillStyle = '#3e2723';
      drawRoundRect(x + 5, y + 7, w - 10, 4, 2);
      ctx.fill();
      // Coffee surface highlight
      ctx.fillStyle = 'rgba(255,200,150,0.15)';
      drawEllipse(x + w / 2, y + 8.5, 4, 1.5);
      ctx.fill();

      // Handle with contour
      ctx.strokeStyle = '#3e2723';
      ctx.lineWidth = 3.5;
      ctx.beginPath();
      ctx.arc(x + w - 4, y + 14, 4, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
      ctx.strokeStyle = '#8d6e63';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x + w - 4, y + 14, 4, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();

      // Steam (animated, smoother)
      for (let i = 0; i < 3; i++) {
        const sx2 = x + 8 + i * 4;
        const t = levelTimer * 0.08 + i * 1.2;
        // Steam glow
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sx2, y + 4);
        ctx.quadraticCurveTo(sx2 + Math.sin(t) * 3, y - 2, sx2 + Math.sin(t + 1) * 2, y - 6);
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sx2, y + 4);
        ctx.quadraticCurveTo(sx2 + Math.sin(t) * 3, y - 2, sx2 + Math.sin(t + 1) * 2, y - 6);
        ctx.stroke();
      }

      // Heart on cup with outline
      ctx.fillStyle = '#b71c1c';
      ctx.font = '9px serif';
      ctx.fillText('\u2665', x + 8.5, y + 18.5);
      ctx.fillStyle = '#ef5350';
      ctx.font = '8px serif';
      ctx.fillText('\u2665', x + 9, y + 18);
      break;
    }

    case 'heart': {
      // Extra life heart
      ctx.shadowColor = '#ef5350';
      ctx.shadowBlur = 12 * glow * 2;

      const pulse = 1 + Math.sin(levelTimer * 0.15) * 0.1;
      const cx = x + w / 2;
      const cy = y + h / 2 + 2;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(pulse, pulse);

      // Heart contour
      ctx.fillStyle = '#7f0000';
      ctx.beginPath();
      ctx.moveTo(0, 6);
      ctx.bezierCurveTo(-2, 3, -9, -2, -9, -5.5);
      ctx.bezierCurveTo(-9, -10, -5, -11.5, 0, -8);
      ctx.bezierCurveTo(5, -11.5, 9, -10, 9, -5.5);
      ctx.bezierCurveTo(9, -2, 2, 3, 0, 6);
      ctx.fill();
      // Heart shape
      const heartGrad = ctx.createRadialGradient(0, -2, 2, 0, 0, 12);
      heartGrad.addColorStop(0, '#ff6b81');
      heartGrad.addColorStop(1, '#c0392b');
      ctx.fillStyle = heartGrad;
      ctx.beginPath();
      ctx.moveTo(0, 4);
      ctx.bezierCurveTo(-2, 2, -8, -2, -8, -5);
      ctx.bezierCurveTo(-8, -9, -4, -10, 0, -7);
      ctx.bezierCurveTo(4, -10, 8, -9, 8, -5);
      ctx.bezierCurveTo(8, -2, 2, 2, 0, 4);
      ctx.fill();

      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      drawCircle(-3, -6, 2);
      ctx.fill();

      ctx.restore();
      ctx.shadowBlur = 0;

      // +1 UP label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 7px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('+1UP', cx, y + h + 2);
      ctx.textAlign = 'left';
      break;
    }

    case 'flame': {
      // Fire flower power-up (new contribution flame)
      ctx.shadowColor = '#ff5722';
      ctx.shadowBlur = 12 * glow * 2;

      const flameX = x + w / 2;
      const flameY = y + h / 2;
      const flicker = Math.sin(levelTimer * 0.2) * 2;

      // Flame base contour (pot/pedestal)
      ctx.fillStyle = '#3e2723';
      drawRoundRect(x + 5, y + h - 9, w - 10, 10, 4);
      ctx.fill();
      ctx.fillStyle = '#795548';
      drawRoundRect(x + 6, y + h - 8, w - 12, 8, 3);
      ctx.fill();
      ctx.fillStyle = '#ffd54f';
      drawRoundRect(x + 7, y + h - 9, w - 14, 3, 2);
      ctx.fill();

      // Flame contour
      ctx.fillStyle = '#bf360c';
      ctx.beginPath();
      ctx.moveTo(flameX, y + 1 + flicker);
      ctx.bezierCurveTo(flameX - 8, y + 5, flameX - 10, y + h - 11, flameX - 6, y + h - 9);
      ctx.lineTo(flameX + 6, y + h - 9);
      ctx.bezierCurveTo(flameX + 10, y + h - 11, flameX + 8, y + 5, flameX, y + 1 + flicker);
      ctx.fill();

      // Flame body
      const fGrad = ctx.createLinearGradient(flameX, y + 2, flameX, y + h - 6);
      fGrad.addColorStop(0, '#ff5722');
      fGrad.addColorStop(0.4, '#ff9800');
      fGrad.addColorStop(0.8, '#ffeb3b');
      fGrad.addColorStop(1, '#fff9c4');
      ctx.fillStyle = fGrad;
      ctx.beginPath();
      ctx.moveTo(flameX, y + 2 + flicker);
      ctx.bezierCurveTo(flameX - 7, y + 6, flameX - 9, y + h - 10, flameX - 5, y + h - 8);
      ctx.lineTo(flameX + 5, y + h - 8);
      ctx.bezierCurveTo(flameX + 9, y + h - 10, flameX + 7, y + 6, flameX, y + 2 + flicker);
      ctx.fill();

      // Inner flame
      ctx.fillStyle = '#fff9c4';
      ctx.beginPath();
      ctx.moveTo(flameX, y + 8 + flicker);
      ctx.bezierCurveTo(flameX - 3, y + 12, flameX - 3, y + h - 12, flameX, y + h - 10);
      ctx.bezierCurveTo(flameX + 3, y + h - 12, flameX + 3, y + 12, flameX, y + 8 + flicker);
      ctx.fill();

      ctx.shadowBlur = 0;
      break;
    }

    case 'potion': {
      // Magic potion bottle
      ctx.shadowColor = '#9c27b0';
      ctx.shadowBlur = 10 * glow * 2;

      const potX = x + w / 2;

      // Bottle body contour
      ctx.fillStyle = '#4a148c';
      drawRoundRect(x + 4, y + 7, w - 8, h - 8, 6);
      ctx.fill();
      // Bottle body
      const potGrad = ctx.createLinearGradient(x + 5, y + 6, x + w - 5, y + h);
      potGrad.addColorStop(0, '#e1bee7');
      potGrad.addColorStop(0.3, '#ce93d8');
      potGrad.addColorStop(0.7, '#9c27b0');
      potGrad.addColorStop(1, '#6a1b9a');
      ctx.fillStyle = potGrad;
      drawRoundRect(x + 5, y + 8, w - 10, h - 10, 5);
      ctx.fill();

      // Bottle neck contour
      ctx.fillStyle = '#4a148c';
      drawRoundRect(potX - 4, y + 1, 8, 9, 3);
      ctx.fill();
      // Bottle neck
      ctx.fillStyle = '#7b1fa2';
      drawRoundRect(potX - 3, y + 2, 6, 8, 2);
      ctx.fill();

      // Cork contour
      ctx.fillStyle = '#5d4037';
      drawRoundRect(potX - 5, y - 1, 10, 5, 3);
      ctx.fill();
      // Cork
      ctx.fillStyle = '#a1887f';
      drawRoundRect(potX - 4, y, 8, 4, 2);
      ctx.fill();

      // Liquid shine
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      drawRoundRect(x + 7, y + 10, 4, h - 16, 3);
      ctx.fill();

      // Bubbles
      const bubT = levelTimer * 0.1;
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      drawCircle(potX - 2, y + h - 8 + Math.sin(bubT) * 3, 1.5);
      ctx.fill();
      drawCircle(potX + 2, y + h - 6 + Math.sin(bubT + 1) * 2, 1);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Magic sparkles around bottle
      ctx.fillStyle = '#e1bee7';
      drawStar(x + 3, y + 5, 4, 2, 1);
      ctx.fill();
      drawStar(x + w - 3, y + h - 5, 4, 2, 1);
      ctx.fill();

      // Label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 6px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('POT', potX, y + h + 2);
      ctx.textAlign = 'left';
      break;
    }
  }
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
}

// ============================================================
// BACKGROUND DRAWING
// ============================================================
let clouds = [];
let bgDecor = [];
let sakuraPetals = [];

function initBackgroundDecor() {
  clouds = [];
  bgDecor = [];
  sakuraPetals = [];
  for (let i = 0; i < 15; i++) {
    clouds.push({
      x: Math.random() * 3000,
      y: 30 + Math.random() * 120,
      w: 60 + Math.random() * 80,
      h: 25 + Math.random() * 20,
      speed: 0.15 + Math.random() * 0.25,
      layer: Math.random() < 0.5 ? 0 : 1,
    });
  }
  // Floating sakura/sparkle petals
  for (let i = 0; i < 25; i++) {
    sakuraPetals.push({
      x: Math.random() * GAME_W,
      y: Math.random() * GAME_H,
      vx: 0.2 + Math.random() * 0.5,
      vy: 0.3 + Math.random() * 0.4,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.08,
      size: 2 + Math.random() * 3,
      wobble: Math.random() * Math.PI * 2,
      type: Math.random() < 0.6 ? 'petal' : 'sparkle',
    });
  }
  // Background flowers/decorations
  for (let i = 0; i < 40; i++) {
    bgDecor.push({
      x: Math.random() * 4000,
      type: Math.floor(Math.random() * 3),
      colorIdx: Math.floor(Math.random() * 4),
      size: 0.6 + Math.random() * 0.6,
    });
  }
}

function drawSakuraPetal(px, py, size, rot) {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(rot);
  ctx.fillStyle = 'rgba(255,183,197,0.7)';
  ctx.beginPath();
  ctx.moveTo(0, -size);
  ctx.bezierCurveTo(size * 0.8, -size * 0.5, size * 0.8, size * 0.5, 0, size * 0.3);
  ctx.bezierCurveTo(-size * 0.8, size * 0.5, -size * 0.8, -size * 0.5, 0, -size);
  ctx.fill();
  // Subtle center line
  ctx.strokeStyle = 'rgba(255,130,160,0.3)';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.8);
  ctx.lineTo(0, size * 0.2);
  ctx.stroke();
  ctx.restore();
}

function updateAndDrawPetals() {
  for (const p of sakuraPetals) {
    p.wobble += 0.03;
    p.x += p.vx + Math.sin(p.wobble) * 0.5;
    p.y += p.vy;
    p.rot += p.rotSpeed;
    // Wrap around screen
    if (p.x > GAME_W + 10) p.x = -10;
    if (p.y > GAME_H + 10) { p.y = -10; p.x = Math.random() * GAME_W; }

    if (p.type === 'petal') {
      drawSakuraPetal(p.x, p.y, p.size, p.rot);
    } else {
      // Anime sparkle (4-pointed star)
      const sparkAlpha = 0.4 + Math.sin(levelTimer * 0.1 + p.wobble) * 0.3;
      ctx.fillStyle = `rgba(255,255,230,${sparkAlpha})`;
      drawStar(p.x, p.y, 4, p.size, p.size * 0.3);
      ctx.fill();
    }
  }
}

function drawBackground(ci) {
  const theme = THEMES[ci];

  // Gradient sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  skyGrad.addColorStop(0, theme.skyTop);
  skyGrad.addColorStop(1, theme.skyBot);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Sun/Moon (anime style with lens flare / glow)
  if (ci < 5) {
    // Sun with anime-style rays
    const sunX = 650, sunY = 60;
    // Outer glow
    const outerGlow = ctx.createRadialGradient(sunX, sunY, 20, sunX, sunY, 120);
    outerGlow.addColorStop(0, 'rgba(255,245,157,0.25)');
    outerGlow.addColorStop(1, 'rgba(255,241,118,0)');
    ctx.fillStyle = outerGlow;
    drawCircle(sunX, sunY, 120);
    ctx.fill();
    // Soft rays (anime light streaks)
    ctx.globalAlpha = 0.08;
    for (let i = 0; i < 8; i++) {
      const angle = i * Math.PI / 4 + levelTimer * 0.003;
      ctx.fillStyle = '#fff9c4';
      ctx.beginPath();
      ctx.moveTo(sunX, sunY);
      ctx.lineTo(sunX + Math.cos(angle - 0.05) * 200, sunY + Math.sin(angle - 0.05) * 200);
      ctx.lineTo(sunX + Math.cos(angle + 0.05) * 200, sunY + Math.sin(angle + 0.05) * 200);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Sun body
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 40);
    sunGrad.addColorStop(0, 'rgba(255,255,240,1)');
    sunGrad.addColorStop(0.3, 'rgba(255,245,157,0.8)');
    sunGrad.addColorStop(0.7, 'rgba(255,241,118,0.3)');
    sunGrad.addColorStop(1, 'rgba(255,241,118,0)');
    ctx.fillStyle = sunGrad;
    drawCircle(sunX, sunY, 40);
    ctx.fill();
    ctx.fillStyle = '#fffde7';
    drawCircle(sunX, sunY, 15);
    ctx.fill();
    // Lens flare dots
    ctx.fillStyle = 'rgba(255,255,200,0.15)';
    drawCircle(sunX - 60, sunY + 40, 12);
    ctx.fill();
    drawCircle(sunX - 100, sunY + 70, 6);
    ctx.fill();
  } else {
    // Moon with anime crescent glow
    const moonX = 650, moonY = 60;
    // Outer aura
    const moonAura = ctx.createRadialGradient(moonX, moonY, 10, moonX, moonY, 80);
    moonAura.addColorStop(0, 'rgba(200,180,255,0.25)');
    moonAura.addColorStop(1, 'rgba(100,80,180,0)');
    ctx.fillStyle = moonAura;
    drawCircle(moonX, moonY, 80);
    ctx.fill();
    // Moon body
    const moonGrad = ctx.createRadialGradient(moonX - 5, moonY - 5, 2, moonX, moonY, 25);
    moonGrad.addColorStop(0, 'rgba(255,255,255,0.98)');
    moonGrad.addColorStop(0.7, 'rgba(220,210,255,0.8)');
    moonGrad.addColorStop(1, 'rgba(180,160,230,0.3)');
    ctx.fillStyle = moonGrad;
    drawCircle(moonX, moonY, 25);
    ctx.fill();
    // Anime-style twinkling stars
    for (let i = 0; i < 40; i++) {
      const twinkle = 0.2 + Math.sin(levelTimer * 0.06 + i * 1.7) * 0.4;
      if (twinkle < 0.1) continue;
      ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
      const sx2 = (i * 137 + 20) % GAME_W;
      const sy2 = (i * 73 + 10) % 160;
      if (i % 5 === 0) {
        // 4-pointed star sparkle
        drawStar(sx2, sy2, 4, 2 + (i % 3), 0.8);
        ctx.fill();
      } else {
        drawCircle(sx2, sy2, 0.8 + (i % 3) * 0.4);
        ctx.fill();
      }
    }
  }

  // Clouds (parallax)
  for (const c of clouds) {
    c.x += c.speed * 0.3;
    if (c.x > 4000) c.x = -c.w;

    const sx = c.x - camera.x * (c.layer === 0 ? 0.05 : 0.1);
    const screenX = ((sx % (GAME_W + c.w + 100)) + GAME_W + c.w + 100) % (GAME_W + c.w + 100) - c.w - 50;

    // Anime-style puffy cloud with soft gradient
    const cGrad = ctx.createRadialGradient(screenX + c.w * 0.5, c.y - 2, c.w * 0.1, screenX + c.w * 0.5, c.y + 5, c.w * 0.55);
    cGrad.addColorStop(0, 'rgba(255,255,255,' + (c.layer === 0 ? '0.95' : '0.7') + ')');
    cGrad.addColorStop(1, theme.cloudColor);
    ctx.fillStyle = cGrad;
    // Multi-blob puffy shape
    drawEllipse(screenX + c.w * 0.5, c.y, c.w * 0.5, c.h * 0.48);
    ctx.fill();
    drawEllipse(screenX + c.w * 0.25, c.y + 3, c.w * 0.32, c.h * 0.38);
    ctx.fill();
    drawEllipse(screenX + c.w * 0.75, c.y + 2, c.w * 0.33, c.h * 0.4);
    ctx.fill();
    drawEllipse(screenX + c.w * 0.15, c.y + 1, c.w * 0.22, c.h * 0.3);
    ctx.fill();
    drawEllipse(screenX + c.w * 0.85, c.y + 1, c.w * 0.2, c.h * 0.28);
    ctx.fill();
    // Soft highlight on top
    ctx.fillStyle = 'rgba(255,255,255,' + (c.layer === 0 ? '0.3' : '0.15') + ')';
    drawEllipse(screenX + c.w * 0.4, c.y - c.h * 0.15, c.w * 0.3, c.h * 0.2);
    ctx.fill();
  }

  // Academic campus skyline (parallax layers)
  for (let layer = 2; layer >= 0; layer--) {
    const parallax = 0.08 + layer * 0.06;
    const offset = -camera.x * parallax;
    const hillColor = [theme.bgHill3, theme.bgHill2, theme.bgHill1][layer];
    const baseY = GAME_H - 40 - layer * 40;

    // Ground strip
    ctx.fillStyle = hillColor;
    ctx.fillRect(0, baseY + 10, GAME_W, GAME_H - baseY);

    // Campus buildings on each layer
    if (layer === 2) {
      // Farthest layer: large silhouette buildings (library, admin tower)
      const bldgColor = hillColor;
      for (let i = 0; i < 8; i++) {
        const bwx = i * 200 + 30;
        const bsx = ((bwx + offset) % (GAME_W + 300)) - 150;
        const seed = (i * 7 + 3) % 5;
        ctx.fillStyle = bldgColor;
        if (seed < 2) {
          // Tall library tower
          const bh = 55 + (i % 3) * 15;
          ctx.fillRect(bsx, baseY + 10 - bh, 30, bh);
          // Dome/cap
          ctx.beginPath();
          ctx.arc(bsx + 15, baseY + 10 - bh, 15, Math.PI, 0);
          ctx.fill();
        } else if (seed < 4) {
          // Wide lecture hall
          const bh = 30 + (i % 3) * 10;
          ctx.fillRect(bsx, baseY + 10 - bh, 50, bh);
          // Triangular roof
          ctx.beginPath();
          ctx.moveTo(bsx - 3, baseY + 10 - bh);
          ctx.lineTo(bsx + 25, baseY + 10 - bh - 15);
          ctx.lineTo(bsx + 53, baseY + 10 - bh);
          ctx.closePath();
          ctx.fill();
        } else {
          // Clock tower
          const bh = 70 + (i % 2) * 20;
          ctx.fillRect(bsx + 5, baseY + 10 - bh, 16, bh);
          ctx.fillRect(bsx - 2, baseY + 10 - 25, 30, 25);
          // Clock face
          ctx.fillStyle = 'rgba(255,255,200,0.15)';
          drawCircle(bsx + 13, baseY + 10 - bh + 10, 6);
          ctx.fill();
        }
      }
    } else if (layer === 1) {
      // Mid layer: medium buildings with windows
      for (let i = 0; i < 10; i++) {
        const bwx = i * 160 + 50;
        const bsx = ((bwx + offset) % (GAME_W + 250)) - 120;
        const seed = (i * 11 + 5) % 4;
        ctx.fillStyle = hillColor;
        if (seed < 2) {
          // Office building
          const bh = 40 + (i % 4) * 10;
          const bw = 28 + (i % 3) * 8;
          ctx.fillRect(bsx, baseY + 10 - bh, bw, bh);
          // Windows
          ctx.fillStyle = 'rgba(255,255,200,0.15)';
          for (let wy = 0; wy < 3; wy++) {
            for (let wx = 0; wx < 3; wx++) {
              ctx.fillRect(bsx + 4 + wx * 9, baseY + 10 - bh + 6 + wy * 12, 5, 6);
            }
          }
        } else if (seed === 2) {
          // Greenhouse / lab with glass roof
          const bh = 30;
          ctx.fillRect(bsx, baseY + 10 - bh, 35, bh);
          ctx.fillStyle = 'rgba(200,255,200,0.1)';
          ctx.beginPath();
          ctx.moveTo(bsx, baseY + 10 - bh);
          ctx.quadraticCurveTo(bsx + 17, baseY + 10 - bh - 18, bsx + 35, baseY + 10 - bh);
          ctx.fill();
        } else {
          // Bookstore / small campus building
          const bh = 25;
          ctx.fillRect(bsx, baseY + 10 - bh, 25, bh);
          // Awning
          ctx.fillStyle = 'rgba(255,200,150,0.12)';
          ctx.fillRect(bsx - 2, baseY + 10 - bh, 29, 4);
        }
      }
    } else {
      // Closest layer: detailed foreground elements
      for (let i = 0; i < 14; i++) {
        const bwx = i * 120 + 20;
        const bsx = ((bwx + offset) % (GAME_W + 200)) - 100;
        const seed = (i * 13 + 7) % 6;
        if (seed < 2) {
          // Campus tree with depth and contour
          // Trunk contour
          ctx.fillStyle = darkenColor(theme.treeTrunk, 30);
          ctx.fillRect(bsx + 5, baseY - 6, 6, 17);
          ctx.fillStyle = theme.treeTrunk;
          ctx.fillRect(bsx + 6, baseY - 5, 4, 15);
          // Trunk bark detail
          ctx.fillStyle = 'rgba(0,0,0,0.08)';
          ctx.fillRect(bsx + 7, baseY - 3, 1, 10);
          // Foliage contour (behind)
          ctx.fillStyle = darkenColor(theme.treeColor, 40);
          drawCircle(bsx + 8, baseY - 10, 11.5);
          ctx.fill();
          drawCircle(bsx + 3, baseY - 5, 8.5);
          ctx.fill();
          drawCircle(bsx + 14, baseY - 6, 9.5);
          ctx.fill();
          // Foliage
          ctx.fillStyle = theme.treeColor;
          drawCircle(bsx + 8, baseY - 10, 10);
          ctx.fill();
          drawCircle(bsx + 3, baseY - 5, 7);
          ctx.fill();
          drawCircle(bsx + 14, baseY - 6, 8);
          ctx.fill();
          // Foliage highlight
          ctx.fillStyle = 'rgba(255,255,255,0.06)';
          drawCircle(bsx + 6, baseY - 13, 5);
          ctx.fill();
        } else if (seed === 2) {
          // Lamp post
          ctx.fillStyle = hillColor;
          ctx.fillRect(bsx + 7, baseY - 10, 2, 20);
          ctx.fillStyle = 'rgba(255,255,180,0.2)';
          drawCircle(bsx + 8, baseY - 13, 4);
          ctx.fill();
        } else if (seed === 3) {
          // Bench
          ctx.fillStyle = hillColor;
          ctx.fillRect(bsx, baseY + 5, 20, 3);
          ctx.fillRect(bsx + 2, baseY + 5, 2, 6);
          ctx.fillRect(bsx + 16, baseY + 5, 2, 6);
        } else if (seed === 4) {
          // Bike rack
          ctx.strokeStyle = hillColor;
          ctx.lineWidth = 1;
          for (let b = 0; b < 3; b++) {
            ctx.beginPath();
            ctx.arc(bsx + 5 + b * 7, baseY + 5, 4, 0, Math.PI * 2);
            ctx.stroke();
          }
        } else {
          // Campus sign / bulletin board
          ctx.fillStyle = hillColor;
          ctx.fillRect(bsx + 3, baseY - 5, 2, 14);
          ctx.fillRect(bsx + 15, baseY - 5, 2, 14);
          ctx.fillRect(bsx, baseY - 8, 20, 8);
        }
      }
    }
  }
}

// ============================================================
// TILE DRAWING
// ============================================================
function drawTiles() {
  const ci = currentLevel;
  const theme = THEMES[ci];

  const startTX = Math.floor(camera.x / TILE);
  const endTX = startTX + Math.ceil(GAME_W / TILE) + 1;
  const startTY = Math.floor(camera.y / TILE);
  const endTY = startTY + Math.ceil(GAME_H / TILE) + 1;

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const tile = getTile(tx, ty);
      const sx = tx * TILE - camera.x;
      const sy = ty * TILE - camera.y;

      if (tile === 1) {
        const isTop = getTile(tx, ty - 1) !== 1;
        const isLeftEmpty = getTile(tx - 1, ty) !== 1;
        const isRightEmpty = getTile(tx + 1, ty) !== 1;
        const isBotEmpty = getTile(tx, ty + 1) !== 1;

        if (isTop) {
          // Grass top with gradient
          const grassGrad = ctx.createLinearGradient(sx, sy, sx, sy + TILE);
          grassGrad.addColorStop(0, theme.grass);
          grassGrad.addColorStop(0.25, theme.grassDark);
          grassGrad.addColorStop(0.5, theme.dirt);
          grassGrad.addColorStop(1, theme.dirtDark);
          ctx.fillStyle = grassGrad;
          drawRoundRect(sx - 0.5, sy, TILE + 1, TILE, 0);
          ctx.fill();

          // Grass contour line (top edge)
          ctx.strokeStyle = darkenColor(theme.grassDark, 40);
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(sx - 0.5, sy + 1);
          // Wavy grass edge contour
          for (let gx = 0; gx <= TILE; gx += 4) {
            const gy = sy + 1 + Math.sin((tx * TILE + gx) * 0.15) * 1.5;
            ctx.lineTo(sx + gx, gy);
          }
          ctx.stroke();

          // Edge contour lines (sides)
          if (isLeftEmpty) {
            ctx.strokeStyle = darkenColor(theme.dirt, 30);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sx + 0.5, sy);
            ctx.lineTo(sx + 0.5, sy + TILE);
            ctx.stroke();
          }
          if (isRightEmpty) {
            ctx.strokeStyle = darkenColor(theme.dirt, 30);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sx + TILE - 0.5, sy);
            ctx.lineTo(sx + TILE - 0.5, sy + TILE);
            ctx.stroke();
          }

          // Lush anime grass blades (more, varied)
          for (let i = 0; i < 7; i++) {
            const gx = sx + 1 + i * 4.5 + Math.sin(tx * 3 + i) * 1.5;
            const gh = 3 + Math.sin(tx * 2 + i * 1.5) * 2.5 + (i % 2) * 1.5;
            // Darker blade behind (with contour)
            ctx.fillStyle = darkenColor(theme.grassDark, 30);
            ctx.beginPath();
            ctx.moveTo(gx - 1, sy);
            ctx.quadraticCurveTo(gx + 0.5 + Math.sin(levelTimer * 0.02 + i) * 0.8, sy - gh * 0.6, gx + 1, sy - gh - 2);
            ctx.lineTo(gx + 3, sy);
            ctx.fill();
            ctx.fillStyle = theme.grassDark;
            ctx.beginPath();
            ctx.moveTo(gx - 0.5, sy);
            ctx.quadraticCurveTo(gx + 0.5 + Math.sin(levelTimer * 0.02 + i) * 0.8, sy - gh * 0.6, gx + 1, sy - gh - 1);
            ctx.lineTo(gx + 2.5, sy);
            ctx.fill();
            // Lighter blade in front
            ctx.fillStyle = theme.grass;
            ctx.beginPath();
            ctx.moveTo(gx, sy);
            ctx.quadraticCurveTo(gx + 1 + Math.sin(levelTimer * 0.02 + i) * 0.5, sy - gh * 0.6, gx + 1.5, sy - gh);
            ctx.lineTo(gx + 3, sy);
            ctx.fill();
          }
          // Highlight on grass top (wider, softer)
          const topHighlight = ctx.createLinearGradient(sx, sy, sx, sy + 5);
          topHighlight.addColorStop(0, 'rgba(255,255,255,0.12)');
          topHighlight.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = topHighlight;
          ctx.fillRect(sx, sy, TILE, 5);

          // Dirt band detail
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          ctx.fillRect(sx, sy + TILE * 0.6, TILE, 2);

          // Anime-style flowers (more elaborate)
          if ((tx * 7 + ty * 13) % 9 === 0) {
            const flowerColor = theme.flowerColors[(tx * 3 + ty) % theme.flowerColors.length];
            const fx = sx + 10 + (tx % 3) * 5;
            const fy = sy - 3;
            // Stem with contour
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(fx + 2, fy + 5);
            ctx.quadraticCurveTo(fx + 1, fy + 2, fx + 2, fy);
            ctx.stroke();
            ctx.strokeStyle = '#4caf50';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(fx + 2, fy + 5);
            ctx.quadraticCurveTo(fx + 1, fy + 2, fx + 2, fy);
            ctx.stroke();
            // Small leaf
            ctx.fillStyle = '#2e7d32';
            ctx.beginPath();
            ctx.ellipse(fx + 4, fy + 3, 2.8, 1.5, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#66bb6a';
            ctx.beginPath();
            ctx.ellipse(fx + 4, fy + 3, 2, 1, 0.5, 0, Math.PI * 2);
            ctx.fill();
            // Petals (5 pointed flower) with contour
            for (let p = 0; p < 5; p++) {
              const pa = p * Math.PI * 2 / 5 - Math.PI / 2;
              const px2 = fx + 2 + Math.cos(pa) * 2.5;
              const py2 = fy - 1 + Math.sin(pa) * 2.5;
              ctx.fillStyle = darkenColor(flowerColor, 50);
              drawCircle(px2, py2, 2.5);
              ctx.fill();
              ctx.fillStyle = flowerColor;
              drawCircle(px2, py2, 2);
              ctx.fill();
            }
            // Center
            ctx.fillStyle = '#f57f17';
            drawCircle(fx + 2, fy - 1, 2.2);
            ctx.fill();
            ctx.fillStyle = '#fff9c4';
            drawCircle(fx + 2, fy - 1, 1.6);
            ctx.fill();
            // Tiny sparkle
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            drawCircle(fx + 1, fy - 2, 0.8);
            ctx.fill();
          }
        } else {
          // Underground dirt with richer texture
          const dirtGrad = ctx.createLinearGradient(sx, sy, sx, sy + TILE);
          dirtGrad.addColorStop(0, theme.dirt);
          dirtGrad.addColorStop(1, theme.dirtDark);
          ctx.fillStyle = dirtGrad;
          ctx.fillRect(sx, sy, TILE, TILE);

          // Edge contour lines
          if (isLeftEmpty) {
            ctx.strokeStyle = darkenColor(theme.dirtDark, 25);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sx + 0.5, sy);
            ctx.lineTo(sx + 0.5, sy + TILE);
            ctx.stroke();
            // Inner light edge
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.beginPath();
            ctx.moveTo(sx + 2, sy);
            ctx.lineTo(sx + 2, sy + TILE);
            ctx.stroke();
          }
          if (isRightEmpty) {
            ctx.strokeStyle = darkenColor(theme.dirtDark, 25);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sx + TILE - 0.5, sy);
            ctx.lineTo(sx + TILE - 0.5, sy + TILE);
            ctx.stroke();
          }
          if (isBotEmpty) {
            ctx.strokeStyle = darkenColor(theme.dirtDark, 25);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sx, sy + TILE - 0.5);
            ctx.lineTo(sx + TILE, sy + TILE - 0.5);
            ctx.stroke();
          }

          // Dirt texture (pebbles with contour)
          if ((tx + ty) % 3 === 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            drawCircle(sx + 8, sy + 12, 3.5);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            drawCircle(sx + 7.5, sy + 11, 2);
            ctx.fill();
          }
          if ((tx + ty) % 5 === 1) {
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            drawCircle(sx + 22, sy + 20, 2.5);
            ctx.fill();
          }
          // Cross-hatch dirt texture
          if ((tx + ty) % 4 === 0) {
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(sx + 4, sy + 4);
            ctx.lineTo(sx + 12, sy + 14);
            ctx.moveTo(sx + 18, sy + 8);
            ctx.lineTo(sx + 28, sy + 22);
            ctx.stroke();
          }
          // Subtle horizontal sediment line
          ctx.fillStyle = 'rgba(0,0,0,0.03)';
          ctx.fillRect(sx, sy + 15 + (tx % 3) * 4, TILE, 1);
        }
      } else if (tile === 2) {
        // Platform - wooden plank with contour and depth
        // Shadow underneath
        ctx.fillStyle = 'rgba(0,0,0,0.12)';
        drawRoundRect(sx, sy + 3, TILE, 10, 3);
        ctx.fill();

        // Contour outline
        ctx.fillStyle = darkenColor(theme.platform, 40);
        drawRoundRect(sx - 2, sy - 1, TILE + 4, 12, 5);
        ctx.fill();

        // Platform fill
        const platGrad = ctx.createLinearGradient(sx, sy, sx, sy + 10);
        platGrad.addColorStop(0, lightenColor(theme.platformTop, 10));
        platGrad.addColorStop(0.3, theme.platformTop);
        platGrad.addColorStop(1, theme.platform);
        ctx.fillStyle = platGrad;
        drawRoundRect(sx - 1, sy, TILE + 2, 10, 4);
        ctx.fill();

        // Top highlight line
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + 3, sy + 1.5);
        ctx.lineTo(sx + TILE - 3, sy + 1.5);
        ctx.stroke();

        // Wood grain (more detail)
        ctx.strokeStyle = 'rgba(0,0,0,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sx + 3, sy + 3);
        ctx.lineTo(sx + TILE - 3, sy + 3);
        ctx.moveTo(sx + 5, sy + 5.5);
        ctx.lineTo(sx + TILE - 5, sy + 5.5);
        ctx.moveTo(sx + 2, sy + 7.5);
        ctx.lineTo(sx + TILE - 2, sy + 7.5);
        ctx.stroke();

        // Nail/rivet details
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        drawCircle(sx + 4, sy + 5, 1.2);
        ctx.fill();
        drawCircle(sx + TILE - 4, sy + 5, 1.2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        drawCircle(sx + 3.7, sy + 4.5, 0.6);
        ctx.fill();
        drawCircle(sx + TILE - 4.3, sy + 4.5, 0.6);
        ctx.fill();

        // Bracket supports (with contour)
        ctx.fillStyle = darkenColor(theme.platform, 35);
        drawRoundRect(sx + 3, sy + 9, 5, 8, 1);
        ctx.fill();
        drawRoundRect(sx + TILE - 8, sy + 9, 5, 8, 1);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(sx + 4, sy + 10, 3, 6);
        ctx.fillRect(sx + TILE - 7, sy + 10, 3, 6);

        // Books on platform (random decoration) with contour
        if ((tx + ty * 3) % 5 === 0) {
          const bookColors = ['#ef5350', '#42a5f5', '#66bb6a', '#ffa726'];
          for (let i = 0; i < 3; i++) {
            // Book contour
            ctx.fillStyle = darkenColor(bookColors[(tx + i) % bookColors.length], 50);
            drawRoundRect(sx + 2 + i * 8, sy - 7 - i, 9, 8 + i, 2);
            ctx.fill();
            ctx.fillStyle = bookColors[(tx + i) % bookColors.length];
            drawRoundRect(sx + 3 + i * 8, sy - 6 - i, 7, 6 + i, 1);

            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.fillRect(sx + 4 + i * 8, sy - 5 - i, 2, 4 + i);
          }
        }
      }
    }
  }
}

    ctx.fillStyle = '#5d4037';
    drawRoundRect(sx - 19, sy - 36, 66, 24, 6);

    signGrad.addColorStop(0, '#ffe8cc');

      ctx.fill();

      // Speech bubble
      const bubbleGrad = ctx.createLinearGradient(bubbleX, bubbleY, bubbleX, bubbleY + 32);
      bubbleGrad.addColorStop(0, 'rgba(35,35,60,0.95)');
      bubbleGrad.addColorStop(1, 'rgba(25,25,45,0.95)');
      ctx.fillStyle = bubbleGrad;
      drawRoundRect(bubbleX, bubbleY, tw, 32, 8);

      ctx.closePath();

      // Bubble highlight
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      drawRoundRect(bubbleX + 3, bubbleY + 2, tw - 6, 12, 6);

      // Text with outline
      ctx.strokeStyle = 'rgba(0,0,0,0.5)';
