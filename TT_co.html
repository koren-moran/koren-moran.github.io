const GAME_W = 800;

canvas.width = GAME_W;
canvas.height = GAME_H;

function resizeCanvas() {

  canvas.style.height = (GAME_H * scale) + 'px';

// ============================================================
// AUDIO (procedural Web Audio API — no external files)
// ============================================================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
let sfxVolume = 0.25;

function playTone(freq, duration, type, vol, ramp) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, ctx.currentTime + duration);
    gain.gain.setValueAtTime((vol || 1) * sfxVolume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playNoise(duration, vol) {
  try {
    const ctx = getAudioCtx();
    const bufferSize = ctx.sampleRate * duration;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const gain = ctx.createGain();
    src.connect(gain);
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime((vol || 0.3) * sfxVolume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.start();
  } catch(e) {}
}

// ============================================================
// BACKGROUND MUSIC (MP3-based)
// ============================================================
let musicVolume = 0.15;
let musicState = 'menu';

// Audio element for background music
const bgMusic = new Audio('baseline.mp3');
bgMusic.loop = true;
bgMusic.volume = musicVolume;

// Playback rate map — different speeds for different game states
const MUSIC_RATES = {
  menu: 0.85,
  level0: 0.95,
  level1: 1.0,
  level2: 1.05,
  level3: 1.1,
  level4: 1.15,
  level5: 1.2,
  boss: 1.35,
  win: 1.1,
  dead: 0.7,
  fire: 1.3,
  coffee: 1.4,
  riding: 1.15,
};

function startMusic(trackName) {
  stopMusic();
  musicState = trackName;
  const rate = MUSIC_RATES[trackName] || 1.0;
  bgMusic.playbackRate = rate;
  bgMusic.volume = musicVolume;
  bgMusic.play().catch(() => {});
}

function stopMusic() {
  bgMusic.pause();
}

// Determine and switch music based on game state + player state
let prevMusicKey = '';
function getPlayerMusicState() {
  // Determine dominant player state for music
  // Priority: riding > coffee > fire > regular
  // In two-player mode, use the most "exciting" active state
  const players = [player];
  if (twoPlayerMode && player2 && !player2.dead) players.push(player2);
  let hasRiding = false, hasCoffee = false, hasFire = false;
  for (const pl of players) {
    if (!pl || pl.dead) continue;
    if (pl.mentoring) hasRiding = true;
    if (pl.powered) hasCoffee = true;
    if (pl.hasFlame) hasFire = true;
  }
  if (hasRiding) return 'riding';
  if (hasCoffee) return 'coffee';
  if (hasFire) return 'fire';
  return 'regular';
}

function updateMusic() {
  if (musicVolume <= 0) return;
  let targetKey = '';
  if (gameState === 'menu' || gameState === 'enterName' || gameState === 'showLeaderboard') {
    // No music on menu/entry screens
    if (!bgMusic.paused) bgMusic.pause();
    prevMusicKey = '';
    return;
  } else if (gameState === 'dead') {
    const totalLives = twoPlayerMode ? p1Stats.lives + p2Stats.lives : stats.lives;
    targetKey = totalLives > 0 ? 'level' + currentLevel : 'dead';
  } else if (gameState === 'gameWin') {
    targetKey = 'win';
  } else if (gameState === 'playing' || gameState === 'levelIntro' || gameState === 'paused' || gameState === 'levelComplete' || gameState === 'jobMarketCheck') {
    // Check for boss fight (dean alive on level 5)
    let bossAlive = false;
    if (currentLevel === 5 && enemies) {
      for (const e of enemies) {
        if (e.type === 'dean' && e.alive) { bossAlive = true; break; }
      }
    }
    if (bossAlive) {
      targetKey = 'boss';
    } else if (gameState === 'playing') {
      // Player state overrides level music during gameplay
      const pState = getPlayerMusicState();
      targetKey = pState === 'regular' ? 'level' + currentLevel : pState;
    } else {
      targetKey = 'level' + currentLevel;
    }
  }

  if (targetKey && targetKey !== prevMusicKey) {
    prevMusicKey = targetKey;
    musicState = targetKey;
    bgMusic.playbackRate = MUSIC_RATES[targetKey] || 1.0;
    bgMusic.volume = musicVolume;
    bgMusic.play().catch(() => {});
  } else if (bgMusic.paused && targetKey) {
    // Resume if paused (browser autoplay policy or after toggle-on)
    bgMusic.play().catch(() => {});
  }
}

// INPUT
// ============================================================
const keys = {};
const justPressed = {};
window.addEventListener('keydown', e => {
  if (!keys[e.code]) justPressed[e.code] = true;
  keys[e.code] = true;
  e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; e.preventDefault(); });

function keyName(code) {
  if (code.startsWith('Key')) return code.slice(3);
  if (code.startsWith('Arrow')) return code.slice(5);
  if (code === 'Space') return 'Space';
  return code;
}

// ============================================================
// TOUCH CONTROLS (mobile only)
// ============================================================
// Detect true mobile (not just touchscreen laptops) — check screen size + touch support
const isTouchDevice = (('ontouchstart' in window) || (navigator.maxTouchPoints > 0)) && (window.innerWidth <= 1024 || !window.matchMedia('(pointer: fine)').matches);

// Track which touch buttons are currently held
const touchButtons = {};
// Track active touches per button for multi-touch
const touchMap = {};

function getTouchPos(touch) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - rect.left) / rect.width * GAME_W,
    y: (touch.clientY - rect.top) / rect.height * GAME_H,

}

function drawTouchControls() {
  if (!isTouchDevice) return;
  const layout = getTouchLayout();
  for (const btn of layout) {
    if (btn.id.startsWith('_')) continue;
    const pressed = touchButtons[btn.id];
    const baseColor = btn.color || '#546e7a';
    const depth = pressed ? 1 : 4;
    const btnY = pressed ? btn.y + 3 : btn.y;

    ctx.globalAlpha = pressed ? 0.85 : 0.6;

    // Drop shadow (darkest, offset furthest)
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    drawRoundRect(btn.x + 1, btn.y + 5, btn.w, btn.h, 10);
    ctx.fill();

    // 3D bottom edge (darker shade of base color)
    const h = parseInt(baseColor.replace('#', ''), 16);
    const dr = Math.max(0, ((h >> 16) & 0xff) - 70);
    const dg = Math.max(0, ((h >> 8) & 0xff) - 70);
    const db = Math.max(0, (h & 0xff) - 70);
    ctx.fillStyle = `rgb(${dr},${dg},${db})`;
    drawRoundRect(btn.x, btn.y + depth, btn.w, btn.h, 10);
    ctx.fill();

    // Main button face (gradient for convex look)
    const faceGrad = ctx.createLinearGradient(btn.x, btnY, btn.x, btnY + btn.h);
    const lr = Math.min(255, ((h >> 16) & 0xff) + 30);
    const lg = Math.min(255, ((h >> 8) & 0xff) + 30);
    const lb = Math.min(255, (h & 0xff) + 30);
    faceGrad.addColorStop(0, `rgb(${lr},${lg},${lb})`);
    faceGrad.addColorStop(0.5, baseColor);
    faceGrad.addColorStop(1, `rgb(${dr + 20},${dg + 20},${db + 20})`);
    ctx.fillStyle = faceGrad;
    drawRoundRect(btn.x, btnY, btn.w, btn.h, 10);
    ctx.fill();

    // Top highlight (gloss reflection)
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    drawRoundRect(btn.x + 3, btnY + 2, btn.w - 6, btn.h * 0.38, 7);
    ctx.fill();

    // Subtle inner border
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    drawRoundRect(btn.x + 1, btnY + 1, btn.w - 2, btn.h - 2, 9);
    ctx.stroke();

    // Label text with shadow
    ctx.globalAlpha = pressed ? 1.0 : 0.85;
    const fontSize = btn.label.length > 3 ? 10 : 15;
    ctx.font = `bold ${fontSize}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Text shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(btn.label, btn.x + btn.w / 2 + 1, btnY + btn.h / 2 + 1);
    // Text
    ctx.fillStyle = '#fff';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btnY + btn.h / 2);

    ctx.globalAlpha = 1.0;
    ctx.textBaseline = 'alphabetic';
  }
  ctx.textAlign = 'left';
}

if (isTouchDevice) {
  // Request fullscreen and lock landscape on first touch
  let fullscreenRequested = false;
  function requestFullscreenAndLandscape() {
    if (fullscreenRequested) return;
    fullscreenRequested = true;
    const el = document.documentElement;
    const rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if (rfs) {
      rfs.call(el).then(() => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      }).catch(() => {});
    }
  }
  // Prevent default touch behavior on canvas and request fullscreen on first touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    requestFullscreenAndLandscape();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchend', e => e.preventDefault(), { passive: false });

  function handleTouchStart(e) {
    const layout = getTouchLayout();
    for (const touch of e.changedTouches) {
      const pos = getTouchPos(touch);
      for (const btn of layout) {
        if (pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
          if (btn.id === '_focusInput') {
            const mobileInput = document.getElementById('mobileNameInput');
            mobileInput.focus();
            break;
          }
          // Handle Enter on name input screen via touch
          if (btn.id === 'Enter' && gameState === 'enterName' && nameInputActive && nameChars.length > 0) {
            playerName = nameChars.join('');
            nameInputActive = false;
            const mobileInput = document.getElementById('mobileNameInput');
            mobileInput.blur();
            mobileInput.oninput = null;
            mobileInput.onkeydown = null;
            window.removeEventListener('keydown', handleNameInput);
            startGameAfterName();
            break;
          }
          touchButtons[btn.id] = true;
          touchMap[touch.identifier] = btn.id;
          keys[btn.id] = true;
          justPressed[btn.id] = true;
          break;
        }
      }
    }
  }

  function handleTouchEnd(e) {
    for (const touch of e.changedTouches) {
      const btnId = touchMap[touch.identifier];
      if (btnId) {
        touchButtons[btnId] = false;
        keys[btnId] = false;
        delete touchMap[touch.identifier];
      }
    }
  }

  function handleTouchMove(e) {
    // For held buttons (dpad), update if finger slides between buttons
    const layout = getTouchLayout();
    for (const touch of e.changedTouches) {
      const oldBtnId = touchMap[touch.identifier];
      const pos = getTouchPos(touch);
      let found = false;
      for (const btn of layout) {
        if (btn.hold && pos.x >= btn.x && pos.x <= btn.x + btn.w && pos.y >= btn.y && pos.y <= btn.y + btn.h) {
          if (oldBtnId !== btn.id) {
            // Release old button
            if (oldBtnId) {
              touchButtons[oldBtnId] = false;
              keys[oldBtnId] = false;
            }
            // Press new button
            touchButtons[btn.id] = true;
            touchMap[touch.identifier] = btn.id;
            keys[btn.id] = true;
            justPressed[btn.id] = true;
          }
          found = true;
          break;
        }
      }
      if (!found && oldBtnId) {
        // Finger left all buttons
        touchButtons[oldBtnId] = false;
        keys[oldBtnId] = false;
        delete touchMap[touch.identifier];
      }
    }
  }

  canvas.addEventListener('touchstart', handleTouchStart);
  canvas.addEventListener('touchend', handleTouchEnd);
  canvas.addEventListener('touchcancel', handleTouchEnd);
  canvas.addEventListener('touchmove', handleTouchMove);

  // Fullscreen mobile: fill the entire viewport, no border
  canvas.style.border = 'none';
  canvas.style.borderRadius = '0';
  canvas.style.boxShadow = 'none';
  function resizeCanvasMobile() {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    // Use the larger dimension as width (landscape)
    const screenW = Math.max(vw, vh);
    const screenH = Math.min(vw, vh);
    const scale = Math.min(screenW / GAME_W, screenH / GAME_H);
    canvas.style.width = (GAME_W * scale) + 'px';
    canvas.style.height = (GAME_H * scale) + 'px';
  }
  resizeCanvasMobile();
  window.removeEventListener('resize', resizeCanvas);
  window.addEventListener('resize', resizeCanvasMobile);
}

// ============================================================
// DRAWING HELPERS
// ============================================================
function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCircle(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
}

function drawEllipse(x, y, rx, ry) {
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
}

function lerpColor(a, b, t) {
  const ah = parseInt(a.replace('#', ''), 16);
  const bh = parseInt(b.replace('#', ''), 16);
  const ar = (ah >> 16) & 0xff, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
  const br = (bh >> 16) & 0xff, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
  const rr = Math.round(ar + (br - ar) * t);
  const rg = Math.round(ag + (bg - ag) * t);
  const rb = Math.round(ab + (bb - ab) * t);
  return `rgb(${rr},${rg},${rb})`;
}

// ============================================================
// CONTOUR / OUTLINE SYSTEM
// ============================================================
// Draw an outline around any shape by rendering it offset in 8 directions
function withOutline(drawFn, outlineColor, thickness) {
  const t = thickness || 2;
  ctx.save();
  ctx.globalCompositeOperation = 'source-over';
  const offsets = [[-t,0],[t,0],[0,-t],[0,t],[-t,-t],[t,-t],[-t,t],[t,t]];
  for (const [ox, oy] of offsets) {
    ctx.save();
    ctx.translate(ox, oy);
    drawFn(true); // true = outline pass
    ctx.restore();
  }
  drawFn(false); // false = normal pass
  ctx.restore();
}

// Offscreen buffer for outline rendering (stamp-based approach)
let outlineCanvas, outlineCtx;
function ensureOutlineBuffer() {
  if (!outlineCanvas) {
    outlineCanvas = document.createElement('canvas');
    outlineCanvas.width = 128;
    outlineCanvas.height = 128;
    outlineCtx = outlineCanvas.getContext('2d');
  }
}

// Draw a sprite with a colored outline via offscreen stamp
function drawWithOutline(x, y, w, h, drawFn, outlineColor, thickness) {
  ensureOutlineBuffer();
  const pad = (thickness || 2) + 2;
  const bw = w + pad * 2;
  const bh = h + pad * 2;
  // Resize buffer if needed
  if (outlineCanvas.width < bw || outlineCanvas.height < bh) {
    outlineCanvas.width = Math.max(outlineCanvas.width, bw + 16);
    outlineCanvas.height = Math.max(outlineCanvas.height, bh + 16);
  }
  outlineCtx.clearRect(0, 0, bw + 4, bh + 4);
  // Draw sprite into buffer
  outlineCtx.save();
  outlineCtx.translate(pad - x, pad - y);
  const origCtx = ctx;
  ctx = outlineCtx;
  drawFn();
  ctx = origCtx;
  outlineCtx.restore();
  // Draw expanded outline
  const t = thickness || 2;
  ctx.save();
  ctx.globalAlpha = 1;
  // Render outline color behind
  ctx.globalCompositeOperation = 'source-over';
  const offsets = [[-t,0],[t,0],[0,-t],[0,t]];
  for (const [ox, oy] of offsets) {
    ctx.drawImage(outlineCanvas, 0, 0, bw, bh, x - pad + ox, y - pad + oy, bw, bh);
  }
  // Tint the outline copies
  ctx.globalCompositeOperation = 'source-atop';
  // (Simple approach: draw the original on top, outline stays as-is from the sprite colors)
  ctx.globalCompositeOperation = 'source-over';
  ctx.drawImage(outlineCanvas, 0, 0, bw, bh, x - pad, y - pad, bw, bh);
  ctx.restore();
}

// Darken a hex color for outlines
function darkenColor(hex, amount) {
  const h = parseInt(hex.replace('#', ''), 16);
  const r = Math.max(0, ((h >> 16) & 0xff) - amount);
  const g = Math.max(0, ((h >> 8) & 0xff) - amount);
  const b = Math.max(0, (h & 0xff) - amount);
  return `rgb(${r},${g},${b})`;
}

// Lighten a hex color for highlights
function lightenColor(hex, amount) {
  const h = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, ((h >> 16) & 0xff) + amount);
  const g = Math.min(255, ((h >> 8) & 0xff) + amount);
  const b = Math.min(255, (h & 0xff) + amount);
  return `rgb(${r},${g},${b})`;
}

// Draw inner highlight (rim light) on a rounded rect
function drawInnerHighlight(x, y, w, h, r) {
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  drawRoundRect(x + 1, y + 1, w - 2, h * 0.4, r);
  ctx.stroke();
  ctx.restore();
}

// Draw a drop shadow under a sprite area
function drawDropShadow(x, y, w, h) {
  const grad = ctx.createRadialGradient(x + w / 2, y + h + 2, 1, x + w / 2, y + h + 2, w * 0.7);
  grad.addColorStop(0, 'rgba(0,0,0,0.25)');
  grad.addColorStop(0.6, 'rgba(0,0,0,0.08)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  drawEllipse(x + w / 2, y + h + 2, w * 0.6, 5);
  ctx.fill();
}

function drawHairStyle(style, color, x, headY, w) {
  ctx.fillStyle = color;
  // Hair is drawn behind the head — must extend above/beyond head bounds to be visible
  switch (style) {
    case 'messy':
      drawRoundRect(x - 1, headY - 5, w + 2, 10, 5);
      ctx.fill();
      // Tufts sticking up
      ctx.fillRect(x + 1, headY - 8, 4, 5);
      ctx.fillRect(x + w / 2 - 2, headY - 9, 4, 6);
      ctx.fillRect(x + w - 5, headY - 7, 4, 4);
      break;
    case 'short':
      drawRoundRect(x, headY - 4, w, 8, 5);
      ctx.fill();
      break;
    case 'long':
      drawRoundRect(x - 2, headY - 5, w + 4, 10, 5);
      ctx.fill();
      // Side hair flowing down past head
      drawRoundRect(x - 3, headY + 2, 5, 16, 3);
      ctx.fill();
      drawRoundRect(x + w - 2, headY + 2, 5, 16, 3);
      ctx.fill();
      break;
    case 'curly':
      // Poofy round curls extending above and to sides
      for (let i = 0; i < 5; i++) {
        drawCircle(x + 2 + i * ((w - 4) / 4), headY - 3, 5);
        ctx.fill();
      }
      drawCircle(x - 1, headY + 4, 4);
      ctx.fill();
      drawCircle(x + w + 1, headY + 4, 4);
      ctx.fill();
      break;
    case 'bun':
      drawRoundRect(x, headY - 4, w, 7, 4);
      ctx.fill();
      // Top bun — sits well above head
      drawCircle(x + w / 2, headY - 8, 6);
      ctx.fill();
      break;
    case 'mohawk':
      drawRoundRect(x + 1, headY - 3, w - 2, 6, 3);
      ctx.fill();
      // Tall center spike
      ctx.beginPath();
      ctx.moveTo(x + w / 2 - 4, headY - 2);
      ctx.lineTo(x + w / 2, headY - 14);
      ctx.lineTo(x + w / 2 + 4, headY - 2);
      ctx.fill();
      break;
    case 'bob':
      drawRoundRect(x - 2, headY - 4, w + 4, 9, 5);
      ctx.fill();
      // Neat sides extending past head
      drawRoundRect(x - 3, headY + 2, 6, 12, 3);
      ctx.fill();
      drawRoundRect(x + w - 3, headY + 2, 6, 12, 3);
      ctx.fill();
      break;
    case 'afro':
      // Big round afro — extends well beyond head
      drawCircle(x + w / 2, headY + 2, w / 2 + 5);
      ctx.fill();
      break;
  }
}

function drawPlayer(x, y, w, h, frame, facingRight, powered, isDead) {
  ctx.save();
  const cx = x + w / 2;

  if (!facingRight) {
    ctx.translate(cx, 0);
    ctx.scale(-1, 1);
    ctx.translate(-cx, 0);
  }

  // Bounce animation
  const bounce = Math.sin(frame * Math.PI / 2) * 2;
  const drawY = y - Math.abs(bounce);

  // Soft shadow with gradient (larger, more realistic)
  const shadowGrad = ctx.createRadialGradient(x + w / 2, y + h + 2, 1, x + w / 2, y + h + 2, w * 0.7);
  shadowGrad.addColorStop(0, 'rgba(0,0,0,0.3)');
  shadowGrad.addColorStop(0.5, 'rgba(0,0,0,0.12)');
  shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadowGrad;
  drawEllipse(x + w / 2, y + h + 2, w * 0.65, 6);
  ctx.fill();

  // Body (round, chibi style) with contour
  const app = playerAppearance;

  // Body outline (dark contour)
  ctx.fillStyle = powered ? '#8B6914' : darkenColor(app.jacket.main, 80);
  drawRoundRect(x + 2, drawY + 13, w - 4, h - 16, 6);
  ctx.fill();

  // Body fill with gradient
  const bodyGrad = ctx.createLinearGradient(x, drawY + 14, x + w, drawY + 14);
  if (powered) {
    bodyGrad.addColorStop(0, '#FFD700');
    bodyGrad.addColorStop(0.5, '#FFE44D');
    bodyGrad.addColorStop(1, '#FFA000');
  } else {
    bodyGrad.addColorStop(0, lightenColor(app.jacket.main, 20));
    bodyGrad.addColorStop(0.5, app.jacket.main);
    bodyGrad.addColorStop(1, lerpColor(app.jacket.main, '#000000', 0.25));
  }
  ctx.fillStyle = bodyGrad;
  drawRoundRect(x + 3, drawY + 14, w - 6, h - 18, 5);
  ctx.fill();

  // Body highlight (rim light top)
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  drawRoundRect(x + 5, drawY + 15, w - 10, 4, 3);
  ctx.fill();

  // Elbow patches (cute detail) with contour
  ctx.fillStyle = powered ? '#8B6914' : darkenColor(app.jacket.patch, 40);
  drawCircle(x + 4, drawY + 22, 4);
  ctx.fill();
  drawCircle(x + w - 4, drawY + 22, 4);
  ctx.fill();
  ctx.fillStyle = powered ? '#ffcc02' : app.jacket.patch;
  drawCircle(x + 4, drawY + 22, 3);
  ctx.fill();
  drawCircle(x + w - 4, drawY + 22, 3);
  ctx.fill();

  // Tie
  ctx.fillStyle = app.tie;
  ctx.beginPath();
  ctx.moveTo(x + w / 2, drawY + 14);
  ctx.lineTo(x + w / 2 + 3, drawY + 20);
  ctx.lineTo(x + w / 2, drawY + 27);
  ctx.lineTo(x + w / 2 - 3, drawY + 20);
  ctx.closePath();
  ctx.fill();

  // Legs with shoes (walking animation)
  const legPhase = frame * 0.8;
  const leftLegX = x + 6 + Math.sin(legPhase) * 2;
  const rightLegX = x + w - 10 - Math.sin(legPhase) * 2;

  // Legs with contour
  ctx.fillStyle = '#1a2530';
  drawRoundRect(leftLegX - 1, drawY + h - 11, 8, 10, 3);
  ctx.fill();
  drawRoundRect(rightLegX - 1, drawY + h - 11, 8, 10, 3);
  ctx.fill();
  ctx.fillStyle = '#37474f';
  drawRoundRect(leftLegX, drawY + h - 10, 6, 8, 2);
  ctx.fill();
  drawRoundRect(rightLegX, drawY + h - 10, 6, 8, 2);
  ctx.fill();
  // Leg highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(leftLegX + 1, drawY + h - 9, 2, 5);
  ctx.fillRect(rightLegX + 1, drawY + h - 9, 2, 5);

  // Shoes with contour
  ctx.fillStyle = '#2a1a10';
  drawRoundRect(leftLegX - 2, drawY + h - 5, 10, 6, 3);
  ctx.fill();
  drawRoundRect(rightLegX - 2, drawY + h - 5, 10, 6, 3);
  ctx.fill();
  ctx.fillStyle = '#4e342e';
  drawRoundRect(leftLegX - 1, drawY + h - 4, 8, 4, 2);
  ctx.fill();
  drawRoundRect(rightLegX - 1, drawY + h - 4, 8, 4, 2);
  ctx.fill();
  // Shoe highlight
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  drawRoundRect(leftLegX, drawY + h - 4, 5, 1.5, 1);
  ctx.fill();
  drawRoundRect(rightLegX, drawY + h - 4, 5, 1.5, 1);
  ctx.fill();

  // Head (big, cute, round) with contour
  const headY = drawY - 2;

  // Hair (drawn behind head)
  drawHairStyle(app.hairStyle, app.hair, x, headY, w);

  // Head outline
  ctx.fillStyle = darkenColor(app.skin.shadow, 60);
  drawRoundRect(x + 1, headY - 1, w - 2, 20, 9);
  ctx.fill();
  // Head fill
  const headGrad = ctx.createRadialGradient(x + w / 2 - 2, headY + 5, 2, x + w / 2, headY + 7, 13);
  headGrad.addColorStop(0, lightenColor(app.skin.base, 15));
  headGrad.addColorStop(0.6, app.skin.base);
  headGrad.addColorStop(1, app.skin.shadow);
  ctx.fillStyle = headGrad;
  drawRoundRect(x + 2, headY, w - 4, 18, 8);
  ctx.fill();
  // Head specular highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  drawEllipse(x + w / 2 - 2, headY + 4, 5, 3);
  ctx.fill();

  // Anime blush marks (horizontal lines)
  ctx.fillStyle = app.skin.blush;
  drawEllipse(x + 5, headY + 11, 3.5, 2);
  ctx.fill();
  drawEllipse(x + w - 5, headY + 11, 3.5, 2);
  ctx.fill();
  // Subtle diagonal blush lines (manga style)
  ctx.strokeStyle = app.skin.blush;
  ctx.lineWidth = 0.6;
  for (let bl = 0; bl < 3; bl++) {
    ctx.beginPath();
    ctx.moveTo(x + 3 + bl * 1.8, headY + 10);
    ctx.lineTo(x + 4.5 + bl * 1.8, headY + 12);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + w - 7 + bl * 1.8, headY + 10);
    ctx.lineTo(x + w - 5.5 + bl * 1.8, headY + 12);
    ctx.stroke();
  }

  // Anime-style big eyes
  const eyeL = x + 7;
  const eyeR = x + w - 11;
  const eyeY = headY + 7;

  if (isDead) {
    // Spiral/swirl dead eyes (manga style)
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.5;
    for (const ex of [eyeL + 2, eyeR + 2]) {
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 3; a += 0.2) {
        const sr = a * 0.7;
        const sx2 = ex + Math.cos(a) * sr;
        const sy2 = eyeY + 1 + Math.sin(a) * sr;
        a === 0 ? ctx.moveTo(sx2, sy2) : ctx.lineTo(sx2, sy2);
      }
      ctx.stroke();
    }
  } else {
    // Big anime eyes with gradient iris and multiple highlights
    for (const ex of [eyeL, eyeR]) {
      // Eye white (larger, rounder)
      ctx.fillStyle = '#fff';
      drawEllipse(ex + 2, eyeY + 1, 4.5, 4);
      ctx.fill();

      // Iris gradient
      const irisGrad = ctx.createRadialGradient(ex + 2, eyeY + 1, 0.5, ex + 2, eyeY + 1, 3.5);
      irisGrad.addColorStop(0, '#5c3310');
      irisGrad.addColorStop(0.5, '#3e2723');
      irisGrad.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = irisGrad;
      drawEllipse(ex + 2, eyeY + 1, 3.2, 3);
      ctx.fill();

      // Pupil
      ctx.fillStyle = '#000';
      drawCircle(ex + 2, eyeY + 1.5, 1.5);
      ctx.fill();

      // Big highlight (top-left)
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      drawCircle(ex + 0.8, eyeY - 0.5, 1.4);
      ctx.fill();

      // Small highlight (bottom-right)
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      drawCircle(ex + 3, eyeY + 2, 0.7);
      ctx.fill();

      // Subtle color reflection
      ctx.fillStyle = 'rgba(120,200,255,0.2)';
      drawCircle(ex + 1, eyeY + 2, 0.8);
      ctx.fill();
    }

    // Upper eyelash lines — thicker/longer for fem
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = app.gender === 'fem' ? 1.8 : 1.2;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(eyeL - 1.5, eyeY - 2);
    ctx.quadraticCurveTo(eyeL + 2, eyeY - 3.5, eyeL + 5.5, eyeY - 1.5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(eyeR - 1.5, eyeY - 1.5);
    ctx.quadraticCurveTo(eyeR + 2, eyeY - 3.5, eyeR + 5.5, eyeY - 2);
    ctx.stroke();
    // Fem: extra lash flicks
    if (app.gender === 'fem') {
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(eyeL + 5.5, eyeY - 1.5);
      ctx.lineTo(eyeL + 7, eyeY - 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(eyeR + 5.5, eyeY - 2);
      ctx.lineTo(eyeR + 7, eyeY - 3.5);
      ctx.stroke();
    }
    ctx.lineCap = 'butt';
  }

  // Glasses (based on appearance)
  if (app.glasses && app.glasses !== 'none') {
    if (app.glasses === 'cat-eye') {
      ctx.strokeStyle = '#880e4f';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + 4, headY + 10);
      ctx.lineTo(x + 4, headY + 5);
      ctx.lineTo(x + 13, headY + 4);
      ctx.lineTo(x + 13, headY + 10);
      ctx.closePath();
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + w - 13, headY + 10);
      ctx.lineTo(x + w - 13, headY + 5);
      ctx.lineTo(x + w - 4, headY + 4);
      ctx.lineTo(x + w - 4, headY + 10);
      ctx.closePath();
      ctx.stroke();
    } else if (app.glasses === 'round') {
      ctx.strokeStyle = 'rgba(55,71,79,0.7)';
      ctx.lineWidth = 1;
      drawCircle(x + 8.5, headY + 7.5, 5);
      ctx.stroke();
      drawCircle(x + w - 8.5, headY + 7.5, 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 13, headY + 7);
      ctx.lineTo(x + w - 13, headY + 7);
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(55,71,79,0.6)';
      ctx.lineWidth = 1;
      drawRoundRect(x + 4, headY + 4, 9, 7, 3);
      ctx.stroke();
      drawRoundRect(x + w - 13, headY + 4, 9, 7, 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 13, headY + 7);
      ctx.lineTo(x + w - 13, headY + 7);
      ctx.stroke();
    }
  }

  // Fem: earrings
  if (app.gender === 'fem' && app.accessory === 'earrings') {
    ctx.fillStyle = '#ffd54f';
    drawCircle(x + 1, headY + 12, 1.5);
    ctx.fill();
    drawCircle(x + w - 1, headY + 12, 1.5);
    ctx.fill();
  }

  // Mouth
  if (isDead) {
    // Wavy distress mouth
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x + 9, headY + 14);
    ctx.quadraticCurveTo(x + 11, headY + 15, x + w / 2, headY + 13.5);
    ctx.quadraticCurveTo(x + w - 11, headY + 15, x + w - 9, headY + 14);
    ctx.stroke();
  } else {
    // Cute cat-mouth (anime :3 style)
    ctx.strokeStyle = app.gender === 'fem' ? '#c0392b' : '#5d4037';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x + w / 2 - 3, headY + 13);
    ctx.quadraticCurveTo(x + w / 2 - 1, headY + 15, x + w / 2, headY + 13.5);
    ctx.quadraticCurveTo(x + w / 2 + 1, headY + 15, x + w / 2 + 3, headY + 13);
    ctx.stroke();
    // Fem: subtle lip color
    if (app.gender === 'fem') {
      ctx.fillStyle = 'rgba(192,57,43,0.25)';
      ctx.beginPath();
      ctx.moveTo(x + w / 2 - 3, headY + 13);
      ctx.quadraticCurveTo(x + w / 2, headY + 15.5, x + w / 2 + 3, headY + 13);
      ctx.fill();
    }
  }

  // Flame aura
  if (player && player.hasFlame) {
    ctx.shadowColor = '#ff5722';
    ctx.shadowBlur = 10;
    // Flame particles around player
    for (let i = 0; i < 4; i++) {
      const fx = x + w / 2 + Math.sin(levelTimer * 0.12 + i * 1.6) * (w / 2 + 4);
      const fy = drawY + h - 4 + Math.cos(levelTimer * 0.15 + i * 2.1) * 6 - 8;
      const fGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, 4);
      fGrad.addColorStop(0, 'rgba(255,235,59,0.8)');
      fGrad.addColorStop(1, 'rgba(255,87,34,0)');
      ctx.fillStyle = fGrad;
      drawCircle(fx, fy, 4);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // Power-up glow (anime aura)
  if (powered) {
    // Outer aura ring
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;
    const auraAlpha = 0.3 + Math.sin(levelTimer * 0.15) * 0.15;
    const auraGrad = ctx.createRadialGradient(x + w / 2, drawY + h / 2, 5, x + w / 2, drawY + h / 2, w + 5);
    auraGrad.addColorStop(0, `rgba(255,215,0,${auraAlpha})`);
    auraGrad.addColorStop(0.6, `rgba(255,235,59,${auraAlpha * 0.3})`);
    auraGrad.addColorStop(1, 'rgba(255,215,0,0)');
    ctx.fillStyle = auraGrad;
    drawCircle(x + w / 2, drawY + h / 2, w + 5);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Anime sparkles (rotating around character)
    for (let i = 0; i < 5; i++) {
      const angle = levelTimer * 0.08 + i * Math.PI * 2 / 5;
      const sparkDist = w / 2 + 6 + Math.sin(levelTimer * 0.12 + i) * 3;
      const sx2 = x + w / 2 + Math.cos(angle) * sparkDist;
      const sy2 = drawY + h / 2 + Math.sin(angle) * (h / 2 + 4);
      ctx.fillStyle = '#FFD700';
      drawStar(sx2, sy2, 4, 3, 1.2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      drawStar(sx2, sy2, 4, 1.5, 0.6);
      ctx.fill();
    }
  }

  // Manga speed lines when moving fast
  if (player && Math.abs(player.vx) > 2.5 && !isDead) {
    const dir = player.vx > 0 ? -1 : 1;
    ctx.globalAlpha = Math.min(Math.abs(player.vx) / 6, 0.4);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const lx = x + (dir > 0 ? w + 2 : -2) + dir * (i * 4);
      const ly = drawY + 5 + i * 7;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + dir * (8 + Math.random() * 6), ly);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ============================================================
// CUTE ENEMY DRAWING
// ============================================================
function drawEnemy(e, x, y) {
  const bob = Math.sin(levelTimer * 0.06 + e.startX * 0.1) * 2;
  const dy = y + bob;
  const facingLeft = e.vx < 0;

  ctx.save();
  if (facingLeft) {
    ctx.translate(x + e.w, 0);
    ctx.scale(-1, 1);
    x = 0;
  }

  // Shadow (richer, larger)
  const eShadowGrad = ctx.createRadialGradient(x + e.w / 2, y + e.h + 2, 1, x + e.w / 2, y + e.h + 2, e.w * 0.55);
  eShadowGrad.addColorStop(0, 'rgba(0,0,0,0.25)');
  eShadowGrad.addColorStop(0.6, 'rgba(0,0,0,0.08)');
  eShadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = eShadowGrad;
  drawEllipse(x + e.w / 2, y + e.h + 2, e.w / 2.2, 4);
  ctx.fill();

  switch (e.type) {
    case 'reviewer2': {
      // Cute angry blob with anime features + contour
      // Dark contour outline
      ctx.fillStyle = '#7f0000';
      drawRoundRect(x, dy + 1, e.w, e.h - 2, 13);
      ctx.fill();
      // Body glow
      ctx.shadowColor = '#ef5350';
      ctx.shadowBlur = 6;
      const grad = ctx.createRadialGradient(x + e.w / 2, dy + 6, 3, x + e.w / 2, dy + 14, 18);
      grad.addColorStop(0, '#ff8a80');
      grad.addColorStop(0.4, '#ff7070');
      grad.addColorStop(0.7, '#ef5350');
      grad.addColorStop(1, '#b71c1c');
      ctx.fillStyle = grad;
      drawRoundRect(x + 1, dy + 2, e.w - 2, e.h - 4, 12);
      ctx.fill();
      ctx.shadowBlur = 0;
      // Body highlight (rim light)
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      drawRoundRect(x + 4, dy + 4, e.w - 8, 6, 6);
      ctx.fill();

      // Angry eyebrows (thicker, more manga)
      ctx.strokeStyle = '#1a1a1a';
      ctx.lineWidth = 2.5;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x + 4, dy + 9);
      ctx.lineTo(x + 13, dy + 12);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + e.w - 4, dy + 9);
      ctx.lineTo(x + e.w - 13, dy + 12);
      ctx.stroke();
      ctx.lineCap = 'butt';

      // Big anime eyes
      for (const ex of [x + 9, x + e.w - 9]) {
        ctx.fillStyle = '#fff';
        drawEllipse(ex, dy + 15, 5.5, 5);
        ctx.fill();
        // Red iris (angry!)
        const iGrad = ctx.createRadialGradient(ex, dy + 15, 0.5, ex, dy + 15, 3.5);
        iGrad.addColorStop(0, '#ff1744');
        iGrad.addColorStop(1, '#880e4f');
        ctx.fillStyle = iGrad;
        drawCircle(ex + 0.5, dy + 15.5, 3);
        ctx.fill();
        ctx.fillStyle = '#000';
        drawCircle(ex + 0.5, dy + 15.5, 1.5);
        ctx.fill();
        // Highlights
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        drawCircle(ex - 1.2, dy + 13.8, 1.3);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        drawCircle(ex + 1.5, dy + 16.5, 0.6);
        ctx.fill();
      }

      // Angry fanged mouth
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.moveTo(x + 8, dy + 22);
      ctx.quadraticCurveTo(x + e.w / 2, dy + 18, x + e.w - 8, dy + 22);
      ctx.quadraticCurveTo(x + e.w / 2, dy + 25, x + 8, dy + 22);
      ctx.fill();
      // Fangs
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(x + 10, dy + 22);
      ctx.lineTo(x + 12, dy + 24);
      ctx.lineTo(x + 14, dy + 22);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + e.w - 14, dy + 22);
      ctx.lineTo(x + e.w - 12, dy + 24);
      ctx.lineTo(x + e.w - 10, dy + 22);
      ctx.fill();

      // Blush marks (even angry chars get blush in manga)
      ctx.fillStyle = 'rgba(255,100,100,0.25)';
      drawEllipse(x + 4, dy + 18, 3, 1.5);
      ctx.fill();
      drawEllipse(x + e.w - 4, dy + 18, 3, 1.5);
      ctx.fill();

      // Label
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 8px monospace';
      ctx.fillText('R2', x + 8, dy + e.h - 2);
      break;
    }

    case 'bureaucrat': {
      const ba = e.appearance || { skin: SKIN_TONES[0], jacket: JACKET_COLORS[0], tie: TIE_COLORS[0], hair: HAIR_COLORS[0], hairStyle: 'short' };
      // Body contour
      ctx.fillStyle = darkenColor(ba.jacket.patch, 60);
      drawRoundRect(x + 1, dy + 7, e.w - 2, e.h - 8, 9);
      ctx.fill();
      // Cute suit blob
      const grad = ctx.createLinearGradient(x, dy, x, dy + e.h);
      grad.addColorStop(0, ba.jacket.main);
      grad.addColorStop(1, ba.jacket.patch);
      ctx.fillStyle = grad;
      drawRoundRect(x + 2, dy + 8, e.w - 4, e.h - 10, 8);
      ctx.fill();

      // Hair behind head (must extend above head contour)
      ctx.fillStyle = ba.hair;
      drawRoundRect(x + e.w / 2 - 10, dy - 7, 20, 8, 5);
      ctx.fill();

      // Head contour
      ctx.fillStyle = darkenColor(ba.skin.shadow, 60);
      drawCircle(x + e.w / 2, dy + 6, 10);
      ctx.fill();
      // Head
      const headGrad = ctx.createRadialGradient(x + e.w / 2, dy + 6, 2, x + e.w / 2, dy + 6, 10);
      headGrad.addColorStop(0, ba.skin.base);
      headGrad.addColorStop(1, ba.skin.shadow);
      ctx.fillStyle = headGrad;
      drawCircle(x + e.w / 2, dy + 6, 9);
      ctx.fill();

      // Tie
      ctx.fillStyle = ba.tie;
      ctx.beginPath();
      ctx.moveTo(x + e.w / 2, dy + 12);
      ctx.lineTo(x + e.w / 2 + 3, dy + 18);
      ctx.lineTo(x + e.w / 2, dy + 24);
      ctx.lineTo(x + e.w / 2 - 3, dy + 18);
      ctx.closePath();
      ctx.fill();

      // Anime eyes (annoyed half-closed)
      for (const bex of [x + e.w / 2 - 4, x + e.w / 2 + 4]) {
        ctx.fillStyle = '#fff';
        drawEllipse(bex, dy + 5, 3.5, 2.5);
        ctx.fill();
        ctx.fillStyle = '#333';
        drawCircle(bex, dy + 5.5, 1.8);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        drawCircle(bex - 0.8, dy + 4.5, 0.8);
        ctx.fill();
        // Half-lid (annoyed look)
        ctx.fillStyle = ba.skin.shadow;
        ctx.fillRect(bex - 4, dy + 1, 8, 3);
      }
      // Fem: longer eyelashes
      if (ba.gender === 'fem') {
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1.2;
        ctx.lineCap = 'round';
        for (const bex of [x + e.w / 2 - 4, x + e.w / 2 + 4]) {
          ctx.beginPath();
          ctx.moveTo(bex + 3.5, dy + 3);
          ctx.lineTo(bex + 5, dy + 1.5);
          ctx.stroke();
        }
        ctx.lineCap = 'butt';
      }

      // Flat annoyed mouth
      ctx.strokeStyle = ba.gender === 'fem' ? '#c0392b' : '#555';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x + e.w / 2 - 3, dy + 10);
      ctx.lineTo(x + e.w / 2 + 3, dy + 10.5);
      ctx.stroke();
      // Fem: lip color
      if (ba.gender === 'fem') {
        ctx.fillStyle = 'rgba(192,57,43,0.2)';
        drawEllipse(x + e.w / 2, dy + 10.5, 3, 1.5);
        ctx.fill();
      }
      // Fem: earrings
      if (ba.gender === 'fem' && ba.accessory === 'earrings') {
        ctx.fillStyle = '#ffd54f';
        drawCircle(x + e.w / 2 - 9, dy + 10, 1.5);
        ctx.fill();
        drawCircle(x + e.w / 2 + 9, dy + 10, 1.5);
        ctx.fill();
      }

      // Briefcase contour
      ctx.fillStyle = '#2a1a10';
      drawRoundRect(x + e.w - 3, dy + e.h - 15, 10, 12, 3);
      ctx.fill();
      // Briefcase with shine
      ctx.fillStyle = '#5d4037';
      drawRoundRect(x + e.w - 2, dy + e.h - 14, 8, 10, 2);
      ctx.fill();
      ctx.fillStyle = '#ffd54f';
      ctx.fillRect(x + e.w + 1, dy + e.h - 11, 4, 1);
      // Briefcase shine
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(x + e.w - 1, dy + e.h - 13, 3, 4);
      break;
    }

    case 'imposter': {
      // Anime ghost / yokai style
      const alpha = 0.5 + Math.sin(levelTimer * 0.08) * 0.2;

      // Ethereal glow behind
      ctx.shadowColor = '#ce93d8';
      ctx.shadowBlur = 12;
      ctx.globalAlpha = alpha * 0.3;
      ctx.fillStyle = '#e1bee7';
      drawCircle(x + e.w / 2, dy + e.h / 2, 18);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.globalAlpha = alpha;
