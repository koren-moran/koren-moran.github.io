// ============================================================
async function fetchLeaderboard() {
  try {
    const res = await fetch(LEADERBOARD_URL);
    leaderboardData = await res.json();
  } catch (e) {
    leaderboardData = [];
  }
}

async function fetchRank(score) {
  try {
    const res = await fetch(`${LEADERBOARD_URL}/rank?score=${score}`);
    const data = await res.json();
    return data.rank;
  } catch (e) {
    return 1; // if server is down, let them pass
  }
}

async function submitScore() {
  try {
    const res = await fetch(LEADERBOARD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: playerName || 'Anonymous',
        score: stats.score,
        publications: stats.publications,
        grants: stats.grants,
        citations: stats.citations,
        hIndex: stats.hIndex,
      }),
    });
    const data = await res.json();
    leaderboardRank = data.rank;
  } catch (e) {
    leaderboardRank = null;
  }
}

async function checkJobMarket() {
  const t = JOB_MARKET_THRESHOLDS;
  const failReasons = [];

  if (stats.publications < t.publications) failReasons.push(`Pubs: ${stats.publications}/${t.publications}`);
  if (stats.grants < t.grants) failReasons.push(`Grants: ${stats.grants}/${t.grants}`);
  if (stats.citations < t.citations) failReasons.push(`Cites: ${stats.citations}/${t.citations}`);
  if (stats.hIndex < t.hIndex) failReasons.push(`h-index: ${stats.hIndex}/${t.hIndex}`);

  // Check leaderboard rank
  const rank = await fetchRank(stats.score);
  leaderboardRank = rank;
  if (rank > t.leaderboardRank) failReasons.push(`Rank: #${rank} (need top ${t.leaderboardRank})`);

  if (failReasons.length === 0) {
    jobMarketPassed = true;
    jobMarketFailReason = '';
  } else {
    jobMarketPassed = false;
    jobMarketFailReason = failReasons.join('  |  ');
  }
  // Submit score regardless
  await submitScore();
  await fetchLeaderboard();

  winTimer = 300;
}

// Name input handling
let nameChars = [];
function handleNameInput(e) {
  if (!nameInputActive) return;
  if (e.key === 'Enter' && nameChars.length > 0) {
    playerName = nameChars.join('');
    nameInputActive = false;
    window.removeEventListener('keydown', handleNameInput);
    startGameAfterName();
    return;
  }
  if (e.key === 'Backspace') {
    nameChars.pop();
    return;
  }
  if (e.key.length === 1 && nameChars.length < 15) {
    nameChars.push(e.key);
  }
}

function drawNameInput() {
  const t = Date.now() * 0.001;
  const bgGrad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  bgGrad.addColorStop(0, '#1a0533');
  bgGrad.addColorStop(1, '#0f0a1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 28px monospace';
  ctx.fillText('ENTER YOUR NAME', GAME_W / 2, 150);

  ctx.fillStyle = '#78909c';
  ctx.font = '12px monospace';
  ctx.fillText('(for the leaderboard)', GAME_W / 2, 180);

  // Name box
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  drawRoundRect(GAME_W / 2 - 150, 210, 300, 50, 10);
  ctx.fill();
  ctx.strokeStyle = '#e94560';
  ctx.lineWidth = 2;
  drawRoundRect(GAME_W / 2 - 150, 210, 300, 50, 10);
  ctx.stroke();

  const displayName = nameChars.join('') + (Math.sin(t * 5) > 0 ? '_' : '');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px monospace';
  ctx.fillText(displayName, GAME_W / 2, 242);

  const blink = Math.sin(t * 4) > 0;
  if (blink && nameChars.length > 0) {
    ctx.fillStyle = '#ffd54f';
    ctx.font = '14px monospace';
    ctx.fillText('Press ENTER to start', GAME_W / 2, 310);
  }

  ctx.textAlign = 'left';
}

function drawJobMarketResult() {
  ctx.fillStyle = 'rgba(10,20,30,0.88)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';

  if (jobMarketPassed === null) {
    // Still checking
    ctx.fillStyle = '#ffd54f';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('Reviewing your application...', GAME_W / 2, GAME_H / 2);
    const dots = '.'.repeat(Math.floor(Date.now() / 500) % 4);
    ctx.fillText(dots, GAME_W / 2, GAME_H / 2 + 30);
  } else if (jobMarketPassed) {
    // Success!
    // Confetti
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = ['#ef5350', '#42a5f5', '#66bb6a', '#ffa726', '#ab47bc', '#ffd54f'][i % 6];
      const cx = Math.sin(Date.now() * 0.002 + i * 1.3) * 300 + GAME_W / 2;
      const cy = (Date.now() * 0.08 + i * 60) % (GAME_H + 20) - 10;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(Date.now() * 0.003 + i);
      ctx.fillRect(-3, -3, 6, 6);
      ctx.restore();
    }

    ctx.fillStyle = '#66bb6a';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('OFFER RECEIVED!', GAME_W / 2, 120);

    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('The search committee was impressed!', GAME_W / 2, 160);

    ctx.fillStyle = '#ffd54f';
    ctx.font = '12px monospace';
    ctx.fillText(`Pubs: ${stats.publications} | Grants: ${stats.grants} | Cites: ${stats.citations} | h=${stats.hIndex}`, GAME_W / 2, 200);
    if (leaderboardRank) {
      ctx.fillText(`Leaderboard Rank: #${leaderboardRank}`, GAME_W / 2, 225);
    }

    ctx.fillStyle = '#b0bec5';
    ctx.font = '11px monospace';
    ctx.fillText('Starting assistant professorship...', GAME_W / 2, 280);
  } else {
    // Failed
    ctx.fillStyle = '#ef5350';
    ctx.font = 'bold 26px monospace';
    ctx.fillText('APPLICATION REJECTED', GAME_W / 2, 100);

    ctx.fillStyle = '#ffd54f';
    ctx.font = '13px monospace';
    ctx.fillText('"We regret to inform you..."', GAME_W / 2, 140);

    ctx.fillStyle = '#fff';
    ctx.font = '11px monospace';
    ctx.fillText('Your CV did not meet the requirements:', GAME_W / 2, 180);

    ctx.fillStyle = '#ef5350';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(jobMarketFailReason, GAME_W / 2, 210);

    // Show thresholds
    ctx.fillStyle = '#78909c';
    ctx.font = '10px monospace';
    const t = JOB_MARKET_THRESHOLDS;
    ctx.fillText(`Required: ${t.publications} pubs, ${t.grants} grants, ${t.citations} cites, h>=${t.hIndex}, top ${t.leaderboardRank} rank`, GAME_W / 2, 240);

    if (leaderboardRank) {
      ctx.fillStyle = '#ffa726';
      ctx.fillText(`Your leaderboard rank: #${leaderboardRank}`, GAME_W / 2, 265);
    }

    postdocCount++;
    ctx.fillStyle = '#ffd54f';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(`Back to Postdoc #${postdocCount + 1}...`, GAME_W / 2, 310);

    ctx.fillStyle = '#78909c';
    ctx.font = '10px monospace';
    ctx.fillText('Collect more pubs, grants, and citations!', GAME_W / 2, 340);
  }

  ctx.textAlign = 'left';
}

function drawLeaderboardOverlay() {
  ctx.fillStyle = 'rgba(15,10,26,0.95)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('LEADERBOARD', GAME_W / 2, 40);

  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#78909c';
    ctx.font = '12px monospace';
    ctx.fillText('No scores yet. Be the first!', GAME_W / 2, GAME_H / 2);
  } else {
    // Header
    ctx.fillStyle = '#b0bec5';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('#', 100, 70);
    ctx.fillText('NAME', 130, 70);
    ctx.fillText('SCORE', 320, 70);
    ctx.fillText('PUBS', 410, 70);
    ctx.fillText('GRANTS', 470, 70);
    ctx.fillText('h-idx', 540, 70);
    ctx.fillText('CITES', 600, 70);

    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(90, 75);
    ctx.lineTo(670, 75);
    ctx.stroke();

    const maxShow = Math.min(leaderboardData.length, 15);
    for (let i = 0; i < maxShow; i++) {
      const e = leaderboardData[i];
      const y = 92 + i * 22;
      const isMe = e.name === playerName && i === (leaderboardRank ? leaderboardRank - 1 : -1);

      if (isMe) {
        ctx.fillStyle = 'rgba(255,213,79,0.15)';
        ctx.fillRect(85, y - 12, 590, 20);
      }

      ctx.fillStyle = i < 3 ? '#ffd54f' : '#b0bec5';
      ctx.font = i < 3 ? 'bold 10px monospace' : '10px monospace';
      ctx.fillText(`${e.rank || i + 1}`, 100, y);
      ctx.fillStyle = isMe ? '#ffd54f' : '#fff';
      ctx.fillText(e.name, 130, y);
      ctx.fillStyle = '#ffa726';
      ctx.fillText(`${e.score}`, 320, y);
      ctx.fillStyle = '#fff';
      ctx.fillText(`${e.publications}`, 410, y);
      ctx.fillStyle = '#66bb6a';
      ctx.fillText(`${e.grants}`, 470, y);
      ctx.fillStyle = '#ffd54f';
      ctx.fillText(`${e.hIndex}`, 540, y);
      ctx.fillStyle = '#4fc3f7';
      ctx.fillText(`${e.citations}`, 600, y);
    }
  }

  ctx.textAlign = 'center';
  const blink = Math.sin(Date.now() * 0.005) > 0;
  if (blink) {
    ctx.fillStyle = '#78909c';
    ctx.font = '11px monospace';
    ctx.fillText('Press SPACE to continue', GAME_W / 2, GAME_H - 30);
  }
  ctx.textAlign = 'left';
}

// Draw a compact leaderboard table at a given position
function drawMiniLeaderboard(startX, startY, maxRows) {
  const lbW = 360;
  // Panel background
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  drawRoundRect(startX - 10, startY - 18, lbW + 20, maxRows * 16 + 34, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,213,79,0.2)';
  ctx.lineWidth = 1;
  drawRoundRect(startX - 10, startY - 18, lbW + 20, maxRows * 16 + 34, 6);
  ctx.stroke();

  // Title
  ctx.fillStyle = '#ffd54f';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEADERBOARD', startX + lbW / 2, startY - 4);
  ctx.textAlign = 'left';

  if (leaderboardData.length === 0) {
    ctx.fillStyle = '#78909c';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('No scores yet', startX + lbW / 2, startY + 20);
    ctx.textAlign = 'left';
    return;
  }

  // Header
  ctx.fillStyle = '#78909c';
  ctx.font = '8px monospace';
  ctx.fillText('#', startX, startY + 12);
  ctx.fillText('NAME', startX + 20, startY + 12);
  ctx.fillText('SCORE', startX + 150, startY + 12);
  ctx.fillText('PUBS', startX + 210, startY + 12);
  ctx.fillText('h', startX + 255, startY + 12);
  ctx.fillText('GRANTS', startX + 280, startY + 12);

  const rows = Math.min(leaderboardData.length, maxRows);
  for (let i = 0; i < rows; i++) {
    const e = leaderboardData[i];
    const rowY = startY + 26 + i * 16;
    const isMe = playerName && e.name === playerName;

    if (isMe) {
      ctx.fillStyle = 'rgba(255,213,79,0.1)';
      ctx.fillRect(startX - 5, rowY - 10, lbW + 10, 15);
    }

    ctx.font = i < 3 ? 'bold 9px monospace' : '9px monospace';
    ctx.fillStyle = i < 3 ? '#ffd54f' : '#b0bec5';
    ctx.fillText(`${e.rank || i + 1}`, startX, rowY);
    ctx.fillStyle = isMe ? '#ffd54f' : '#fff';
    ctx.fillText(e.name.slice(0, 12), startX + 20, rowY);
    ctx.fillStyle = '#ffa726';
    ctx.fillText(`${e.score}`, startX + 150, rowY);
    ctx.fillStyle = '#fff';
    ctx.fillText(`${e.publications}`, startX + 210, rowY);
    ctx.fillStyle = '#ffd54f';
    ctx.fillText(`${e.hIndex}`, startX + 255, rowY);
    ctx.fillStyle = '#66bb6a';
    ctx.fillText(`${e.grants}`, startX + 280, rowY);
  }
}

function startGame() {
  stats = { publications: 0, grants: 0, citations: 0, hIndex: 0, lives: 3, coffee: 0, score: 0 };
  postdocCount = 0;
  jobMarketPassed = null;
  // playerAppearance is already set by customization or random default

  // Start name input
  gameState = 'enterName';
  nameInputActive = true;
  nameChars = playerName ? playerName.split('') : [];
  window.addEventListener('keydown', handleNameInput);
}

function startGameAfterName() {
  fetchLeaderboard();
  initLevel(0);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
